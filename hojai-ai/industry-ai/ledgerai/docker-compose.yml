# LEDGERAI - Finance AI Operating System
version: '3.8'

services:
  ledgerai:
    build: .
    container_name: ledgerai
    restart: unless-stopped
    ports:
      - "4815:4815"
    environment:
      - NODE_ENV=production
      - PORT=4815
      - DATABASE_URL=${DATABASE_URL:-postgresql://localhost:5432/ledgerai}
      - REDIS_URL=${REDIS_URL:-redis://localhost:6379}
      - HOJAI_CORE_URL=${HOJAI_CORE_URL:-http://hojai-core:4100}
      - MERCHANT_OS_URL=${MERCHANT_OS_URL:-http://merchant-os:4000}
    depends_on:
      - redis
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4815/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ledgerai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - hojai-network

volumes:
  redis-data:

networks:
  hojai-network:
    driver: bridge
