apiVersion: apps/v1
kind: Deployment
metadata:
  name: tripmind
  namespace: hojai
  labels:
    app: tripmind
    version: v1
    company: hojai-ai
    industry: travel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tripmind
  template:
    metadata:
      labels:
        app: tripmind
        version: v1
        company: hojai-ai
        industry: travel
    spec:
      containers:
        - name: tripmind
          image: hojai/tripmind:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4809
              name: http
          env:
            - name: PORT
              value: "4809"
            - name: NODE_ENV
              value: "production"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: hojai-secrets
                  key: mongodb-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hojai-secrets
                  key: jwt-secret
            - name: AUTH_SERVICE_URL
              value: "http://rabtul-auth.hojai:4002"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://hojai-notification.hojai:4095"
            - name: WEBHOOK_SERVICE_URL
              value: "http://hojai-webhook.hojai:4090"
            - name: HOJAI_URL
              value: "http://hojai-enterprise-brain.hojai:4600"
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hojai-secrets
                  key: internal-service-token
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4809
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 4809
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - tripmind
                topologyKey: kubernetes.io/hostname