# WAITRON - Restaurant AI Operating System
version: '3.8'

services:
  waitron:
    build: .
    container_name: waitron
    restart: unless-stopped
    ports:
      - "4820:4820"
    environment:
      - NODE_ENV=production
      - PORT=4820
      - DATABASE_URL=${DATABASE_URL:-postgresql://localhost:5432/waitron}
      - REDIS_URL=${REDIS_URL:-redis://localhost:6379}
      - HOJAI_CORE_URL=${HOJAI_CORE_URL:-http://hojai-core:4100}
      - MERCHANT_OS_URL=${MERCHANT_OS_URL:-http://merchant-os:4000}
    depends_on:
      - redis
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4820/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: waitron-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - hojai-network

volumes:
  redis-data:

networks:
  hojai-network:
    driver: bridge
