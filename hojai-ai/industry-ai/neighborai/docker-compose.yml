# NEIGHBORAI - Society AI Operating System
version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: neighborai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - neighborai-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  neighborai:
    build: .
    container_name: neighborai-app
    restart: unless-stopped
    ports:
      - "4806:4806"
    environment:
      - NODE_ENV=production
      - PORT=4806
      - MONGODB_URI=mongodb://mongodb:27017/neighborai
      - JWT_SECRET=${JWT_SECRET:-neighborai-production-secret-change-this}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-neighborai-internal-token}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - LOG_LEVEL=info
    depends_on:
      - mongodb
    networks:
      - neighborai-network
    volumes:
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4806/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data:
  app_logs:

networks:
  neighborai-network:
    driver: bridge