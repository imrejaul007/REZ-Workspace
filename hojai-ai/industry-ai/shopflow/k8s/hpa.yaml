apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shopflow-hpa
  namespace: hojai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shopflow
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80