# AgentOS Hub - Docker Compose Configuration
# Unified Agent Orchestration Platform for 24 Industries

version: '3.8'

services:
  # =============================================================================
  # Core Services
  # =============================================================================

  agentos-hub:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: agentos-hub
    ports:
      - "8000:8000"  # API Gateway
      - "9090:9090"  # Metrics
    environment:
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://agentos:agentos@postgres:5432/agentos
      - KAFKA_BROKERS=kafka:9092
      - ENVIRONMENT=production
    volumes:
      - ../config:/app/config:ro
      - agentos-data:/app/data
    depends_on:
      - redis
      - postgres
      - kafka
    networks:
      - agentos-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =============================================================================
  # Infrastructure Services
  # =============================================================================

  redis:
    image: redis:7-alpine
    container_name: agentos-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - agentos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: agentos-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=agentos
      - POSTGRES_PASSWORD=agentos
      - POSTGRES_DB=agentos
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - agentos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos -d agentos"]
      interval: 10s
      timeout: 5s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: agentos-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    networks:
      - agentos-network
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: agentos-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - agentos-network
    restart: unless-stopped

  # =============================================================================
  # Monitoring Services
  # =============================================================================

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: agentos-prometheus
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ../config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - agentos-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.0.0
    container_name: agentos-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ../config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - agentos-network
    restart: unless-stopped

  # =============================================================================
  # Industry Service Emulators (for development/testing)
  # =============================================================================

  industry-emulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    container_name: agentos-industry-emulator
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=DEBUG
      - EMULATOR_MODE=true
      - INDUSTRIES=agriculture,automotive,beauty,construction,education,entertainment,fashion,financial,fitness,gaming,government,healthcare,home_services,hotel,legal,manufacturing,nonprofit,professional,realestate,restaurant,retail,sports,transport,travel
    networks:
      - agentos-network
    restart: unless-stopped

  # =============================================================================
  # Development Services
  # =============================================================================

  dev-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    container_name: agentos-dev-api
    ports:
      - "8000:8000"
      - "5678:5678"  # Debug port
    environment:
      - LOG_LEVEL=DEBUG
      - DEBUG=true
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://agentos:agentos@postgres:5432/agentos
    volumes:
      - ../src:/app/src
      - ../config:/app/config
    depends_on:
      - redis
      - postgres
    networks:
      - agentos-network
    command: python -m uvicorn src.api.gateway:create_app --factory --host 0.0.0.0 --port 8000 --reload

# =============================================================================
# Networks
# =============================================================================
networks:
  agentos-network:
    driver: bridge
    name: agentos-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  agentos-data:
    name: agentos-data
  redis-data:
    name: agentos-redis-data
  postgres-data:
    name: agentos-postgres-data
  kafka-data:
    name: agentos-kafka-data
  prometheus-data:
    name: agentos-prometheus-data
  grafana-data:
    name: agentos-grafana-data
