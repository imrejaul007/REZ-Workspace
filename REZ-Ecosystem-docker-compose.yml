  customer-ai:
    container_name: customer-ai
    build:
      context: ./hojai-customer-intelligence
      dockerfile: Dockerfile
    ports:
      - "4752:4752"
    environment:
      - PORT=4752
      - HOJAI_INTELLIGENCE=http://hojai-intelligence:4530
