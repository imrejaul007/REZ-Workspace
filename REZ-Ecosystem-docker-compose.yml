    environment:
      - PORT=4250
    networks:
      - rez-ecosystem

  sutar-economy:
    container_name: sutar-economy
    build:
      context: ./hojai-ai/hojai-sutar-os/services/sutar-economy-os
      dockerfile: Dockerfile
    ports:
      - "4251:4251"
    environment:
      - PORT=4251
    networks:
      - rez-ecosystem

  sutar-contract:
    container_name: sutar-contract
    build:
      context: ./hojai-ai/hojai-sutar-os/services/sutar-contract-os
      dockerfile: Dockerfile
    ports:
      - "4190:4190"
    environment:
      - PORT=4190
    networks:
      - rez-ecosystem

  sutar-negotiation:
    container_name: sutar-negotiation
    build:
      context: ./hojai-ai/hojai-sutar-os/services/sutar-negotiation-engine
      dockerfile: Dockerfile
    ports:
      - "4191:4191"
    environment:
      - PORT=4191
    networks:
      - rez-ecosystem

  # ============================================
