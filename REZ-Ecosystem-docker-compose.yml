# REZ Ecosystem - Complete Docker Compose
# RTNM Digital - Full Stack Deployment
#
# Usage:
#   docker-compose -f REZ-Ecosystem-docker-compose.yml up -d          # Start all
#   docker-compose -f REZ-Ecosystem-docker-compose.yml up -d hojai    # HOJAI only
#   docker-compose -f REZ-Ecosystem-docker-compose.yml up -d rabtul   # RABTUL only
#
# Networks:
#   - rez-ecosystem: Common network for all services

version: '3.8'

networks:
  rez-ecosystem:
    name: rez-ecosystem
    driver: bridge

services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================

  mongodb:
    image: mongo:7.0
    container_name: rez-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    ports:
      - "27017:27017"
    volumes:
      - rez-mongodb-data:/data/db
    networks:
      - rez-ecosystem

  redis:
    image: redis:7-alpine
    container_name: rez-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - rez-redis-data:/data
    networks:
      - rez-ecosystem

  # ============================================
  # RABTUL TECHNOLOGIES (4001-4025)
  # ============================================

  rez-auth-service:
    container_name: rez-auth-service
    image: rabtul/auth-service:latest
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/rabtul?authSource=admin
    networks:
      - rez-ecosystem
    depends_on:
      - mongodb

  rez-payment-service:
    container_name: rez-payment-service
    image: rabtul/payment-service:latest
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - RAZORPAY_KEY=${RAZORPAY_KEY}
      - RAZORPAY_SECRET=${RAZORPAY_SECRET}
    networks:
      - rez-ecosystem

  rez-wallet-service:
    container_name: rez-wallet-service
    image: rabtul/wallet-service:latest
    ports:
      - "4004:4004"
    environment:
      - PORT=4004
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/rabtul?authSource=admin
    networks:
      - rez-ecosystem
    depends_on:
      - mongodb

  rez-order-service:
    container_name: rez-order-service
    image: rabtul/order-service:latest
    ports:
      - "4006:4006"
    environment:
      - PORT=4006
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/rabtul?authSource=admin
    networks:
      - rez-ecosystem
    depends_on:
      - mongodb

  rez-catalog-service:
    container_name: rez-catalog-service
    image: rabtul/catalog-service:latest
    ports:
      - "4007:4007"
    environment:
      - PORT=4007
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/rabtul?authSource=admin
    networks:
      - rez-ecosystem
    depends_on:
      - mongodb

  rez-booking-service:
    container_name: rez-booking-service
    image: rabtul/booking-service:latest
    ports:
      - "4020:4020"
    environment:
      - PORT=4020
    networks:
      - rez-ecosystem

  rez-notifications-service:
    container_name: rez-notifications-service
    image: rabtul/notifications-service:latest
    ports:
      - "4011:4011"
    environment:
      - PORT=4011
    networks:
      - rez-ecosystem

  # RABTUL Event Bus
  rez-event-bus:
    container_name: rez-event-bus
    image: rabtul/event-bus:latest
    ports:
      - "4025:4025"
    environment:
      - PORT=4025
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/rabtul?authSource=admin
      - REDIS_URL=redis://redis:6379
    networks:
      - rez-ecosystem
    depends_on:
      - mongodb
      - redis

  # ============================================
  # REZ INTELLIGENCE (4018, 4123, 4201)
  # ============================================

  rez-intent-predictor:
    container_name: rez-intent-predictor
    image: rez/intent-predictor:latest
    ports:
      - "4018:4018"
    environment:
      - PORT=4018
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/rez-intelligence?authSource=admin
    networks:
      - rez-ecosystem
    depends_on:
      - mongodb

  rez-predictive-engine:
    container_name: rez-predictive-engine
    image: rez/predictive-engine:latest
    ports:
      - "4123:4123"
    environment:
      - PORT=4123
    networks:
      - rez-ecosystem

  rez-memory-layer:
    container_name: rez-memory-layer
    image: rez/memory-layer:latest
    ports:
      - "4201:4201"
    environment:
      - PORT=4201
      - REDIS_URL=redis://redis:6379
    networks:
      - rez-ecosystem
    depends_on:
      - redis

  rez-signal-aggregator:
    container_name: rez-signal-aggregator
    image: rez/signal-aggregator:latest
    ports:
      - "4142:4142"
    environment:
      - PORT=4142
    networks:
      - rez-ecosystem

  rez-fraud-agent:
    container_name: rez-fraud-agent
    image: rez/fraud-agent:latest
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
    networks:
      - rez-ecosystem

  rez-recommendation-engine:
    container_name: rez-recommendation-engine
    image: rez/recommendation-engine:latest
    ports:
      - "4050:4050"
    environment:
      - PORT=4050
    networks:
      - rez-ecosystem

  # ============================================
  # UNIFIED HUB (4600)
  # ============================================

  rez-unified-hub:
    container_name: rez-unified-hub
    build:
      context: ./RABTUL-Technologies/REZ-unified-hub
      dockerfile: Dockerfile
    ports:
      - "4600:4600"
    environment:
      - PORT=4600
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-your-internal-token}
      # RABTUL Services
      - AUTH_SERVICE_URL=http://rez-auth-service:4002
      - PAYMENT_SERVICE_URL=http://rez-payment-service:4001
      - WALLET_SERVICE_URL=http://rez-wallet-service:4004
      - ORDER_SERVICE_URL=http://rez-order-service:4006
      - CATALOG_SERVICE_URL=http://rez-catalog-service:4007
      - BOOKING_SERVICE_URL=http://rez-booking-service:4020
      - NOTIFICATIONS_SERVICE_URL=http://rez-notifications-service:4011
      # REZ Intelligence
      - INTENT_URL=http://rez-intent-predictor:4018
      - FRAUD_URL=http://rez-fraud-agent:3007
      - RECOMMEND_URL=http://rez-recommendation-engine:4050
      - PREDICT_URL=http://rez-predictive-engine:4123
      - SIGNAL_URL=http://rez-signal-aggregator:4142
      - MEMORY_LAYER_URL=http://rez-memory-layer:4201
      # HOJAI AI
      - HOJAI_GATEWAY=http://hojai-gateway:4500
      - HOJAI_MEMORY=http://hojai-memory:4520
      - HOJAI_INTELLIGENCE=http://hojai-intelligence:4530
      - HOJAI_AGENTS=http://hojai-agents:4550
      - GENIE_MEMORY=http://genie-memory:4703
      - GENIE_RELATION=http://genie-relation:4704
      - GENIE_BRIEFING=http://genie-briefing:4706
      - COMMERCE_AI=http://commerce-ai:4750
      - CUSTOMER_AI=http://customer-ai:4752
      - MARKETING_AI=http://marketing-ai:4753
      - FINANCIAL_AI=http://financial-ai:4754
      # SUTAR OS
      - SUTAR_GATEWAY=http://sutar-gateway:4140
      - SUTAR_TWIN_OS=http://sutar-twin-os:4142
      - SUTAR_INTENT=http://sutar-intent:4154
      - SUTAR_DECISION=http://sutar-decision:4240
    networks:
      - rez-ecosystem
    depends_on:
      - rez-auth-service
      - rez-wallet-service
      - hojai-gateway

  # ============================================
  # EVENT BUS BRIDGE (4090)
  # ============================================

  rez-event-bus-bridge:
    container_name: rez-event-bus-bridge
    build:
      context: ./RABTUL-Technologies/REZ-event-bus-bridge
      dockerfile: Dockerfile
    ports:
      - "4090:4090"
    environment:
      - PORT=4090
      - RABTUL_EVENT_BUS=http://rez-event-bus:4025
      - HOJAI_EVENT_BUS=http://hojai-event-bus:4510
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-your-internal-token}
    networks:
      - rez-ecosystem
    depends_on:
      - rez-event-bus
      - hojai-event-bus

  # ============================================
  # HOJAI AI CORE (4500-4590)
  # ============================================

  hojai-gateway:
    container_name: hojai-gateway
    build:
      context: ./hojai-core/hojai-api-gateway
      dockerfile: Dockerfile
    ports:
      - "4500:4500"
    environment:
      - PORT=4500
      - HOJAI_EVENT_BUS=http://hojai-event-bus:4510
      - HOJAI_MEMORY=http://hojai-memory:4520
    networks:
      - rez-ecosystem
    depends_on:
      - hojai-event-bus
      - hojai-memory

  hojai-governance:
    container_name: hojai-governance
    build:
      context: ./hojai-core/hojai-governance
      dockerfile: Dockerfile
    ports:
      - "4501:4501"
    environment:
      - PORT=4501
    networks:
      - rez-ecosystem

  hojai-event-bus:
    container_name: hojai-event-bus
    build:
      context: ./hojai-core/hojai-event
      dockerfile: Dockerfile
    ports:
      - "4510:4510"
    environment:
      - PORT=4510
      - REDIS_URL=redis://redis:6379
    networks:
      - rez-ecosystem
    depends_on:
      - redis

  hojai-memory:
    container_name: hojai-memory
    build:
      context: ./hojai-core/hojai-memory
      dockerfile: Dockerfile
    ports:
      - "4520:4520"
    environment:
      - PORT=4520
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/hojai?authSource=admin
    networks:
      - rez-ecosystem
    depends_on:
      - mongodb

  hojai-intelligence:
    container_name: hojai-intelligence
    build:
      context: ./hojai-core/hojai-intelligence
      dockerfile: Dockerfile
    ports:
      - "4530:4530"
    environment:
      - PORT=4530
      - HOJAI_MEMORY=http://hojai-memory:4520
    networks:
      - rez-ecosystem
    depends_on:
      - hojai-memory

  hojai-agents:
    container_name: hojai-agents
    build:
      context: ./hojai-core/hojai-agents
      dockerfile: Dockerfile
    ports:
      - "4550:4550"
    environment:
      - PORT=4550
      - HOJAI_MEMORY=http://hojai-memory:4520
    networks:
      - rez-ecosystem
    depends_on:
      - hojai-memory

  hojai-workflows:
    container_name: hojai-workflows
    build:
      context: ./hojai-core/hojai-workflow
      dockerfile: Dockerfile
    ports:
      - "4560:4560"
    environment:
      - PORT=4560
      - REDIS_URL=redis://redis:6379
    networks:
      - rez-ecosystem
    depends_on:
      - redis

  hojai-comms:
    container_name: hojai-comms
    build:
      context: ./hojai-core/hojai-communications
      dockerfile: Dockerfile
    ports:
      - "4570:4570"
    environment:
      - PORT=4570
    networks:
      - rez-ecosystem

  hojai-hyperlocal:
    container_name: hojai-hyperlocal
    build:
      context: ./hojai-core/hojai-hyperlocal
      dockerfile: Dockerfile
    ports:
      - "4580:4580"
    environment:
      - PORT=4580
    networks:
      - rez-ecosystem

  hojai-data:
    container_name: hojai-data
    build:
      context: ./hojai-core/hojai-data
      dockerfile: Dockerfile
    ports:
      - "4590:4590"
    environment:
      - PORT=4590
    networks:
      - rez-ecosystem

  # ============================================
  # HOJAI GENIE (4703-4707)
  # ============================================

  genie-memory:
    container_name: genie-memory
    build:
      context: ./genie-memory-service
      dockerfile: Dockerfile
    ports:
      - "4703:4703"
    environment:
      - PORT=4703
      - HOJAI_MEMORY=http://hojai-memory:4520
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/genie?authSource=admin
    networks:
      - rez-ecosystem
    depends_on:
      - hojai-memory
      - mongodb

  genie-relation:
    container_name: genie-relation
    build:
      context: ./genie-relationship-service
      dockerfile: Dockerfile
    ports:
      - "4704:4704"
    environment:
      - PORT=4704
      - HOJAI_MEMORY=http://hojai-memory:4520
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/genie?authSource=admin
    networks:
      - rez-ecosystem
    depends_on:
      - hojai-memory
      - mongodb

  genie-briefing:
    container_name: genie-briefing
    build:
      context: ./genie-briefing-service
      dockerfile: Dockerfile
    ports:
      - "4706:4706"
    environment:
      - PORT=4706
      - GENIE_MEMORY=http://genie-memory:4703
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/genie?authSource=admin
    networks:
      - rez-ecosystem
    depends_on:
      - genie-memory
      - mongodb

  # ============================================
  # HOJAI INTELLIGENCE SUITE (4750-4754)
  # ============================================

  commerce-ai:
    container_name: commerce-ai
    build:
      context: ./hojai-commerce-intelligence
      dockerfile: Dockerfile
    ports:
      - "4750:4750"
    environment:
      - PORT=4750
      - HOJAI_INTELLIGENCE=http://hojai-intelligence:4530
    networks:
      - rez-ecosystem
    depends_on:
      - hojai-intelligence

  merchant-ai:
    container_name: merchant-ai
    build:
      context: ./hojai-merchant-intelligence
      dockerfile: Dockerfile
    ports:
      - "4751:4751"
    environment:
      - PORT=4751
      - HOJAI_INTELLIGENCE=http://hojai-intelligence:4530
