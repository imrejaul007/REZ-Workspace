      - HOJAI_INTELLIGENCE=http://hojai-intelligence:4530
    networks:
      - rez-ecosystem
    depends_on:
      - hojai-intelligence

  # ============================================
  # SUTAR OS (4140-4254)
  # ============================================

  sutar-gateway:
    container_name: sutar-gateway
    build:
      context: ./hojai-ai/hojai-sutar-os/services/sutar-gateway
      dockerfile: Dockerfile
    ports:
      - "4140:4140"
    environment:
      - PORT=4140
      - SUTAR_TWIN_OS=http://sutar-twin-os:4521
      - SUTAR_INTENT=http://sutar-intent:4154
    networks:
      - rez-ecosystem

  sutar-twin-os:
    container_name: sutar-twin-os
    build:
      context: ./hojai-ai/hojai-sutar-os/services/sutar-twin-os
      dockerfile: Dockerfile
    ports:
      - "4521:4521"
    environment:
      - PORT=4521
      - HOJAI_MEMORY=http://hojai-memory:4520
    networks:
      - rez-ecosystem
    depends_on:
