    environment:
      - PORT=4146
    networks:
      - rez-ecosystem

  sutar-supplier:
    container_name: sutar-supplier
    build:
      context: ./hojai-ai/hojai-sutar-os/services/sutar-supplier-registry
      dockerfile: Dockerfile
    ports:
      - "4147:4147"
    environment:
      - PORT=4147
    networks:
      - rez-ecosystem

  sutar-trust:
    container_name: sutar-trust
    build:
      context: ./hojai-ai/hojai-sutar-os/services/sutar-trust-engine
      dockerfile: Dockerfile
    ports:
      - "4148:4148"
    environment:
      - PORT=4148
    networks:
      - rez-ecosystem

  sutar-discovery:
    container_name: sutar-discovery
    build:
      context: ./hojai-ai/hojai-sutar-os/services/sutar-discovery-engine
      dockerfile: Dockerfile
    ports:
      - "4149:4149"
    environment:
      - PORT=4149
    networks:
      - rez-ecosystem

  sutar-intent:
    container_name: sutar-intent
    build:
      context: ./hojai-ai/hojai-sutar-os/services/sutar-intent-bus
      dockerfile: Dockerfile
    ports:
      - "4154:4154"
    environment:
      - PORT=4154
    networks:
      - rez-ecosystem

  sutar-decision:
    container_name: sutar-decision
    build:
      context: ./hojai-ai/hojai-sutar-os/services/sutar-decision-engine
      dockerfile: Dockerfile
    ports:
      - "4240:4240"
    environment:
      - PORT=4240
    networks:
      - rez-ecosystem

  sutar-simulation:
    container_name: sutar-simulation
    build:
      context: ./hojai-ai/hojai-sutar-os/services/sutar-simulation-os
      dockerfile: Dockerfile
    ports:
