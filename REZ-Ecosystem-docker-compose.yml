  # ============================================

  # StayOwn Hospitality (4801-4805)
  stayown-api:
    container_name: stayown-api
    build:
      context: ./StayOwn-Hospitality
      dockerfile: Dockerfile
    ports:
      - "4801:4801"
    environment:
      - PORT=4801
      - UNIFIED_HUB_URL=http://rez-unified-hub:4600
      - HOJAI_MEMORY=http://hojai-memory:4520
      - HOJAI_AGENTS=http://hojai-agents:4550
      - HOJAI_INTELLIGENCE=http://hojai-intelligence:4530
      - RABTUL_AUTH_URL=http://rez-auth-service:4002
