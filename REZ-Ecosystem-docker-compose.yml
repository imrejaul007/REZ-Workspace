  sutar-network:
    container_name: sutar-network
    build:
      context: ./hojai-ai/hojai-sutar-os/services/sutar-agent-network
      dockerfile: Dockerfile
    ports:
      - "4243:4243"
    environment:
      - PORT=4243
    networks:
