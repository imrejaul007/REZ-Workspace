version: '3.8'

# =============================================================================
# RTNM Ecosystem - Complete Unified Deployment
# All services with correct paths
# =============================================================================

services:
  # ============ INFRASTRUCTURE ============
  redis:
    image: redis:7-alpine
    container_name: rtnm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - rtnm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: rtnm-postgres
    environment:
      POSTGRES_USER: rtnm
      POSTGRES_PASSWORD: rtnm123
      POSTGRES_DB: rtnm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - rtnm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtnm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ SUTAR INTEGRATION (CORE ORDER FLOW) ============
  sutar-intent-bus:
    build:
      context: ./hojai-ai/sutar-intent-bus
      dockerfile: Dockerfile
    container_name: sutar-intent-bus
    ports:
      - "4154:4154"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4154
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4154/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sutar-negotiation-engine:
    build:
      context: ./hojai-ai/hojai-sutar-os/services/sutar-negotiation-engine
      dockerfile: Dockerfile
    container_name: sutar-negotiation-engine
    ports:
      - "4191:4191"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4191
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4191/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sutar-decision-engine:
    build:
      context: ./hojai-ai/hojai-sutar-os/services/sutar-decision-engine
      dockerfile: Dockerfile
    container_name: sutar-decision-engine
    ports:
      - "4240:4240"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4240
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4240/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sutar-rez-bridge:
    build:
      context: ./hojai-ai/sutar-rez-bridge
      dockerfile: Dockerfile
    container_name: sutar-rez-bridge
    ports:
      - "4155:4155"
    depends_on:
      redis:
        condition: service_healthy
      sutar-negotiation-engine:
        condition: service_healthy
    environment:
      - PORT=4155
      - REDIS_URL=redis://redis:6379
      - SUTAR_NEGOTIATION_URL=http://sutar-negotiation-engine:4191
      - SUTAR_DECISION_URL=http://sutar-decision-engine:4240
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4155/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  rez-event-bus:
    build:
      context: ./RTNM-Digital/shared/rez-event-bus
      dockerfile: Dockerfile
    container_name: rez-event-bus
    ports:
      - "4075:4075"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4075
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4075/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  order-flow-orchestrator:
