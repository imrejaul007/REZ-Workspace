      context: ./RABTUL-Technologies/rez-order-service
      dockerfile: Dockerfile
    container_name: rez-order-service
    ports:
      - "4006:4006"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - PORT=4006
      - DATABASE_URL=postgresql://rtnm:rtnm123@postgres:5432/rtnm
      - REDIS_URL=redis://redis:6379
    networks:
