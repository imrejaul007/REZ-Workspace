    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4201/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ VOICEOS ============
  voiceos-unified:
    build:
      context: ./voice-service
      dockerfile: Dockerfile
    container_name: voiceos-unified
    ports:
      - "4850:4850"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4850
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4850/health"]
      interval: 30s
