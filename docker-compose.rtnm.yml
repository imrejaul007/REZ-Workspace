      retries: 3

  rez-ai-voice:
    build:
      context: ./voice-service/voice-agents
      dockerfile: Dockerfile
    container_name: rez-ai-voice
    ports:
      - "4112:4112"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4112
