      context: ./hojai-ai/order-flow-orchestrator
      dockerfile: Dockerfile
    container_name: order-flow-orchestrator
    ports:
      - "4260:4260"
    depends_on:
      redis:
        condition: service_healthy
      sutar-intent-bus:
        condition: service_healthy
      sutar-rez-bridge:
        condition: service_healthy
    environment:
      - PORT=4260
      - REDIS_URL=redis://redis:6379
      - SUTAR_INTENT_BUS_URL=http://sutar-intent-bus:4154
      - SUTAR_NEGOTIATION_URL=http://sutar-negotiation-engine:4191
      - SUTAR_DECISION_URL=http://sutar-decision-engine:4240
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4260/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ SUTAR BRIDGES ============
  hojai-core-bridge:
