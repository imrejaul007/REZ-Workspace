    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4272
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4272/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ REZ INTELLIGENCE ============
  rez-intent-predictor:
    build:
      context: ./REZ-Intelligence/rez-intent-predictor
      dockerfile: Dockerfile
    container_name: rez-intent-predictor
    ports:
      - "4018:4018"
    depends_on:
