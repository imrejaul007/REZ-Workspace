# RTMN Core Services - Docker Compose
# All 14 strategic gap services

version: '3.8'

services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================

  redis:
    image: redis:7-alpine
    container_name: rtmn-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rtmn-core

  # ============================================
  # PHASE 1: FOUNDATION LAYER (Ports 3013-3015)
  # ============================================

  capability-matrix:
    build:
      context: ./core/capability-matrix
      dockerfile: Dockerfile
    container_name: rtmn-capability-matrix
    ports:
      - "3013:3013"
    environment:
      - PORT=3013
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3013/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rtmn-core

  unified-twin-os:
    build:
      context: ./core/unified-twin-os
