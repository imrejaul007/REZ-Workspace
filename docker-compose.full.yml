version: '3.8'

# =============================================================================
# RTNM Full Stack - Complete Deployment
# All services on a single network for full integration
# =============================================================================

services:
  # ============ INFRASTRUCTURE ============
  redis:
    image: redis:7-alpine
    container_name: rtnm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - rtnm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: rtnm-postgres
    environment:
      POSTGRES_USER: rtnm
      POSTGRES_PASSWORD: rtnm123
      POSTGRES_DB: rtnm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - rtnm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtnm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ HOJAI CORE ============
  hojai-api-gateway:
    build: ./hojai-ai/api-gateway
    container_name: hojai-api-gateway
    ports:
      - "4500:4500"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4500
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4500/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hojai-governance:
    build: ./hojai-ai/governance
    container_name: hojai-governance
    ports:
      - "4501:4501"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4501
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4501/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hojai-event-bus:
    build: ./hojai-ai/event-bus
    container_name: hojai-event-bus
    ports:
      - "4510:4510"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4510
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4510/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hojai-memory:
    build: ./hojai-ai/memory
    container_name: hojai-memory
    ports:
      - "4520:4520"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4520
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4520/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hojai-intelligence:
    build: ./hojai-ai/intelligence
    container_name: hojai-intelligence
    ports:
      - "4530:4530"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4530
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4530/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hojai-agents:
    build: ./hojai-ai/agents
    container_name: hojai-agents
    ports:
      - "4550:4550"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4550
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4550/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hojai-workflows:
    build: ./hojai-ai/workflows
    container_name: hojai-workflows
    ports:
      - "4560:4560"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4560
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4560/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ SUTAR INTEGRATION ============
  sutar-intent-bus:
    build: ./hojai-ai/sutar-intent-bus
    container_name: sutar-intent-bus
    ports:
      - "4154:4154"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4154
      - REDIS_URL=redis://redis:6379
      - INTENT_TTL=3600
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4154/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sutar-negotiation-engine:
    build: ./hojai-ai/hojai-sutar-os/services/sutar-negotiation-engine
    container_name: sutar-negotiation-engine
    ports:
      - "4191:4191"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4191
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4191/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sutar-decision-engine:
    build: ./hojai-ai/hojai-sutar-os/services/sutar-decision-engine
    container_name: sutar-decision-engine
    ports:
      - "4240:4240"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4240
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4240/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sutar-rez-bridge:
    build: ./hojai-ai/sutar-rez-bridge
    container_name: sutar-rez-bridge
    ports:
      - "4155:4155"
    depends_on:
      redis:
        condition: service_healthy
      sutar-negotiation-engine:
        condition: service_healthy
    environment:
      - PORT=4155
      - REDIS_URL=redis://redis:6379
      - SUTAR_NEGOTIATION_URL=http://sutar-negotiation-engine:4191
      - SUTAR_DECISION_URL=http://sutar-decision-engine:4240
      - REZ_ORDER_URL=http://rez-order-service:4006
      - REZ_DELIVERY_URL=http://rez-delivery-service:4009
      - REZ_MERCHANT_URL=http://rez-merchant-service:4005
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4155/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  rez-event-bus:
    build: ./RTNM-Digital/shared/rez-event-bus
    container_name: rez-event-bus
    ports:
      - "4075:4075"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4075
      - REDIS_URL=redis://redis:6379
      - EVENT_STREAM=rez:events
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4075/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  order-flow-orchestrator:
    build: ./hojai-ai/order-flow-orchestrator
    container_name: order-flow-orchestrator
    ports:
      - "4260:4260"
    depends_on:
      redis:
        condition: service_healthy
      sutar-intent-bus:
        condition: service_healthy
      sutar-rez-bridge:
        condition: service_healthy
    environment:
      - PORT=4260
      - REDIS_URL=redis://redis:6379
      - SUTAR_INTENT_BUS_URL=http://sutar-intent-bus:4154
      - SUTAR_NEGOTIATION_URL=http://sutar-negotiation-engine:4191
      - SUTAR_DECISION_URL=http://sutar-decision-engine:4240
      - REZ_ORDER_URL=http://rez-order-service:4006
      - REZ_DELIVERY_URL=http://rez-delivery-service:4009
      - REZ_MERCHANT_URL=http://rez-merchant-service:4005
      - REZ_KDS_URL=http://rez-kds-service:4014
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4260/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ REZ INTELLIGENCE ============
  rez-intent-predictor:
    build: ./REZ-Intelligence/rez-intent-predictor
    container_name: rez-intent-predictor
    ports:
      - "4018:4018"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4018
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4018/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  rez-predictive-engine:
    build: ./REZ-Intelligence/rez-predictive-engine
    container_name: rez-predictive-engine
    ports:
      - "4123:4123"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4123
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4123/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  rez-memory-layer:
    build: ./REZ-Intelligence/rez-memory-layer
    container_name: rez-memory-layer
    ports:
      - "4201:4201"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4201
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4201/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ VOICEOS ============
  voiceos-unified:
    build: ./voice-service
    container_name: voiceos-unified
    ports:
      - "4850:4850"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4850
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4850/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  rez-ai-voice:
    build: ./voice-service/voice-agents
    container_name: rez-ai-voice
    ports:
      - "4112:4112"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4112
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4112/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ GENIE ============
  genie-memory:
    build: ./genie-memory-service
    container_name: genie-memory
    ports:
      - "4703:4703"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4703
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4703/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  genie-relationship:
    build: ./genie-relationship-service
    container_name: genie-relationship
    ports:
      - "4704:4704"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4704
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4704/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  genie-briefing:
    build: ./genie-briefing-service
    container_name: genie-briefing
    ports:
      - "4706:4706"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=4706
      - REDIS_URL=redis://redis:6379
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4706/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  rtnm-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local