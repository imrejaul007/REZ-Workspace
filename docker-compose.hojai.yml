version: '3.8'

services:
  api-gateway:
    build: ./hojai-api-gateway
    container_name: hojai-api-gateway
    ports:
      - "4500:4500"
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4500/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - NODE_ENV=production
      - PORT=4500
      - SERVICE_NAME=api-gateway
 volumes:
      - hojai-api-gateway-data:/app/data

  governance:
    build: ./hojai-governance
    container_name: hojai-governance
    ports:
      - "4501:4501"
