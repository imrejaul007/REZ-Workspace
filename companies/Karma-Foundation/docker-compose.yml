version: '3.8'

# Karma Foundation - Production Deployment
# Complete stack with MongoDB, Redis, and all services

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: karma-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-karmaadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: karma_foundation
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    networks:
      - karma-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: karma-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - karma-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Karma Service (Backend API)
  karma-service:
    build:
      context: ./karma-service
      dockerfile: Dockerfile
    container_name: karma-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3009
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-karmaadmin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/karma_foundation?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      QR_SECRET: ${QR_SECRET}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-https://rez-auth-service.onrender.com}
      WALLET_SERVICE_URL: ${WALLET_SERVICE_URL:-https://rez-wallet-service.onrender.com}
      MERCHANT_SERVICE_URL: ${MERCHANT_SERVICE_URL:-https://rez-merchant-service.onrender.com}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SENTRY_DSN: ${SENTRY_DSN}
      TRACKIFY_API_KEY: ${TRACKIFY_API_KEY}
    ports:
      - "3009:3009"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - karma-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3009/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Karma Loyalty Bridge (Conversion Service)
  karma-loyalty-bridge:
    build:
      context: ./karma-loyalty-bridge
      dockerfile: Dockerfile
    container_name: karma-loyalty-bridge
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4098
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-karmaadmin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/karma_loyalty?authSource=admin
      CORS_ORIGIN: ${CORS_ORIGIN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      RABTUL_URL: ${RABTUL_URL:-http://localhost:4004}
      KARMA_URL: ${KARMA_URL:-http://localhost:3009}
    ports:
      - "4098:4098"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - karma-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4098/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: karma-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - karma-service
      - karma-loyalty-bridge
    networks:
      - karma-network
    profiles:
      - with-proxy

networks:
  karma-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
