name: Build & Push Docker Images

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build'
        required: false
        type: choice
        options:
          - all
          - api-gateway
          - rez-auth-service
          - rez-payment-service
          - rez-wallet-service
          - rez-order-service

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/rez

jobs:
  # ─────────────────────────────────────────────
  # Docker Build
  # ─────────────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - api-gateway
          - rez-auth-service
          - rez-payment-service
          - rez-wallet-service
          - rez-order-service
          - rez-catalog-service
          - rez-search-service
          - rez-delivery-service
          - rez-notifications-service
          - rez-profile-service
          - rez-analytics-service
          - rez-booking-service
          - REZ-circuit-breaker
          - REZ-retry-service
          - REZ-dlq-service
          - REZ-idempotency-service
          - REZ-policy-engine
          - REZ-secrets-manager
          - REZ-scheduler-service
          - REZ-observability-platform
          - REZ-data-aggregator
          - buzzlocal-feed-service
          - buzzlocal-community-service
          - buzzlocal-intelligence-service
          - buzzlocal-notification-service
          - buzzlocal-payment-service
          - buzzlocal-realtime-service
          - buzzlocal-vibe-service
          - buzzlocal-weather-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Scan for vulnerabilities
  # ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    strategy:
      matrix:
        service:
          - rez-auth-service
          - rez-payment-service
          - rez-wallet-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
