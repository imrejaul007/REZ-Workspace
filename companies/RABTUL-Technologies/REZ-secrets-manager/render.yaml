services:
  - type: web
    name: rez-secrets-manager
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MASTER_PASSWORD
        generateValue: true
      - key: REDIS_URL
        fromDatabase:
          name: rez-secrets-redis
          property: connectionString
      - key: LOG_LEVEL
        value: info
      - key: AUDIT_RETENTION_DAYS
        value: "365"
      - key: KEY_ROTATION_DAYS
        value: "90"
      - key: MAX_SECRET_VERSIONS
        value: "10"

databases:
  - name: rez-secrets-redis
    plan: starter
    ipAllowList: []

cronJobs:
  - name: secret-rotation-check
    schedule: "0 */6 * * *"
    command: npm run rotate
    region: oregon
  - name: audit-cleanup
    schedule: "0 3 * * *"
    command: npm run cleanup
    region: oregon
  - name: health-check
    schedule: "*/5 * * * *"
    command: npm run health-check
    region: oregon
