services:
  - type: web
    name: rez-upsell
    env: node
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4102
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: HOST
        fromService:
          type: web
          envVarKey: RAILWAY_PUBLIC_DOMAIN
      - key: APP_URL
        value: https://{your-app-name}.railway.app
