<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>
  <g transform="translate(512, 512)">
    <!-- Segmented Circles -->
    <circle cx="-80" cy="-60" r="180" fill="none" stroke="white" stroke-width="40" stroke-dasharray="200 400" opacity="0.3"/>
    <circle cx="80" cy="60" r="180" fill="none" stroke="white" stroke-width="40" stroke-dasharray="300 400"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="white" stroke-width="40" stroke-dasharray="150 400" opacity="0.6"/>
    <!-- People Icons -->
    <circle cx="-80" cy="-100" r="30" fill="white"/>
    <circle cx="80" cy="20" r="30" fill="white"/>
    <circle cx="0" cy="-40" r="25" fill="white"/>
  </g>
</svg>
