# TreasuryOS Docker Compose
# Cash Management, Investment Tracking, and Forecast Optimization

version: '3.8'

services:
  # TreasuryOS Main Service
  treasury-os:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: rez-treasury-os
    restart: unless-stopped
    ports:
      - "4055:4055"
    environment:
      # Database
      - MONGODB_URI=mongodb://mongo:27017/rez-treasury
      # Redis
      - REDIS_URL=redis://redis:6379
      # Service
      - PORT=4055
      - NODE_ENV=production
      # Security (REQUIRED)
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
      - GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      # External Services
      - WALLET_SERVICE_URL=http://wallet-service:4004
      - PAYMENT_SERVICE_URL=http://payment-service:4001
      - AUTH_SERVICE_URL=http://auth-service:4002
      - NOTIFICATIONS_SERVICE_URL=http://notifications-service:4011
      # Forecasting
      - FORECAST_HISTORY_DAYS=90
      - FORECAST_WEEKS_AHEAD=13
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4055/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - treasury-network

  # MongoDB
  mongo:
    image: mongo:7
    container_name: treasury-mongo
    restart: unless-stopped
    ports:
      - "27027:27017"
    volumes:
      - treasury-mongo-data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      - MONGO_INITDB_DATABASE=rez-treasury
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - treasury-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: treasury-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - treasury-redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - treasury-network

  # Prometheus (for metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: treasury-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - treasury-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - treasury-network

  # Grafana (for dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: treasury-grafana
    restart: unless-stopped
    ports:
      - "3055:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - treasury-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - treasury-network

networks:
  treasury-network:
    driver: bridge

volumes:
  treasury-mongo-data:
  treasury-redis-data:
  treasury-prometheus-data:
  treasury-grafana-data:
