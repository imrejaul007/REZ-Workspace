# TreasuryOS Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rez-treasury-os
  namespace: rez-platform
  labels:
    app: rez-treasury-os
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rez-treasury-os
  template:
    metadata:
      labels:
        app: rez-treasury-os
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4055"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: rez-treasury-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: treasury-os
          image: rabtul/rez-treasury-os:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4055
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4055"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: rez-secrets
                  key: mongodb-uri
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: rez-config
                  key: redis-url
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rez-secrets
                  key: internal-service-token
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rez-treasury-os
  namespace: rez-platform
  labels:
    app: rez-treasury-os
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4055
      targetPort: http
      protocol: TCP
  selector:
    app: rez-treasury-os
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rez-treasury-os
  namespace: rez-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rez-treasury-os
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rez-treasury-os
  namespace: rez-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1s"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - treasury-api.rezapp.com
      secretName: treasury-api-tls
  rules:
    - host: treasury-api.rezapp.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rez-treasury-os
                port:
                  name: http