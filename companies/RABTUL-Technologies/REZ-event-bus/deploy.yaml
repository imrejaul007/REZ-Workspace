# REZ Event Bus - Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rez-event-bus
  labels:
    app: rez-event-bus
    tier: intelligence
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rez-event-bus
  template:
    metadata:
      labels:
        app: rez-event-bus
        tier: intelligence
    spec:
      containers:
      - name: event-bus
        image: rez/event-bus:latest
        ports:
        - containerPort: 4025
        env:
        - name: PORT
          value: "4025"
        - name: NODE_ENV
          value: "production"
        - name: EVENT_BUS_STORAGE
          value: "redis"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: rez-secrets
              key: redis-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 4025
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 4025
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rez-event-bus
spec:
  selector:
    app: rez-event-bus
  ports:
  - port: 4025
    targetPort: 4025
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rez-event-bus
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: event-bus.rez.money
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rez-event-bus
            port:
              number: 4025
