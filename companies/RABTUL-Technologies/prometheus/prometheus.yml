global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'

  # ─────────────────────────────────────────────
  # Core Services
  # ─────────────────────────────────────────────

  - job_name: 'api-gateway'
    metrics_path: /health
    static_configs:
      - targets:
          - 'host.docker.internal:4000'
        labels:
          service: api-gateway
          tier: frontend

  - job_name: 'rez-auth-service'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'host.docker.internal:4002'
        labels:
          service: rez-auth-service
          tier: core

  - job_name: 'rez-payment-service'
