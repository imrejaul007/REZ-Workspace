# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rez-revenue-redis
  namespace: rez-revenue-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rez-revenue-redis
  template:
    metadata:
      labels:
        app: rez-revenue-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: rez-revenue-redis-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rez-revenue-redis-pvc
  namespace: rez-revenue-ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rez-revenue-redis
  namespace: rez-revenue-ai
spec:
  selector:
    app: rez-revenue-redis
  ports:
    - port: 6379
      targetPort: 6379

---
# MongoDB
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rez-revenue-mongodb
  namespace: rez-revenue-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rez-revenue-mongodb
  template:
    metadata:
      labels:
        app: rez-revenue-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:6
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.adminCommand('ping')
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.adminCommand('ping')
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: rez-revenue-mongodb-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rez-revenue-mongodb-pvc
  namespace: rez-revenue-ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rez-revenue-mongodb
  namespace: rez-revenue-ai
spec:
  selector:
    app: rez-revenue-mongodb
  ports:
    - port: 27017
      targetPort: 27017
