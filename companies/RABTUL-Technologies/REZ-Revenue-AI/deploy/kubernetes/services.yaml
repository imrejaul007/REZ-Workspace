# Pricing Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-engine
  namespace: rez-revenue-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pricing-engine
  template:
    metadata:
      labels:
        app: pricing-engine
    spec:
      containers:
        - name: pricing-engine
          image: rez-pricing-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4301
          env:
            - name: PORT
              value: "4301"
          envFrom:
            - secretRef:
                name: rez-revenue-ai-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4301
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 4301
---
apiVersion: v1
kind: Service
metadata:
  name: pricing-engine
  namespace: rez-revenue-ai
spec:
  clusterIP: None
  selector:
    app: pricing-engine
  ports:
    - port: 4301
      targetPort: 4301

