apiVersion: v1
kind: Namespace
metadata:
  name: rez-revenue-ai
  labels:
    app: rez-revenue-ai
    tier: ai-platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rez-revenue-ai
  namespace: rez-revenue-ai
---
apiVersion: v1
kind: Secret
metadata:
  name: rez-revenue-ai-secrets
  namespace: rez-revenue-ai
type: Opaque
stringData:
  INTERNAL_SERVICE_TOKEN: "${INTERNAL_SERVICE_TOKEN}"
  MONGODB_URI: "mongodb://rez-revenue-mongodb:27017/revenue_ai"
  REDIS_URL: "redis://rez-revenue-redis:6379"
