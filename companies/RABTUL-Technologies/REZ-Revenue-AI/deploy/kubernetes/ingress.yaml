apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rez-revenue-ai-ingress
  namespace: rez-revenue-ai
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  rules:
    - host: revenue-ai.rez.money
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: revenue-ai-gateway
                port:
                  number: 80
  tls:
    - hosts:
        - revenue-ai.rez.money
      secretName: rez-revenue-ai-tls
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rez-revenue-ai-network-policy
  namespace: rez-revenue-ai
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: rez-platform
        - namespaceSelector:
            matchLabels:
              name: rez-merchant
      ports:
        - protocol: TCP
          port: 4300
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector:
            matchLabels:
              name: mongodb
      ports:
        - protocol: TCP
          port: 27017
