# Render Blueprint for REZ-policy-engine
# Auto-deploys on every push to main branch

services:
  - type: web
    name: rez-policy-engine
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: 3000
