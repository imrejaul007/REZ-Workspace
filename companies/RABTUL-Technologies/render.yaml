# RABTUL Technologies - Render Blueprint
# Deploy all services to Render

services:
  # ─────────────────────────────────────────────
  # Core Services
  # ─────────────────────────────────────────────

  - name: api-gateway
    env: web
    region: singapore
    plan: starter
    port: 4000
    healthCheckPath: /health
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production

  - name: rez-auth-service
    env: web
    region: singapore
    plan: starter
    port: 4002
    healthCheckPath: /health
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  - name: rez-payment-service
    env: web
