version: "3.8"

# ============================================================
# REZ AdBazaar - New Intelligence Services
# ============================================================
# Services: REZ-email-validator, REZ-fraud-detection, REZ-creative-ab-testing,
#           REZ-brand-safety, REZ-viewability-tracker, REZ-attribution-modeling,
#           REZ-audience-sync, REZ-creative-rotation, REZ-frequency-capping,
#           REZ-budget-allocator, REZ-churn-predictor, REZ-ltv-calculator,
#           REZ-next-best-action, REZ-sentiment-analyzer, REZ-competitor-monitor
# ============================================================

services:
  # ============================================================
  # Infrastructure (Shared)
  # ============================================================
  mongodb:
    image: mongo:7.0
    container_name: adbazaar-mongodb
    restart: unless-stopped
    networks:
      - adbazaar-network
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: adbazaar-redis
    restart: unless-stopped
    networks:
      - adbazaar-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ============================================================
  # Ad Intelligence Services (Ports 4810-4819)
  # ============================================================

  rez-email-validator:
    build:
      context: ./AdBazaar/services/REZ-email-validator
      dockerfile: Dockerfile
    container_name: adbazaar-email-validator
    restart: unless-stopped
    ports:
      - "4810:4810"
    environment:
      - PORT=4810
      - MONGODB_URI=mongodb://mongodb:27017/rez_email_validator
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adbazaar-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4810/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  rez-fraud-detection:
    build:
      context: ./AdBazaar/services/REZ-fraud-detection
      dockerfile: Dockerfile
    container_name: adbazaar-fraud-detection
