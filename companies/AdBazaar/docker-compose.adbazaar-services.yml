  # ============================================================
  # Analytics Services (Ports 4900-4904)
  # ============================================================
  # Note: These services are in REZ-Intelligence repo
  # Build context should be adjusted when deploying

  rez-churn-predictor:
    image: node:20-alpine
    container_name: adbazaar-churn-predictor
    restart: unless-stopped
    working_dir: /app
    ports:
      - "4900:4900"
    environment:
      - PORT=4900
      - MONGODB_URI=mongodb://mongodb:27017/rez_churn_predictor
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    volumes:
      - ./REZ-Intelligence/services/REZ-churn-predictor:/app
    command: sh -c "npm install && npm run build && npm start"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
