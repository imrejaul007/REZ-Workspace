# ============================================================
# Networks
# ============================================================
networks:
  adbazaar-network:
    driver: bridge
    name: adbazaar-network

# ============================================================
# Volumes
# ============================================================
volumes:
  mongodb_data:
    name: adbazaar-mongodb_data
  redis_data:
    name: adbazaar-redis_data
