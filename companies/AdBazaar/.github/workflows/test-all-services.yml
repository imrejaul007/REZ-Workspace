name: Test All Services

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM
    - cron: '0 18 * * *' # Daily at 6 PM
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated list of services to test (leave empty for all)'
        required: false
        type: string

env:
  NODE_VERSION: '18'
  COVERAGE_THRESHOLD: 70

jobs:
  unit-tests:
    name: Unit Tests ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - instagram-shop-integration
          - instagram-publishing-service
          - instagram-insights-service
          - social-content-publisher
          - hashtag-research-engine
          - caption-generator-ai
          - content-calendar-service
          - follower-growth-tracker
          - youtube-integration
          - pinterest-integration
          - content-repurposing-engine
          - ugc-management-service
          - unified-social-inbox
          - crisis-alert-service
          - snapchat-integration
          - social-competitor-tracker
          - reddit-integration
          - influencer-authenticity-check
          - brand-partnership-portal
          - content-compliance-ai
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand({ping:1})' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ matrix.service }}/package-lock.json'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.service }}-${{ hashFiles(format('{0}/package-lock.json', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.service }}-

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: |
          if [ -f "package.json" ]; then
            npm ci
          else
            echo "No package.json found for ${{ matrix.service }}"
            exit 1
          fi

      - name: Run unit tests with coverage
        working-directory: ./${{ matrix.service }}
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: |
          if grep -q '"test"' package.json; then
            npm test -- --coverage --ci --forceExit --detectOpenHandles --maxWorkers=2
          else
            echo "No test script defined for ${{ matrix.service }}"
            echo '{"status":"skipped","message":"No test script defined"}' > test-results.json
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/coverage/
            ${{ matrix.service }}/test-results.json
            ${{ matrix.service }}/test-output/
          retention-days: 14

      - name: Check coverage threshold
        working-directory: ./${{ matrix.service }}
        if: always()
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | grep -o '"lines":{"pct":[0-9.]*' | grep -o '[0-9.]*$' | head -1)
            if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
              echo "Coverage $COVERAGE% is below threshold $COVERAGE_THRESHOLD%"
              exit 1
            fi
          fi

  integration-tests:
    name: Integration Tests ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(fromJSON('["schedule"]'), github.event_name)
    strategy:
      fail-fast: false
      matrix:
        service:
          - instagram-shop-integration
          - instagram-publishing-service
          - instagram-insights-service
          - social-content-publisher
          - hashtag-research-engine
          - caption-generator-ai
          - content-calendar-service
          - follower-growth-tracker
          - youtube-integration
          - pinterest-integration
          - content-repurposing-engine
          - ugc-management-service
          - unified-social-inbox
          - crisis-alert-service
          - snapchat-integration
          - social-competitor-tracker
          - reddit-integration
          - influencer-authenticity-check
          - brand-partnership-portal
          - content-compliance-ai
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: |
          if [ -f "package.json" ]; then
            npm ci
          fi

      - name: Start service
        working-directory: ./${{ matrix.service }}
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          REDIS_URL: redis://localhost:6379
          PORT: 3000
        run: |
          if [ -f "package.json" ] && grep -q '"start"' package.json; then
            npm start &
            SERVICE_PID=$!
            sleep 10
            echo $SERVICE_PID > service.pid
          fi

      - name: Run integration tests
        working-directory: ./${{ matrix.service }}
        env:
          API_BASE_URL: http://localhost:3000
          MONGODB_URI: mongodb://localhost:27017/test
          REDIS_URL: redis://localhost:6379
        run: |
          if grep -q '"test:integration"' package.json; then
            npm run test:integration
          elif grep -q '"test"' package.json; then
            npm test -- --testPathPattern=integration
          else
            echo "No integration test script defined"
          fi

      - name: Cleanup
        run: |
          if [ -f "${{ matrix.service }}/service.pid" ]; then
            kill $(cat ${{ matrix.service }}/service.pid) 2>/dev/null || true
          fi

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Playwright
        run: npm install -g playwright && npx playwright install chromium

      - name: Run E2E tests
        run: |
          if [ -d "e2e-tests" ]; then
            cd e2e-tests && npm ci && npx playwright test
          else
            echo "No E2E tests directory found"
          fi

  generate-coverage-report:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all coverage reports
        uses: actions/download-artifact@v4
        with:
          path: coverage-reports
          pattern: test-results-*
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Generate combined coverage report
        run: |
          echo "## Coverage Report Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Coverage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|--------|" >> $GITHUB_STEP_SUMMARY

          for service in instagram-shop-integration instagram-publishing-service instagram-insights-service social-content-publisher hashtag-research-engine caption-generator-ai content-calendar-service follower-growth-tracker youtube-integration pinterest-integration content-repurposing-engine ugc-management-service unified-social-inbox crisis-alert-service snapchat-integration social-competitor-tracker reddit-integration influencer-authenticity-check brand-partnership-portal content-compliance-ai; do
            if [ -d "coverage-reports/$service/coverage" ]; then
              COVERAGE=$(find "coverage-reports/$service/coverage" -name "coverage-summary.json" -exec cat {} \; 2>/dev/null | grep -o '"lines":{"pct":[0-9.]*' | grep -o '[0-9.]*$' | head -1 || echo "N/A")
              if [ "$COVERAGE" != "N/A" ] && (( $(echo "$COVERAGE >= $COVERAGE_THRESHOLD" | bc -l) )); then
                echo "| $service | ${COVERAGE}% | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $service | ${COVERAGE}% | :warning: |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| $service | N/A | :grey_question: |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload combined coverage
        uses: actions/upload-artifact@v4
        with:
          name: combined-coverage-report
          path: coverage-reports/
          retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, generate-coverage-report]
    if: always()
    steps:
      - name: Generate test summary
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Unit Tests**: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Integration Tests**: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Coverage Report**: ${{ needs.generate-coverage-report.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.unit-tests.result }}" = "success" ]; then
            echo "## :white_check_mark: All Tests Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "## :x: Some Tests Failed" >> $GITHUB_STEP_SUMMARY
            echo "Please check the test artifacts for details." >> $GITHUB_STEP_SUMMARY
          fi

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "Test failure detected for ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Failed jobs:"
          echo "- Unit Tests: ${{ needs.unit-tests.result }}"
          echo "- Integration Tests: ${{ needs.integration-tests.result }}"
