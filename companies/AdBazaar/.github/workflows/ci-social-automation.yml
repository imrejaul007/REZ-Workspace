name: CI Social Automation

on:
  push:
    branches: [main]
    paths:
      - 'instagram-shop-integration/**'
      - 'instagram-publishing-service/**'
      - 'instagram-insights-service/**'
      - 'social-content-publisher/**'
      - 'hashtag-research-engine/**'
      - 'caption-generator-ai/**'
      - 'content-calendar-service/**'
      - 'follower-growth-tracker/**'
      - 'youtube-integration/**'
      - 'pinterest-integration/**'
      - 'content-repurposing-engine/**'
      - 'ugc-management-service/**'
      - 'unified-social-inbox/**'
      - 'crisis-alert-service/**'
      - 'snapchat-integration/**'
      - 'social-competitor-tracker/**'
      - 'reddit-integration/**'
      - 'influencer-authenticity-check/**'
      - 'brand-partnership-portal/**'
      - 'content-compliance-ai/**'
      - '.github/workflows/ci-social-automation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'instagram-shop-integration/**'
      - 'instagram-publishing-service/**'
      - 'instagram-insights-service/**'
      - 'social-content-publisher/**'
      - 'hashtag-research-engine/**'
      - 'caption-generator-ai/**'
      - 'content-calendar-service/**'
      - 'follower-growth-tracker/**'
      - 'youtube-integration/**'
      - 'pinterest-integration/**'
      - 'content-repurposing-engine/**'
      - 'ugc-management-service/**'
      - 'unified-social-inbox/**'
      - 'crisis-alert-service/**'
      - 'snapchat-integration/**'
      - 'social-competitor-tracker/**'
      - 'reddit-integration/**'
      - 'influencer-authenticity-check/**'
      - 'brand-partnership-portal/**'
      - 'content-compliance-ai/**'
      - '.github/workflows/ci-social-automation.yml'

env:
  REGISTRY: ghcr.io
  NODE_VERSION: '18'

jobs:
  lint:
    name: Lint All Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          for service in instagram-shop-integration instagram-publishing-service instagram-insights-service social-content-publisher hashtag-research-engine caption-generator-ai content-calendar-service follower-growth-tracker youtube-integration pinterest-integration content-repurposing-engine ugc-management-service unified-social-inbox crisis-alert-service snapchat-integration social-competitor-tracker reddit-integration influencer-authenticity-check brand-partnership-portal content-compliance-ai; do
            if [ -d "$service" ] && [ -f "$service/package.json" ]; then
              echo "Linting $service..."
              cd "$service" && npm run lint || echo "No lint script for $service"
              cd ..
            fi
          done

  ci:
    name: Build & Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - instagram-shop-integration
          - instagram-publishing-service
          - instagram-insights-service
          - social-content-publisher
          - hashtag-research-engine
          - caption-generator-ai
          - content-calendar-service
          - follower-growth-tracker
          - youtube-integration
          - pinterest-integration
          - content-repurposing-engine
          - ugc-management-service
          - unified-social-inbox
          - crisis-alert-service
          - snapchat-integration
          - social-competitor-tracker
          - reddit-integration
          - influencer-authenticity-check
          - brand-partnership-portal
          - content-compliance-ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ matrix.service }}/package-lock.json'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.service }}-${{ hashFiles(format('{0}/package-lock.json', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.service }}-

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: |
          if [ -f "package.json" ]; then
            npm ci
          else
            echo "No package.json found for ${{ matrix.service }}"
            exit 1
          fi

      - name: Run linting
        working-directory: ./${{ matrix.service }}
        run: |
          if grep -q '"lint"' package.json; then
            npm run lint
          else
            echo "No lint script defined"
          fi

      - name: Run tests
        working-directory: ./${{ matrix.service }}
        run: |
          if grep -q '"test"' package.json; then
            npm test -- --coverage --ci
          else
            echo "No test script defined"
          fi

      - name: Run build
        working-directory: ./${{ matrix.service }}
        run: |
          if grep -q '"build"' package.json; then
            npm run build
          else
            echo "No build script defined"
          fi

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage/
          retention-days: 7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        working-directory: ./${{ matrix.service }}
        run: |
          if [ -f "Dockerfile" ]; then
            docker build -t ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }} .
            docker build -t ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest .
          else
            echo "No Dockerfile found for ${{ matrix.service }}"
          fi

      - name: Push Docker images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -f "${{ matrix.service }}/Dockerfile" ]; then
            docker push ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
            docker push ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest
          fi

      - name: Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          image-ref: '${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Run npm audit
        run: |
          for service in instagram-shop-integration instagram-publishing-service instagram-insights-service social-content-publisher hashtag-research-engine caption-generator-ai content-calendar-service follower-growth-tracker youtube-integration pinterest-integration content-repurposing-engine ugc-management-service unified-social-inbox crisis-alert-service snapchat-integration social-competitor-tracker reddit-integration influencer-authenticity-check brand-partnership-portal content-compliance-ai; do
            if [ -f "$service/package.json" ]; then
              echo "Auditing $service..."
              npm audit --audit-level=high --prefix "$service" || true
            fi
          done

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, ci, security-audit]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services Tested: 20" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          for service in instagram-shop-integration instagram-publishing-service instagram-insights-service social-content-publisher hashtag-research-engine caption-generator-ai content-calendar-service follower-growth-tracker youtube-integration pinterest-integration content-repurposing-engine ugc-management-service unified-social-inbox crisis-alert-service snapchat-integration social-competitor-tracker reddit-integration influencer-authenticity-check brand-partnership-portal content-compliance-ai; do
            echo "| $service | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          done
