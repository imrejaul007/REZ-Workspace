name: Security Scanning

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Sunday at 2am UTC
    - cron: '0 2 * * 0'

jobs:
  # ==========================================
  # npm Audit
  # ==========================================
  npm-audit:
    name: npm Audit - ads-service
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: REZ-ads-service/package-lock.json

      - name: Install dependencies
        run: |
          cd REZ-ads-service
          npm ci

      - name: Run npm audit
        id: audit
        run: |
          cd REZ-ads-service
          npm audit --audit-level=high
        continue-on-error: true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-ads-service
          path: |
            REZ-ads-service/npm-audit-results.json
            REZ-ads-service/package-audit.json
          retention-days: 30

      - name: Check audit results
        run: |
          if [ "${{ steps.audit.outcome }}" == "failure" ]; then
            echo "::warning title=npm Audit Failed::ads-service has high/critical vulnerabilities"
          fi

  npm-audit-decision:
    name: npm Audit - decision-service
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: REZ-decision-service/package-lock.json

      - name: Install dependencies
        run: |
          cd REZ-decision-service
          npm ci

      - name: Run npm audit
        id: audit
        run: |
          cd REZ-decision-service
          npm audit --audit-level=high
        continue-on-error: true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-decision-service
          path: |
            REZ-decision-service/npm-audit-results.json
            REZ-decision-service/package-audit.json
          retention-days: 30

      - name: Check audit results
        run: |
          if [ "${{ steps.audit.outcome }}" == "failure" ]; then
            echo "::warning title=npm Audit Failed::decision-service has high/critical vulnerabilities"
          fi

  # ==========================================
  # TruffleHog Secrets Scanning
  # ==========================================
  trufflehog:
    name: Secrets Scanning (TruffleHog)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: edpluto/trufflehog-action@latest
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          ignore_paths: |
            **/node_modules/**
            **/.git/**
            **/dist/**
            **/coverage/**

      - name: Save scan results
        if: always()
        run: |
          # Create summary file if scan results exist
          if [ -f "trufflehog-results.json" ]; then
            echo "Secrets scan completed with results"
            cat trufflehog-results.json | jq '.results | length' || true
          fi

  # ==========================================
  # Snyk Security (if configured)
  # ==========================================
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: vars.SNYK_TOKEN != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Snyk Security Scan - ads-service
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ vars.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --fail-on=all
          directory: ./REZ-ads-service

      - name: Run Snyk Security Scan - decision-service
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ vars.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --fail-on=all
          directory: ./REZ-decision-service

      - name: Upload Snyk report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: |
            **/snyk*.json
            **/snyk*.html
          retention-days: 30

  # ==========================================
  # Dependency Review
  # ==========================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Review Dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-ghsas: |
            GHSA-xxxx-xxxx-xxxx

  # ==========================================
  # Security Summary
  # ==========================================
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [npm-audit, npm-audit-decision, trufflehog]
    if: always()

    steps:
      - name: Generate security report
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          # npm audit ads-service
          if [ "${{ needs.npm-audit.result }}" == "success" ]; then
            echo "| npm Audit (ads-service) | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| npm Audit (ads-service) | :warning: Issues Found |" >> $GITHUB_STEP_SUMMARY
          fi

          # npm audit decision-service
          if [ "${{ needs.npm-audit-decision.result }}" == "success" ]; then
            echo "| npm Audit (decision-service) | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| npm Audit (decision-service) | :warning: Issues Found |" >> $GITHUB_STEP_SUMMARY
          fi

          # TruffleHog
          if [ "${{ needs.trufflehog.result }}" == "success" ]; then
            echo "| Secrets Scan (TruffleHog) | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Secrets Scan (TruffleHog) | :warning: Issues Found |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Scan ran at: $(date -u)_" >> $GITHUB_STEP_SUMMARY

      - name: Set output for overall status
        run: |
          if [ "${{ needs.npm-audit.result }}" == "success" ] && \
             [ "${{ needs.npm-audit-decision.result }}" == "success" ] && \
             [ "${{ needs.trufflehog.result }}" == "success" ]; then
            echo "All security scans passed"
          else
            echo "Some security scans found issues - review the results above"
            # Don't fail the workflow for warnings
          fi
