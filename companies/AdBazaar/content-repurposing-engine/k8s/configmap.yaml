apiVersion: v1
kind: ConfigMap
metadata:
  name: ad-bazaar-content-repurposing-config
  labels:
    app: ad-bazaar-content-repurposing
data:
  NODE_ENV: "production"
  PORT: "5100"
  LOG_LEVEL: "info"
  MONGODB_URI: "mongodb://mongo-cluster.mongodb.svc.cluster.local:27017/content_repurposing"
  REDIS_URL: "redis://redis-cluster.redis.svc.cluster.local:6379"
  OPENAI_API_KEY: "sk-placeholder"
  MAX_CONTENT_LENGTH: "4000"
  REPURPOSING_MODELS: "gpt-4,gpt-3.5-turbo"