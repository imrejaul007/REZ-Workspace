apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-bazaar-content-repurposing
  labels:
    app: ad-bazaar-content-repurposing
    tier: social-automation
    component: repurposing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ad-bazaar-content-repurposing
  template:
    metadata:
      labels:
        app: ad-bazaar-content-repurposing
        tier: social-automation
        component: repurposing
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5100"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: app
        image: adbazaar/content-repurposing-engine:latest
        ports:
        - containerPort: 5100
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: ad-bazaar-content-repurposing-config
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5100
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5100
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3