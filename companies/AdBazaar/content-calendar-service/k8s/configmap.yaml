apiVersion: v1
kind: ConfigMap
metadata:
  name: ad-bazaar-content-calendar-config
  labels:
    app: ad-bazaar-content-calendar
data:
  NODE_ENV: "production"
  PORT: "5092"
  LOG_LEVEL: "info"
  MONGODB_URI: "mongodb://mongo-cluster.mongodb.svc.cluster.local:27017/content_calendar"
  REDIS_URL: "redis://redis-cluster.redis.svc.cluster.local:6379"
  CALENDAR_CACHE_TTL: "3600"
  DEFAULT_TIMEZONE: "Asia/Kolkata"