  # =============================================================================
  # ADMIN DASHBOARD
  # =============================================================================

  social-automation-dashboard:
    build:
      context: ./social-automation-dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost
    networks:
      - social-automation-net
    restart: unless-stopped

  # =============================================================================
  # INFRASTRUCTURE
  # =============================================================================

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - social-automation-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - social-automation-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================================
# NETWORKS & VOLUMES
# =============================================================================

networks:
  social-automation-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
