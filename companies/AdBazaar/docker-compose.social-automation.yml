# =============================================================================
# AdBazaar - Social Automation Suite
# Docker Compose for all 20 social automation services
# =============================================================================

version: '3.8'

services:
  # =============================================================================
  # P0 - Critical Instagram Services (Ports 5080-5083)
  # =============================================================================

  instagram-shop-integration:
    build:
      context: ./instagram-shop-integration
      dockerfile: Dockerfile
    ports:
      - "5080:5080"
    environment:
      - NODE_ENV=production
      - PORT=5080
      - MONGODB_URI=mongodb://mongo:27017/instagram_shop
      - INSTAGRAM_BUSINESS_ACCOUNT_ID=${INSTAGRAM_BUSINESS_ACCOUNT_ID}
      - INSTAGRAM_CATALOG_ID=${INSTAGRAM_CATALOG_ID}
      - FACEBOOK_ACCESS_TOKEN=${FACEBOOK_ACCESS_TOKEN}
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET}
    depends_on:
      - mongo
    networks:
      - social-automation-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  instagram-publishing-service:
