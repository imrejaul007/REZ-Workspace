apiVersion: v1
kind: ConfigMap
metadata:
  name: ad-bazaar-caption-generator-config
  labels:
    app: ad-bazaar-caption-generator
data:
  NODE_ENV: "production"
  PORT: "5091"
  LOG_LEVEL: "info"
  MONGODB_URI: "mongodb://mongo-cluster.mongodb.svc.cluster.local:27017/caption_generator"
  REDIS_URL: "redis://redis-cluster.redis.svc.cluster.local:6379"
  OPENAI_API_KEY: "sk-placeholder"
  CAPTION_MAX_LENGTH: "2200"
  AI_MODEL: "gpt-4"
  TEMPERATURE: "0.7"