plugins {
    id 'com.android.library'
}

android {
    namespace 'com.rezapp.oemsdk'
    compileSdk 34
    defaultConfig {
        minSdk 21
        versionName '1.0.0'
        consumerProguardFiles 'consumer-rules.pro'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'com.google.firebase:firebase-messaging:23.4.0'
}
