# Prometheus configuration for REZ Marketing Platform

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # REZ Marketing Service
  - job_name: 'rez-marketing'
    static_configs:
      - targets: ['rez-marketing:4000']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # Redis Exporter (if added)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
