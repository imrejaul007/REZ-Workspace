apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ad-bazaar-social-competitor-tracker
  namespace: adbazaar
  labels:
    app: ad-bazaar-social-competitor-tracker
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  tls:
  - hosts:
    - competitor-tracker.adbazaar.internal
    secretName: ad-bazaar-social-competitor-tracker-tls
  rules:
  - host: competitor-tracker.adbazaar.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ad-bazaar-social-competitor-tracker
            port:
              number: 5105