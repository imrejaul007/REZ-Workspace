apiVersion: v1
kind: ConfigMap
metadata:
  name: ad-bazaar-social-competitor-tracker-config
  namespace: adbazaar
  labels:
    app: ad-bazaar-social-competitor-tracker
data:
  NODE_ENV: "production"
  MONGODB_URI: "mongodb://mongodb.adbazaar.svc.cluster.local:27017/social_competitor_tracker"
  REDIS_URL: "redis://redis.adbazaar.svc.cluster.local:6379/0"
  API_VERSION: "1.0.0"
  LOG_LEVEL: "info"
  TRACK_INTERVAL_MINUTES: "60"
  TWITTER_ENABLED: "true"
  LINKEDIN_ENABLED: "true"
  INSTAGRAM_ENABLED: "true"
  FACEBOOK_ENABLED: "true"
  TIKTOK_ENABLED: "true"
  YOUTUBE_ENABLED: "true"
  SENTIMENT_ANALYSIS_ENABLED: "true"
  ALERT_THRESHOLD_CHANGE_PERCENT: "20"
  MARKETING_INTEL_ENABLED: "true"
  PRICING_INTEL_ENABLED: "true"
  PRODUCT_INTEL_ENABLED: "true"
  CAMPAIGN_INTEL_ENABLED: "true"