apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-bazaar-social-competitor-tracker
  namespace: adbazaar
  labels:
    app: ad-bazaar-social-competitor-tracker
    tier: social-automation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ad-bazaar-social-competitor-tracker
  template:
    metadata:
      labels:
        app: ad-bazaar-social-competitor-tracker
        tier: social-automation
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5105"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: social-competitor-tracker
        image: adbazaar/social-competitor-tracker:latest
        ports:
        - containerPort: 5105
          name: http
        env:
        - name: PORT
          value: "5105"
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-social-competitor-tracker-config
              key: NODE_ENV
        - name: MONGODB_URI
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-social-competitor-tracker-config
              key: MONGODB_URI
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-social-competitor-tracker-config
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: jwt-secret
        - name: TWITTER_BEARER_TOKEN
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: twitter-bearer-token
        - name: LINKEDIN_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: linkedin-client-id
        - name: LINKEDIN_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: linkedin-client-secret
        resources:
          requests:
            cpu: 150m
            memory: 384Mi
          limits:
            cpu: 750m
            memory: 768Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 5105
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5105
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: app-config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: app-config
        configMap:
          name: ad-bazaar-social-competitor-tracker-config