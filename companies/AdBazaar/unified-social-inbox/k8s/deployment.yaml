apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-bazaar-unified-social-inbox
  namespace: adbazaar
  labels:
    app: ad-bazaar-unified-social-inbox
    tier: social-automation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ad-bazaar-unified-social-inbox
  template:
    metadata:
      labels:
        app: ad-bazaar-unified-social-inbox
        tier: social-automation
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5102"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: unified-social-inbox
        image: adbazaar/unified-social-inbox:latest
        ports:
        - containerPort: 5102
          name: http
        env:
        - name: PORT
          value: "5102"
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-unified-social-inbox-config
              key: NODE_ENV
        - name: MONGODB_URI
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-unified-social-inbox-config
              key: MONGODB_URI
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-unified-social-inbox-config
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: jwt-secret
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: slack-webhook-url
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: slack-bot-token
        - name: DISCORD_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: discord-webhook-url
        resources:
          requests:
            cpu: 150m
            memory: 384Mi
          limits:
            cpu: 750m
            memory: 768Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 5102
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5102
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: app-config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: app-config
        configMap:
          name: ad-bazaar-unified-social-inbox-config