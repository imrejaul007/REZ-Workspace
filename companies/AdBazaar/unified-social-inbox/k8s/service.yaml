apiVersion: v1
kind: Service
metadata:
  name: ad-bazaar-unified-social-inbox
  namespace: adbazaar
  labels:
    app: ad-bazaar-unified-social-inbox
    tier: social-automation
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5102"
spec:
  type: ClusterIP
  ports:
  - port: 5102
    targetPort: 5102
    protocol: TCP
    name: http
  selector:
    app: ad-bazaar-unified-social-inbox