apiVersion: v1
kind: ConfigMap
metadata:
  name: ad-bazaar-unified-social-inbox-config
  namespace: adbazaar
  labels:
    app: ad-bazaar-unified-social-inbox
data:
  NODE_ENV: "production"
  MONGODB_URI: "mongodb://mongodb.adbazaar.svc.cluster.local:27017/unified_social_inbox"
  REDIS_URL: "redis://redis.adbazaar.svc.cluster.local:6379/0"
  API_VERSION: "1.0.0"
  LOG_LEVEL: "info"
  POLL_INTERVAL: "30000"
  MAX_MESSAGE_LENGTH: "4000"
  INBOX_RETENTION_DAYS: "90"
  NOTIFICATION_ENABLED: "true"
  WEBSOCKET_ENABLED: "true"
  SLACK_ENABLED: "true"
  DISCORD_ENABLED: "true"
  FACEBOOK_ENABLED: "true"
  TWITTER_ENABLED: "true"
  INSTAGRAM_ENABLED: "true"
  RESPONSE_SLA_MINUTES: "60"
  AUTO_ASSIGN_ENABLED: "true"