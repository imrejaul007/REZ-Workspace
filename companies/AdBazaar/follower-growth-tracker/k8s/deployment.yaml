apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-bazaar-follower-growth
  labels:
    app: ad-bazaar-follower-growth
    tier: social-automation
    component: analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ad-bazaar-follower-growth
  template:
    metadata:
      labels:
        app: ad-bazaar-follower-growth
        tier: social-automation
        component: analytics
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5093"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: app
        image: adbazaar/follower-growth-tracker:latest
        ports:
        - containerPort: 5093
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: ad-bazaar-follower-growth-config
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5093
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5093
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3