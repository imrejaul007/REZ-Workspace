name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rez-deal-manager:${{ github.sha }} .

      - name: Run container health check
        run: |
          docker run -d --name test -p 4062:4062 rez-deal-manager:${{ github.sha }}
          sleep 5
          docker exec test wget -qO- http://localhost:4062/health
          docker stop test
