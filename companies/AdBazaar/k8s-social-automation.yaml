# AdBazaar Social Automation Services - K8s Manifests
# Namespace: adbazaar-social

---
# 1. instagram-shop-integration (Port 5080)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-bazaar-instagram-shop
  namespace: adbazaar-social
  labels:
    app: ad-bazaar-instagram-shop
    tier: social-automation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ad-bazaar-instagram-shop
  template:
    metadata:
      labels:
        app: ad-bazaar-instagram-shop
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5080"
    spec:
      containers:
      - name: app
        image: adbazaar/instagram-shop-integration:latest
        ports:
        - containerPort: 5080
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5080
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 5080

