apiVersion: v1
kind: ConfigMap
metadata:
  name: ad-bazaar-influencer-authenticity-config
  namespace: adbazaar
  labels:
    app: ad-bazaar-influencer-authenticity
data:
  NODE_ENV: "production"
  MONGODB_URI: "mongodb://mongodb.adbazaar.svc.cluster.local:27017/influencer_authenticity"
  REDIS_URL: "redis://redis.adbazaar.svc.cluster.local:6379/0"
  API_VERSION: "1.0.0"
  LOG_LEVEL: "info"
  AI_MODEL_PROVIDER: "openai"
  FAKE_FOLLOWER_THRESHOLD_PERCENT: "15"
  ENGAGEMENT_RATE_MIN: "2.0"
  BOT_DETECTION_ENABLED: "true"
  AUDIT_HISTORY_RETENTION_DAYS: "365"
  SCAN_INTERVAL_HOURS: "24"
  ALERT_ON_SUSPICIOUS_ACTIVITY: "true"
  FAKE_DETECTION_CONFIDENCE_THRESHOLD: "0.85"
  SPAM_DETECTION_ENABLED: "true"
  AUDIENCE_QUALITY_SCORING_ENABLED: "true"
  INFLUENCER_DATABASE_REFRESH_HOURS: "12"