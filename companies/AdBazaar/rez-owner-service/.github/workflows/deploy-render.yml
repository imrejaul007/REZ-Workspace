name: Deploy to Render

on:
  push:
    branches:
      - main
    paths:
      - 'rez-owner-service/**'
  workflow_dispatch:

concurrency:
  group: render-owner-service
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render
        uses: render-deploy-action/render-deploy-action@v0.0.8
        with:
          render-deploy-token: ${{ secrets.RENDER_DEPLOY_TOKEN }}
          service-id: ${{ vars.RENDER_OWNER_SERVICE_ID }}
