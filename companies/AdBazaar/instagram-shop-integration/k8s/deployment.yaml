apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-bazaar-instagram-shop
  labels:
    app: ad-bazaar-instagram-shop
    tier: social-automation
    component: instagram
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ad-bazaar-instagram-shop
  template:
    metadata:
      labels:
        app: ad-bazaar-instagram-shop
        tier: social-automation
        component: instagram
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: app
        image: adbazaar/instagram-shop-integration:latest
        ports:
        - containerPort: 5080
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: ad-bazaar-instagram-shop-config
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]
