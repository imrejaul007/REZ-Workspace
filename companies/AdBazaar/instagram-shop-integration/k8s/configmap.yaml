apiVersion: v1
kind: ConfigMap
metadata:
  name: ad-bazaar-instagram-shop-config
  labels:
    app: ad-bazaar-instagram-shop
data:
  NODE_ENV: "production"
  PORT: "5080"
  LOG_LEVEL: "info"
  MONGODB_URI: "mongodb://mongo-cluster.mongodb.svc.cluster.local:27017/instagram_shop"
  REDIS_URL: "redis://redis-cluster.redis.svc.cluster.local:6379"
  INSTAGRAM_API_VERSION: "v18.0"
  GRAPH_API_URL: "https://graph.instagram.com"
  WHATSAPP_WEBHOOK_URL: "https://api.adbazaar.internal/webhooks/whatsapp"
