apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-bazaar-crisis-alert
  namespace: adbazaar
  labels:
    app: ad-bazaar-crisis-alert
    tier: social-automation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ad-bazaar-crisis-alert
  template:
    metadata:
      labels:
        app: ad-bazaar-crisis-alert
        tier: social-automation
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5103"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: crisis-alert-service
        image: adbazaar/crisis-alert-service:latest
        ports:
        - containerPort: 5103
          name: http
        env:
        - name: PORT
          value: "5103"
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-crisis-alert-config
              key: NODE_ENV
        - name: MONGODB_URI
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-crisis-alert-config
              key: MONGODB_URI
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-crisis-alert-config
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: jwt-secret
        - name: TWILIO_ACCOUNT_SID
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: twilio-account-sid
        - name: TWILIO_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: twilio-auth-token
        - name: TWILIO_PHONE_NUMBER
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: twilio-phone-number
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 5103
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5103
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: app-config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: app-config
        configMap:
          name: ad-bazaar-crisis-alert-config