apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ad-bazaar-pinterest-integration
  labels:
    app: ad-bazaar-pinterest-integration
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
  - hosts:
    - pinterest-integration.adbazaar.internal
    secretName: ad-bazaar-pinterest-integration-tls
  rules:
  - host: pinterest-integration.adbazaar.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ad-bazaar-pinterest-integration
            port:
              number: 80