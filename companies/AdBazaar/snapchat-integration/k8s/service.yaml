apiVersion: v1
kind: Service
metadata:
  name: ad-bazaar-snapchat-integration
  namespace: adbazaar
  labels:
    app: ad-bazaar-snapchat-integration
    tier: social-automation
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5104"
spec:
  type: ClusterIP
  ports:
  - port: 5104
    targetPort: 5104
    protocol: TCP
    name: http
  selector:
    app: ad-bazaar-snapchat-integration