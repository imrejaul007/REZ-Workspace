apiVersion: v1
kind: ConfigMap
metadata:
  name: ad-bazaar-brand-partnership-config
  namespace: adbazaar
  labels:
    app: ad-bazaar-brand-partnership
data:
  NODE_ENV: "production"
  MONGODB_URI: "mongodb://mongodb.adbazaar.svc.cluster.local:27017/brand_partnership"
  REDIS_URL: "redis://redis.adbazaar.svc.cluster.local:6379/0"
  API_VERSION: "1.0.0"
  LOG_LEVEL: "info"
  EMAIL_ENABLED: "true"
  PAYMENT_ENABLED: "true"
  CONTRACT_TEMPLATE_ID: "default-partnership"
  NDA_REQUIRED: "true"
  CONTRACT_VALIDITY_DAYS: "365"
  PAYMENT_HOLD_PERCENT: "20"
  ESCALATION_EMAIL: "partnerships@adbazaar.com"
  PARTNERSHIP_APPROVAL_REQUIRED: "true"
  AUTO_MATCHING_ENABLED: "true"
  CAMPAIGN_COLLABORATION_ENABLED: "true"
  PERFORMANCE_REPORTING_ENABLED: "true"
  PAYMENT_PROCESSING_FEE_PERCENT: "5"