# render.yaml for rez-ad-ai (Ad Copilot)
# Intent prediction service for ad targeting
services:
  - type: web
    name: rez-ad-ai
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: npx ts-node src/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4021"
      - key: MONGODB_URI
        sync: false
