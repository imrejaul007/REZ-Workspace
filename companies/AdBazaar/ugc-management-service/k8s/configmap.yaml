apiVersion: v1
kind: ConfigMap
metadata:
  name: ad-bazaar-ugc-management-config
  namespace: adbazaar
  labels:
    app: ad-bazaar-ugc-management
data:
  NODE_ENV: "production"
  MONGODB_URI: "mongodb://mongodb.adbazaar.svc.cluster.local:27017/ugc_management"
  REDIS_URL: "redis://redis.adbazaar.svc.cluster.local:6379/0"
  API_VERSION: "1.0.0"
  LOG_LEVEL: "info"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW: "60"
  UGC_MAX_FILE_SIZE: "10485760"
  UGC_ALLOWED_TYPES: "image/jpeg,image/png,image/gif,video/mp4"
  S3_BUCKET: "ad-bazaar-ugc"
  CDN_URL: "https://cdn.adbazaar.com"
  CONTENT_MODERATION_ENABLED: "true"
  WEBHOOK_RETRY_ATTEMPTS: "3"
  WEBHOOK_RETRY_DELAY: "5000"