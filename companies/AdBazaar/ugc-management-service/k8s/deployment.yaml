apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-bazaar-ugc-management
  namespace: adbazaar
  labels:
    app: ad-bazaar-ugc-management
    tier: social-automation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ad-bazaar-ugc-management
  template:
    metadata:
      labels:
        app: ad-bazaar-ugc-management
        tier: social-automation
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5101"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: ugc-management-service
        image: adbazaar/ugc-management-service:latest
        ports:
        - containerPort: 5101
          name: http
        env:
        - name: PORT
          value: "5101"
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-ugc-management-config
              key: NODE_ENV
        - name: MONGODB_URI
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-ugc-management-config
              key: MONGODB_URI
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-ugc-management-config
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: jwt-secret
        - name: MONGODB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: mongodb-password
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 5101
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5101
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: app-config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: app-config
        configMap:
          name: ad-bazaar-ugc-management-config