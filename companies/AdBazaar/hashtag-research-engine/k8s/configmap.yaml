apiVersion: v1
kind: ConfigMap
metadata:
  name: ad-bazaar-hashtag-research-config
  labels:
    app: ad-bazaar-hashtag-research
data:
  NODE_ENV: "production"
  PORT: "5090"
  LOG_LEVEL: "info"
  MONGODB_URI: "mongodb://mongo-cluster.mongodb.svc.cluster.local:27017/hashtag_research"
  REDIS_URL: "redis://redis-cluster.redis.svc.cluster.local:6379"
  HASHTAG_CACHE_TTL: "86400"
  TRENDING_WINDOW_DAYS: "7"