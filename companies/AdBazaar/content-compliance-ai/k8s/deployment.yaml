apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-bazaar-content-compliance
  namespace: adbazaar
  labels:
    app: ad-bazaar-content-compliance
    tier: social-automation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ad-bazaar-content-compliance
  template:
    metadata:
      labels:
        app: ad-bazaar-content-compliance
        tier: social-automation
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5113"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: content-compliance-ai
        image: adbazaar/content-compliance-ai:latest
        ports:
        - containerPort: 5113
          name: http
        env:
        - name: PORT
          value: "5113"
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-content-compliance-config
              key: NODE_ENV
        - name: MONGODB_URI
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-content-compliance-config
              key: MONGODB_URI
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: ad-bazaar-content-compliance-config
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: jwt-secret
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: openai-api-key
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: aws-access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: adbazaar-secrets
              key: aws-secret-access-key
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 5113
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5113
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: app-config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: app-config
        configMap:
          name: ad-bazaar-content-compliance-config