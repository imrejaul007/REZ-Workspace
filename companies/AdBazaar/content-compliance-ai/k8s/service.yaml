apiVersion: v1
kind: Service
metadata:
  name: ad-bazaar-content-compliance
  namespace: adbazaar
  labels:
    app: ad-bazaar-content-compliance
    tier: social-automation
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5113"
spec:
  type: ClusterIP
  ports:
  - port: 5113
    targetPort: 5113
    protocol: TCP
    name: http
  selector:
    app: ad-bazaar-content-compliance