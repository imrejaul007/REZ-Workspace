apiVersion: v1
kind: ConfigMap
metadata:
  name: ad-bazaar-content-compliance-config
  namespace: adbazaar
  labels:
    app: ad-bazaar-content-compliance
data:
  NODE_ENV: "production"
  MONGODB_URI: "mongodb://mongodb.adbazaar.svc.cluster.local:27017/content_compliance"
  REDIS_URL: "redis://redis.adbazaar.svc.cluster.local:6379/0"
  API_VERSION: "1.0.0"
  LOG_LEVEL: "info"
  AI_MODEL_PROVIDER: "openai"
  CONTENT_MODERATION_MODE: "strict"
  SCAN_IMAGES: "true"
  SCAN_VIDEOS: "true"
  SCAN_TEXT: "true"
  SCAN_AUDIO: "true"
  BRAND_SAFETY_ENABLED: "true"
  DEFAMATION_CHECK_ENABLED: "true"
  COPYRIGHT_CHECK_ENABLED: "true"
  MISINFORMATION_CHECK_ENABLED: "true"
  NSFW_DETECTION_ENABLED: "true"
  PROHIBITED_CONTENT_THRESHOLD: "0.8"
  MODERATION_REVIEW_QUEUE_ENABLED: "true"
  AUTO_REJECT_HIGH_RISK: "true"
  AUDIT_RETENTION_DAYS: "730"
  IMAGE_MAX_FILE_SIZE_MB: "50"
  VIDEO_MAX_FILE_SIZE_MB: "500"