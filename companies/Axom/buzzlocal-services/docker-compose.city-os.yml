version: '3.8'

services:
  # ============================================
  # CITY OS CORE SERVICES (4015-4019)
  # ============================================

  buzzlocal-ask-service:
    build: ./buzzlocal-ask-service
    container_name: buzzlocal-ask
    ports:
      - "4015:4015"
    environment:
      - PORT=4015
      - MONGODB_URI=mongodb://mongo:27017/buzzlocal-ask
      - NODE_ENV=development
      - REZ_INTENT_PREDICTOR_URL=http://intent-predictor:4018
      - REZ_WALLET_SERVICE_URL=http://rez-wallet-service:4004
      - REZ_GAMIFICATION_SERVICE_URL=http://rez-gamification-service:4041
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
    depends_on:
      - mongo
    networks:
      - buzzlocal-network
    restart: unless-stopped

  buzzlocal-trust-service:
    build: ./buzzlocal-trust-service
    container_name: buzzlocal-trust
    ports:
      - "4016:4016"
    environment:
      - PORT=4016
      - MONGODB_URI=mongodb://mongo:27017/buzzlocal-trust
      - NODE_ENV=development
      - REZ_AUTH_SERVICE_URL=http://rez-auth-service:4002
      - REZ_WALLET_SERVICE_URL=http://rez-wallet-service:4004
      - REZ_GAMIFICATION_SERVICE_URL=http://rez-gamification-service:4041
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
    depends_on:
      - mongo
    networks:
      - buzzlocal-network
    restart: unless-stopped

  buzzlocal-safety-service:
