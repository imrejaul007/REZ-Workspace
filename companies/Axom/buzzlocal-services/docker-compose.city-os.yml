      - NODE_ENV=development
      - REZ_AUTH_SERVICE_URL=http://rez-auth-service:4002
      - REZ_NOTIFICATIONS_SERVICE_URL=http://rez-notifications-service:4011
      - REZ_CARE_SERVICE_URL=http://REZ-care-service:4055
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
    depends_on:
      - mongo
    networks:
      - buzzlocal-network
    restart: unless-stopped

  buzzlocal-agency-service:
