    restart: unless-stopped

  # ============================================
  # DEPENDENCIES
  # ============================================

  mongo:
    image: mongo:7
    container_name: buzzlocal-mongo
    ports:
      - "27017:27017"
    volumes:
      - buzzlocal-mongo-data:/data/db
    networks:
      - buzzlocal-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: buzzlocal-redis
    ports:
      - "6379:6379"
    volumes:
      - buzzlocal-redis-data:/data
    networks:
      - buzzlocal-network
    restart: unless-stopped

networks:
  buzzlocal-network:
    driver: bridge

volumes:
  buzzlocal-mongo-data:
  buzzlocal-redis-data:
