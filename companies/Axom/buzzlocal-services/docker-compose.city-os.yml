  buzzlocal-weather-service:
    build: ./buzzlocal-weather-service
    container_name: buzzlocal-weather
    ports:
      - "4014:4014"
    environment:
      - PORT=4014
      - MONGODB_URI=mongodb://mongo:27017/buzzlocal-weather
      - NODE_ENV=development
    depends_on:
