name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - buzzlocal-feed-service
          - buzzlocal-vibe-service
          - buzzlocal-community-service
          - z-events-service
          - buzzlocal-intelligence-service
          - buzzlocal-notification-service
          - buzzlocal-realtime-service
          - buzzlocal-payment-service
          - buzzlocal-weather-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || echo "No lint script"

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - buzzlocal-feed-service
          - buzzlocal-vibe-service
          - buzzlocal-community-service
          - z-events-service
          - buzzlocal-intelligence-service
          - buzzlocal-notification-service
          - buzzlocal-realtime-service
          - buzzlocal-payment-service
          - buzzlocal-weather-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test || echo "No tests configured"

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        service:
          - buzzlocal-feed-service
          - buzzlocal-vibe-service
          - buzzlocal-community-service
          - z-events-service
          - buzzlocal-intelligence-service
          - buzzlocal-notification-service
          - buzzlocal-realtime-service
          - buzzlocal-payment-service
          - buzzlocal-weather-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          npm ci

      - name: Build
        run: |
          cd ${{ matrix.service }}
          npm run build
