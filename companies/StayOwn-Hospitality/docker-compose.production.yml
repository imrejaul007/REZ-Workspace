# StayOwn Hospitality - Production Docker Compose
# Deploy all services with proper configuration

version: '3.8'

services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================

  mongodb:
    image: mongo:7.0
    container_name: stayown-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: stayown
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - stayown-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stayown-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - stayown-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: stayown-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - stayown-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # CORE AI SERVICES
  # ============================================

  hojai-memory:
    build:
      context: ./hojai-memory
      dockerfile: Dockerfile
    container_name: stayown-hojai-memory
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4520
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/hojai-memory?authSource=admin
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    ports:
      - "4520:4520"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - stayown-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4520/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hojai-staybot:
    build:
      context: ./hojai-staybot
      dockerfile: Dockerfile
    container_name: stayown-hojai-staybot
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4840
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/hojai-staybot?authSource=admin
      HOJAI_BRAIN_URL: ${HOJAI_BRAIN_URL:-http://hojai-brain:4530}
      HOJAI_BRAIN_API_KEY: ${HOJAI_BRAIN_API_KEY:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    ports:
      - "4840:4840"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - stayown-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4840/health"]
