      - "4042:4042"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - stayown-network

  rez-housekeeping:
    build:
      context: ./rez-housekeeping
      dockerfile: Dockerfile
    container_name: stayown-rez-housekeeping
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4021
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/rez-housekeeping?authSource=admin
    ports:
      - "4021:4021"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - stayown-network

# ============================================
# NETWORKS & VOLUMES
# ============================================

networks:
  stayown-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data: