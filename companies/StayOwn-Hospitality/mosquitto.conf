# Mosquitto MQTT Broker Configuration for Invisible Hotel

# Basic Settings
listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection limits
max_connections -1
max_keepalive 65535

# Message limits
message_size_limit 0
max_queued_messages 1000

# QoS settings
max_inflight_messages 20

# Persistence
persistence true
persistence_flash 600

# WebSockets (for web clients)
listener 9001
protocol websockets

# Authentication (optional - uncomment for production)
# password_file /mosquitto/config/passwd
# allow_anonymous false

# ACL file (optional)
# acl_file /mosquitto/config/acl