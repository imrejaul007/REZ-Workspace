  pre-arrival-service:
    build:
      context: ./pre-arrival-service
      dockerfile: Dockerfile
    ports:
      - "3828:3828"
    environment:
      - NODE_ENV=production
      - NODE_ENV=production
      - PORT=3828
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
      - GUEST_SERVICE_URL=http://host.docker.internal:3800
      - EMAIL_URL=http://host.docker.internal:4510
      - SMS_URL=http://host.docker.internal:4510
      - ROOM_SERVICE_URL=http://host.docker.internal:3800
      - HOUSEKEEPING_URL=http://predictive-housekeeping:3826
      - MINIBAR_URL=http://minibar-service:3810
      - FRONTEND_URL=https://rez.app
    depends_on:
