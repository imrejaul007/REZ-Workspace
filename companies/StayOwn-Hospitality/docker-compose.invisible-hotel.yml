  zero-checkout-automation:
    build:
      context: ./zero-checkout-automation
      dockerfile: Dockerfile
    ports:
      - "3827:3827"
    environment:
      - NODE_ENV=production
      - PORT=3827
      - REDIS_URL=redis://redis:6379
