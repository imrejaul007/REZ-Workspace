      - PAYMENT_URL=http://host.docker.internal:4001
      - WALLET_URL=http://host.docker.internal:4004
      - BOOKING_URL=http://host.docker.internal:4020
      - SMART_LOCK_URL=http://smart-lock-service:3825
      - MINIBAR_URL=http://minibar-service:3810
      - RESTAURANT_URL=http://hotel-restaurant-booking:3811
      - SPA_URL=http://hotel-spa-booking:3812
      - LAUNDRY_URL=http://host.docker.internal:4048
    depends_on:
      redis:
        condition: service_healthy
      minibar-service:
        condition: service_started
    networks:
