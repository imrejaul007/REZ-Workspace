  smart-lock-service:
    build:
      context: ./smart-lock-service
      dockerfile: Dockerfile
    ports:
      - "3825:3825"
    environment:
      - NODE_ENV=production
      - PORT=3825
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
      - PMS_URL=http://host.docker.internal:4031
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - invisible-hotel

  predictive-housekeeping:
    build:
      context: ./predictive-housekeeping
      dockerfile: Dockerfile
    ports:
      - "3826:3826"
    environment:
      - NODE_ENV=production
      - PORT=3826
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
      - HOUSEKEEPING_URL=http://host.docker.internal:4021
    depends_on:
      redis:
        condition: service_healthy
    networks:
