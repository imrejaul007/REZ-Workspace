# Invisible Hotel - Docker Compose
# Complete stack for The Invisible Hotel experience

version: '3.8'

services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: hotel
      RABBITMQ_DEFAULT_PASS: hotel123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================
  # CORE HOTEL SERVICES
  # ============================================

  ai-front-desk:
    build:
      context: ./ai-front-desk
      dockerfile: Dockerfile
    ports:
      - "3800:3800"
    environment:
      - NODE_ENV=production
      - PORT=3800
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
      - STAYBOT_URL=http://host.docker.internal:4840
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - invisible-hotel

  hotel-os-integration:
    build:
      context: ./hotel-os-integration
      dockerfile: Dockerfile
    ports:
      - "3899:3899"
    environment:
      - NODE_ENV=production
      - PORT=3899
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - invisible-hotel

  # ============================================
  # INVISIBLE HOTEL SERVICES (Ports 3810-3828)
  # ============================================

  minibar-service:
    build:
      context: ./minibar-service
      dockerfile: Dockerfile
    ports:
      - "3810:3810"
    environment:
      - NODE_ENV=production
      - PORT=3810
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
      - WALLET_URL=http://host.docker.internal:4004
      - PAYMENT_URL=http://host.docker.internal:4001
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - invisible-hotel

  hotel-restaurant-booking:
    build:
      context: ./hotel-restaurant-booking
      dockerfile: Dockerfile
    ports:
      - "3811:3811"
    environment:
      - NODE_ENV=production
      - PORT=3811
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
      - RESTAURANT_SERVICE_URL=http://host.docker.internal:4017
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - invisible-hotel

  hotel-spa-booking:
    build:
      context: ./hotel-spa-booking
      dockerfile: Dockerfile
    ports:
      - "3812:3812"
    environment:
      - NODE_ENV=production
      - PORT=3812
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
      - SPA_INVENTORY_URL=http://host.docker.internal:4402
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - invisible-hotel

  room-controls:
    build:
      context: ./room-controls
      dockerfile: Dockerfile
    ports:
      - "3814:3814"
    environment:
      - NODE_ENV=production
      - PORT=3814
      - REDIS_URL=redis://redis:6379
      - MQTT_URL=mqtt://mosquitto:1883
      - MQTT_USER=hotel
      - MQTT_PASS=hotel123
    depends_on:
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - invisible-hotel

  parking-service:
    build:
      context: ./parking-service
      dockerfile: Dockerfile
    ports:
      - "3815:3815"
    environment:
      - NODE_ENV=production
      - PORT=3815
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - invisible-hotel

  lost-found:
    build:
      context: ./lost-found
      dockerfile: Dockerfile
    ports:
      - "3816:3816"
    environment:
      - NODE_ENV=production
      - PORT=3816
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
      - NOTIFICATION_URL=http://host.docker.internal:4510
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - invisible-hotel

  upsell-engine:
    build:
      context: ./upsell-engine
      dockerfile: Dockerfile
    ports:
      - "3817:3817"
    environment:
      - NODE_ENV=production
      - PORT=3817
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
      - BOOKING_URL=http://host.docker.internal:4042
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - invisible-hotel

  loyalty-system:
    build:
      context: ./loyalty-system
