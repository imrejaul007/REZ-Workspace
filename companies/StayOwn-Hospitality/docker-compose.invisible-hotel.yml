  # ============================================
  # VOICE AGENT
  # ============================================

  voice-hotel-agent:
    build:
      context: ./voice-hotel-agent
      dockerfile: Dockerfile
    ports:
      - "4870:4870"
    environment:
      - NODE_ENV=production
      - PORT=4870
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - GUEST_SERVICE_URL=http://host.docker.internal:3800
      - BOOKING_URL=http://host.docker.internal:4020
      - ROOM_SERVICE_URL=http://host.docker.internal:4043
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - invisible-hotel

# ============================================
# NETWORKS & VOLUMES
# ============================================

networks:
  invisible-hotel:
    driver: bridge

volumes:
  redis_data:
  mongo_data:
  rabbitmq_data:
  mosquitto_data:
  mosquitto_logs:
