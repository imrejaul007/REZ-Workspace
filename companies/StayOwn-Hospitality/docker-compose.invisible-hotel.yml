    ports:
      - "3818:3818"
    environment:
      - NODE_ENV=production
      - PORT=3818
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
      - WALLET_URL=http://host.docker.internal:4004
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - invisible-hotel

  review-manager:
    build:
      context: ./review-manager
      dockerfile: Dockerfile
    ports:
      - "3819:3819"
    environment:
      - NODE_ENV=production
      - PORT=3819
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - invisible-hotel

  feedback-survey:
    build:
      context: ./feedback-survey
      dockerfile: Dockerfile
    ports:
      - "3820:3820"
    environment:
      - NODE_ENV=production
      - PORT=3820
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - invisible-hotel

  concierge-desk:
    build:
      context: ./concierge-desk
      dockerfile: Dockerfile
    ports:
      - "3821:3821"
    environment:
      - NODE_ENV=production
      - PORT=3821
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://hotel:hotel123@rabbitmq:5672
    depends_on:
      redis:
        condition: service_healthy
    networks:
