version: '3.8'

services:
  ops-center:
    build: ./ops-center
    container_name: ree-ops-center
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - SERVICE_NAME=ops-center
      - REE_MODE=standalone
    networks:
      - ree-network
    restart: unless-stopped

  trust-platform:
    build: ./trust-platform
    container_name: ree-trust-platform
