# CorpPerks Render Blueprint - Main Services
# Deploy CorpPerks backend services to Render

services:
  # =============================================================================
  # CORE BACKEND SERVICES
  # =============================================================================

  # CorpPerks Backend API
  - type: web
    name: corpperks-api
    env: node
    region: singapore
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4006"
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: CORS_ORIGIN
        value: https://admin.rez.money,https://rez.money,https://app.rez.money
      - key: INTERNAL_SERVICE_TOKEN
        generateValue: true
      - key: RABTUL_AUTH_URL
        value: https://rez-auth-service.onrender.com
      - key: RABTUL_PROFILE_URL
        value: https://rez-profile-service.onrender.com
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"

