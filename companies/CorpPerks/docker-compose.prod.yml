    container_name: projectos-service
    restart: unless-stopped
    ports:
      - "4715:4715"
    environment:
      - NODE_ENV=production
      - PORT=4715
      - MONGODB_URI=mongodb://mongodb:27017/projectos
      - REDIS_URL=redis://redis:6379
