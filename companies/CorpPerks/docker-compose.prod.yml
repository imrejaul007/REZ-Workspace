# CorpPerks Production Docker Compose
# =====================================
# Complete production deployment for all CorpPerks services
# Usage: docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # ==========================================================================
  # INFRASTRUCTURE SERVICES
  # ==========================================================================

  mongodb:
    image: mongo:7.0
    container_name: corperks-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./config/mongodb/mongod.conf:/etc/mongod.conf
    environment:
      - MONGO_INITDB_DATABASE=corpperks
    command: mongod --config /etc/mongod.conf
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - corperks-network

  redis:
    image: redis:7-alpine
    container_name: corperks-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis-dev-password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - corperks-network

  # ==========================================================================
  # CORE BACKEND SERVICES
  # ==========================================================================

  corperks-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: corperks-api
    restart: unless-stopped
    ports:
      - "4006:4006"
    environment:
      - NODE_ENV=production
      - PORT=4006
      - MONGODB_URI=mongodb://mongodb:27017/corpperks
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis-dev-password}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - RABTUL_AUTH_URL=${RABTUL_AUTH_URL}
      - RABTUL_PROFILE_URL=${RABTUL_PROFILE_URL}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - corperks-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  corpperks-intelligence:
    build:
      context: ./corpperks-intelligence
      dockerfile: Dockerfile
    container_name: corpperks-intelligence
    restart: unless-stopped
    ports:
      - "4135:4135"
    environment:
      - NODE_ENV=production
      - PORT=4135
      - MONGODB_URI=mongodb://mongodb:27017/corpperks_intel
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis-dev-password}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4135/health"]
      interval: 30s
