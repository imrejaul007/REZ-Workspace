# =============================================================================
# CorpPerks Nginx Load Balancer Configuration
# =============================================================================
# Production-ready load balancer configuration for CorpPerks services
# Place this file in /etc/nginx/conf.d/corpperks.conf
# =============================================================================

# Worker configuration
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

# Stream configuration for TCP (WebSocket, etc.)
stream {
    # WebSocket load balancing
    upstream corperks_websocket {
        least_conn;
        server 127.0.0.1:4006;
        server 127.0.0.1:4006_2;
        server 127.0.0.1:4006_3;
    }

    server {
        listen 8080;
        proxy_pass corperks_websocket;
        proxy_timeout 86400;
        proxy_connect_timeout 60s;
    }
}

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Character encoding
    charset utf-8;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/corpperks_access.log main;
    error_log /var/log/nginx/corpperks_error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript
               image/svg+xml application/vnd.ms-fontobject application/x-font-ttf
               font/opentype;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Client body size
    client_max_body_size 50M;
    client_body_buffer_size 256k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # Timeouts
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_intercept_errors off;
    proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 30s;

    # Upstream definitions
    upstream corperks_api {
        least_conn;
        server 127.0.0.1:4006 weight=5;
        server 127.0.0.1:4006_2 weight=3;
        server 127.0.0.1:4006_3 weight=2;
        keepalive 64;
    }

    upstream corperks_intel {
        least_conn;
        server 127.0.0.1:4135 weight=5;
        server 127.0.0.1:4135_2 weight=3;
        keepalive 32;
    }

    upstream projectos_api {
        server 127.0.0.1:4715 weight=5;
        server 127.0.0.1:4715_2 weight=3;
        keepalive 32;
    }

    upstream corpid_api {
        server 127.0.0.1:4700 weight=5;
        server 127.0.0.1:4700_2 weight=3;
        keepalive 32;
    }

    upstream peopleos_frontend {
        server 127.0.0.1:3000 weight=5;
        server 127.0.0.1:3001 weight=3;
        keepalive 16;
    }

    # =============================================================================
    # SERVER BLOCKS
    # =============================================================================

    # ---------------------------------------------------------------------------
    # CorpPerks API (Backend)
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name api.corpperks.com api.corpperks.com;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Health check endpoint (bypass rate limiting)
        location /health {
            proxy_pass http://corperks_api;
            proxy_set_header Host $host;
            access_log off;
        }

        location /ready {
            proxy_pass http://corperks_api;
            proxy_set_header Host $host;
            access_log off;
        }

        # API routes with rate limiting
        location /api {
            limit_req zone=api burst=20 nodelay;
            limit_conn addr 10;

            proxy_pass http://corperks_api;
            proxy_set_header Host $host;

            # Timeouts for API
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Auth routes with stricter rate limiting
        location /api/auth {
            limit_req zone=auth burst=5 nodelay;
            limit_conn addr 5;

            proxy_pass http://corperks_api;
            proxy_set_header Host $host;
        }

        # File upload routes
        location /api/upload {
            limit_req zone=upload burst=2 nodelay;
            client_max_body_size 50M;

            proxy_pass http://corperks_api;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }

        # WebSocket support
        location /ws {
            proxy_pass http://corperks_websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Static files caching
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://corperks_api;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ---------------------------------------------------------------------------
    # CorpPerks Intelligence
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name intel.corpperks.com;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://corperks_intel;
            proxy_set_header Host $host;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health {
            proxy_pass http://corperks_intel;
            access_log off;
        }
    }

    # ---------------------------------------------------------------------------
    # ProjectOS
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name projectos.corpperks.com;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://projectos_api;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://projectos_api;
            access_log off;
        }
    }

    # ---------------------------------------------------------------------------
    # CorpID
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name corpid.corpperks.com;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://corpid_api;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://corpid_api;
            access_log off;
        }
    }

    # ---------------------------------------------------------------------------
    # PeopleOS Frontend
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name peopleos.corpperks.com www.peopleos.corpperks.com;

        root /var/www/peopleos;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.corpperks.com https://intel.corpperks.com;" always;

        # Gzip static files
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

        # Next.js static files
        location /_next/static {
            alias /var/www/peopleos/.next/static;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Static files
        location /static {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # API proxy
        location /api/ {
            proxy_pass http://corperks_api;
            proxy_set_header Host $host;
        }

        # Next.js pages
        location / {
            proxy_pass http://peopleos_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            proxy_pass http://peopleos_frontend;
            access_log off;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }

    # ---------------------------------------------------------------------------
    # HTTPS Redirect
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name corpperks.com www.corpperks.com;

        return 301 https://peopleos.corpperks.com$request_uri;
    }
}
