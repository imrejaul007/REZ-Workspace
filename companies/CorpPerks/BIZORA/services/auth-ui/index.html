<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIZORA - Business Operating System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      overflow: hidden;
      width: 100%;
      max-width: 420px;
      margin: 20px;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px;
      text-align: center;
      color: white;
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 14px;
      opacity: 0.9;
    }

    .form {
      padding: 40px;
    }

    .tabs {
      display: flex;
      margin-bottom: 30px;
      border-radius: 10px;
      background: #f5f5f5;
      padding: 4px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      color: #666;
      transition: all 0.3s;
    }

    .tab.active {
      background: white;
      color: #667eea;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e5e5;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: #999;
      font-size: 14px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e5e5;
    }

    .divider span {
      padding: 0 15px;
    }

    .social-btn {
      width: 100%;
      padding: 14px;
      background: white;
      border: 2px solid #e5e5e5;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
    }

    .social-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .footer {
      text-align: center;
      padding: 20px 40px 30px;
      color: #666;
      font-size: 14px;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
    }

    .features {
      padding: 0 40px 30px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #666;
    }

    .feature-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
    }

    .error {
      background: #fee;
      color: #c00;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .success {
      background: #efe;
      color: #060;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">BIZORA</div>
      <div class="tagline">AI-Powered Business Operating System</div>
    </div>

    <div class="form">
      <div class="tabs">
        <div class="tab active" onclick="showTab('login')">Login</div>
        <div class="tab" onclick="showTab('register')">Register</div>
      </div>

      <div id="message"></div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label>Email or Phone</label>
          <input type="text" id="loginEmail" placeholder="Enter email or phone" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn">Login</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
        <div class="input-group">
          <label>Business Name</label>
          <input type="text" id="regBusinessName" placeholder="Your Business Name" required>
        </div>
        <div class="input-group">
          <label>Your Name</label>
          <input type="text" id="regName" placeholder="Your Full Name" required>
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="Enter email" required>
        </div>
        <div class="input-group">
          <label>Phone</label>
          <input type="tel" id="regPhone" placeholder="+91-XXXXXXXXXX" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Create password" required minlength="8">
        </div>
        <button type="submit" class="btn">Create Account</button>
      </form>

      <div class="divider"><span>or continue with</span></div>

      <button class="social-btn" onclick="handleGoogleLogin()">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">✓</div>
        <span>GST Filing & Compliance</span>
      </div>
      <div class="feature">
        <div class="feature-icon">✓</div>
        <span>Verified Vendor Network</span>
      </div>
      <div class="feature">
        <div class="feature-icon">✓</div>
        <span>Working Capital Access</span>
      </div>
      <div class="feature">
        <div class="feature-icon">✓</div>
        <span>AI-Powered Operations</span>
      </div>
    </div>

    <div class="footer">
      By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:4002'; // RABTUL Auth

    function showTab(tab) {
      const tabs = document.querySelectorAll('.tab');
      tabs.forEach((t, i) => {
        t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    }

    function showMessage(msg, type) {
      const msgEl = document.getElementById('message');
      msgEl.innerHTML = `<div class="${type}">${msg}</div>`;
      setTimeout(() => { msgEl.innerHTML = ''; }, 5000);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        // Try RABTUL Auth
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (response.ok) {
          const data = await response.json();
          localStorage.setItem('bizora_token', data.token);
          localStorage.setItem('bizora_user', JSON.stringify(data.user));
          showMessage('Login successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1000);
        } else {
          showMessage('Invalid credentials. Please try again.', 'error');
        }
      } catch (error) {
        // Mock login for demo
        localStorage.setItem('bizora_token', 'demo_token_' + Date.now());
        localStorage.setItem('bizora_user', JSON.stringify({
          email,
          name: email.split('@')[0],
          businessName: 'Demo Business'
        }));
        showMessage('Demo login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 1000);
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const businessName = document.getElementById('regBusinessName').value;
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const phone = document.getElementById('regPhone').value;
      const password = document.getElementById('regPassword').value;

      try {
        const response = await fetch(`${API_URL}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, name, phone })
        });

        if (response.ok) {
          const data = await response.json();
          localStorage.setItem('bizora_token', data.token);
          localStorage.setItem('bizora_user', JSON.stringify({ email, name, businessName }));
          showMessage('Account created! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1000);
        } else {
          showMessage('Registration failed. Please try again.', 'error');
        }
      } catch (error) {
        // Mock registration for demo
        localStorage.setItem('bizora_token', 'demo_token_' + Date.now());
        localStorage.setItem('bizora_user', JSON.stringify({
          email,
          name,
          businessName,
          phone
        }));
        showMessage('Demo account created! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 1000);
      }
    }

    function handleGoogleLogin() {
      // Redirect to Google OAuth
      window.location.href = `${API_URL}/api/auth/google`;
    }
  </script>
</body>
</html>
