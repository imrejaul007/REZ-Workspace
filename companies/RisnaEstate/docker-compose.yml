version: '3.8'

# ============================================================
# RisnaEstate - Production Ready Docker Compose
# ============================================================
# Services: 30 microservices + MongoDB + Redis + Frontend
# Usage: docker-compose up -d
# ============================================================

services:
  # ============================================================
  # INFRASTRUCTURE
  # ============================================================

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - risna_mongo_data:/data/db
    networks:
      - risna-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - risna_redis_data:/data
    networks:
      - risna-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # API GATEWAY (Entry Point)
  # ============================================================

  gateway:
    build: ./services/risna-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET required}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN required}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://risnaestate.com}
      - RISNA_PROPERTY_URL=http://property-service:4100
      - RISNA_LEAD_URL=http://lead-service:4101
      - RISNA_VISA_URL=http://visa-service:4102
      - RISNA_REFERRAL_URL=http://referral-service:4103
      - RISNA_BROKER_URL=http://broker-service:4104
      - RISNA_CRM_URL=http://crm-service:4105
      - RISNA_MEDIA_URL=http://media-service:4106
      - RISNA_INTELLIGENCE_URL=http://intelligence-service:4110
      - RISNA_WHATSAPP_URL=http://whatsapp-service:4111
      - RISNA_INVESTMENT_URL=http://investment-service:4112
      - RISNA_DISTRIBUTION_URL=http://distribution-service:4113
      - RISNA_NOTIFICATION_URL=http://notification-service:4108
      - RISNA_PAYMENT_URL=http://payment-service:4109
      - RISNA_BUILDER_URL=http://builder-service:4107
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - risna-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # CORE SERVICES
  # ============================================================

  property-service:
    build: ./services/risna-property-service
    ports:
      - "4100:4100"
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=risna-property-service
      - PORT=4100
      - HEALTH_PORT=4200
      - MONGODB_URI=mongodb://mongo:27017/risna-property
      - REDIS_URL=redis://redis:6379
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN required}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://risnaestate.com}
    depends_on:
