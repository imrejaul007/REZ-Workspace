      - NOTIFICATION_URL=${NOTIFICATION_URL:-http://host.docker.internal:4011}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN required}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - risna-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4122/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

