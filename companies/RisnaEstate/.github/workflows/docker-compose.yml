name: Docker Compose (Local Dev)

on:
  workflow_dispatch:

jobs:
  # Full stack test with Docker Compose
  docker-test:
    name: Docker Compose Test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all services
        run: |
          for service in risna-property-service risna-lead-service risna-visa-service risna-referral-service risna-broker-service risna-crm-service risna-media-service risna-gateway; do
            cd services/$service
            npm ci
            npm run build
            cd ../..
          done

      - name: Run health checks
        run: |
          sleep 10
          curl -f http://localhost:4100/health || exit 1
          curl -f http://localhost:4101/health || exit 1
          curl -f http://localhost:4102/health || exit 1
          curl -f http://localhost:4103/health || exit 1
          curl -f http://localhost:4104/health || exit 1
          curl -f http://localhost:4105/health || exit 1
          curl -f http://localhost:4106/health || exit 1
          curl -f http://localhost:3000/health || exit 1

  # Run seed data
  seed-data:
    name: Seed Sample Data
    runs-on: ubuntu-latest
    needs: docker-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Seed data
        run: |
          cd seeds
          npm ci
          node index.js
        env:
          GATEWAY_URL: http://localhost:3000
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
