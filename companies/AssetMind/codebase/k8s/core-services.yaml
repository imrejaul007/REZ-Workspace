# AssetMind Core Services - Kubernetes Manifests
# Version: 1.0.0 | Date: June 12, 2026

---
# =============================================================================
# API Gateway
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assetmind-api-gateway
  namespace: assetmind
  labels:
    app: assetmind
    component: gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: assetmind
      component: gateway
  template:
    metadata:
      labels:
        app: assetmind
        component: gateway
    spec:
      containers:
      - name: gateway
        image: assetmind/api-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5260
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5260"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5260
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5260
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: assetmind-api-gateway
  namespace: assetmind
spec:
  selector:
    app: assetmind
    component: gateway
  ports:
  - port: 80
    targetPort: 5260
    name: http
  type: LoadBalancer

---
# =============================================================================
# Asset Universe (5001)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assetmind-asset-universe
  namespace: assetmind
  labels:
    app: assetmind
    component: asset-universe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: assetmind
      component: asset-universe
  template:
    metadata:
      labels:
        app: assetmind
        component: asset-universe
    spec:
      containers:
      - name: asset-universe
        image: assetmind/asset-universe:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: assetmind-secrets
              key: DATABASE_URL
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: assetmind-asset-universe
  namespace: assetmind
spec:
  selector:
    app: assetmind
    component: asset-universe
  ports:
  - port: 5001
    targetPort: 5001

