---
# =============================================================================
# Auto Scaling for Core Services
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: assetmind-api-gateway-hpa
  namespace: assetmind
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: assetmind-api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# =============================================================================
# Secrets
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: assetmind-secrets
  namespace: assetmind
type: Opaque
stringData:
  ASSETMIND_SECRET_KEY: "REPLACE_WITH_GENERATED_SECRET"
  DATABASE_URL: "postgresql://assetmind:PASSWORD@postgres:5432/assetmind"
  REDIS_URL: "redis://:PASSWORD@redis:6379"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_PASSWORD: "REPLACE_WITH_NEO4J_PASSWORD"
  RABTUL_API_KEY: "REPLACE_WITH_RABTUL_KEY"
  HOJAI_MEMORY_API_KEY: "REPLACE_WITH_HOJAI_KEY"

---
# =============================================================================
# Ingress
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: assetmind-ingress
  namespace: assetmind
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
  - hosts:
    - api.assetmind.ai
    - app.assetmind.ai
    - dashboard.assetmind.ai
    secretName: assetmind-tls
  rules:
  - host: api.assetmind.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: assetmind-api-gateway
            port:
              number: 80
  - host: app.assetmind.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: assetmind-frontend
            port:
              number: 80