# AssetMind - Kubernetes Manifests

---
# API Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assetmind-api-gateway
  labels:
    app: assetmind
    component: gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: assetmind
      component: gateway
  template:
    metadata:
      labels:
        app: assetmind
        component: gateway
    spec:
      containers:
      - name: gateway
        image: assetmind/api-gateway:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: assetmind-api-gateway
spec:
  selector:
    app: assetmind
    component: gateway
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer

---
# RexMind AI
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assetmind-rexmind
  labels:
    app: assetmind
    component: ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: assetmind
      component: ai
  template:
    metadata:
      labels:
        app: assetmind
        component: ai
    spec:
      containers:
      - name: rexmind
        image: assetmind/rexmind:latest
        ports:
        - containerPort: 5160
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
            nvidia.com/gpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: "1"
        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        livenessProbe:
          httpGet:
            path: /health
            port: 5160
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: assetmind-rexmind
spec:
  selector:
    app: assetmind
    component: ai
  ports:
  - port: 5160
    targetPort: 5160

---
# Financial Council
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assetmind-council
  labels:
    app: assetmind
    component: council
spec:
  replicas: 2
  selector:
    matchLabels:
      app: assetmind
      component: council
  template:
    metadata:
      labels:
        app: assetmind
        component: council
    spec:
      containers:
      - name: council
        image: assetmind/council:latest
        ports:
        - containerPort: 5195
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: assetmind-council
spec:
  selector:
    app: assetmind
    component: council
  ports:
  - port: 5195
    targetPort: 5195

---
# Intelligence Hub
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assetmind-hub
  labels:
    app: assetmind
    component: hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: assetmind
      component: hub
  template:
    metadata:
      labels:
        app: assetmind
        component: hub
    spec:
      containers:
      - name: hub
        image: assetmind/hub:latest
        ports:
        - containerPort: 5298
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: assetmind-hub
spec:
  selector:
    app: assetmind
    component: hub
  ports:
  - port: 5298
    targetPort: 5298

---
# HPA - Auto Scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: assetmind-hub-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: assetmind-hub
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: assetmind-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: api.assetmind.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: assetmind-api-gateway
            port:
              number: 80