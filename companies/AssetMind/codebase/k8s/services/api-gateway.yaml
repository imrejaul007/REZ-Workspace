# Kubernetes Manifests for Core AssetMind Services

---
# API Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assetmind-api
  namespace: assetmind
spec:
  replicas: 3
  selector:
    matchLabels:
      app: assetmind-api
  template:
    metadata:
      labels:
        app: assetmind-api
    spec:
      containers:
      - name: api
        image: assetmind/api:latest
        ports:
        - containerPort: 5260
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: assetmind-secrets
              key: database-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: assetmind-api
  namespace: assetmind
spec:
  selector:
    app: assetmind-api
  ports:
  - port: 5260
    targetPort: 5260
  type: LoadBalancer

---
# Agent Orchestrator
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assetmind-agents
  namespace: assetmind
spec:
  replicas: 2
  selector:
    matchLabels:
      app: assetmind-agents
  template:
    metadata:
      labels:
        app: assetmind-agents
    spec:
      containers:
      - name: agents
        image: assetmind/agents:latest
        ports:
        - containerPort: 5090
        env:
        - name: REDIS_URL
          value: "redis://assetmind-redis:6379"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

---
apiVersion: v1
kind: Service
metadata:
  name: assetmind-agents
  namespace: assetmind
spec:
  selector:
    app: assetmind-agents
  ports:
  - port: 5090
    targetPort: 5090

---
# Data Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assetmind-data
  namespace: assetmind
spec:
  replicas: 2
  selector:
    matchLabels:
      app: assetmind-data
  template:
    metadata:
      labels:
        app: assetmind-data
    spec:
      containers:
      - name: data
        image: assetmind/data:latest
        ports:
        - containerPort: 5010
        env:
        - name: REDIS_URL
          value: "redis://assetmind-redis:6379"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: assetmind-data
  namespace: assetmind
spec:
  selector:
    app: assetmind-data
  ports:
  - port: 5010
    targetPort: 5010

---
# PostgreSQL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assetmind-postgres
  namespace: assetmind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: assetmind
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: assetmind-secrets
              key: postgres-password
        - name: POSTGRES_DB
          value: assetmind
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: assetmind-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: assetmind-postgres
  namespace: assetmind
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432

---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assetmind-redis
  namespace: assetmind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: assetmind-redis
  namespace: assetmind
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: assetmind-api-hpa
  namespace: assetmind
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: assetmind-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: assetmind-ingress
  namespace: assetmind
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: api.assetmind.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: assetmind-api
            port:
              number: 5260
