# Kubernetes Service for rez-staff-service
apiVersion: v1
kind: Service
metadata:
  name: rez-staff-service
  namespace: rez-merchant
  labels:
    app: rez-staff-service
    managed-by: rez-merchant
  annotations:
    description: "rez-staff-service service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4091
      targetPort: http
      protocol: TCP
  selector:
    app: rez-staff-service
