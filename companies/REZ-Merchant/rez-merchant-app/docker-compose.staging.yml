# ================================================
# REZ Merchant App - Docker Compose Staging
# Includes monitoring and logging
# ================================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rez-merchant-app-staging
    restart: unless-stopped
    ports:
      - "${STAGING_PORT:-3001}:3000"
    environment:
      NODE_ENV: staging
      PORT: 3000
      REZ_API_BASE_URL: ${REZ_API_BASE_URL:-https://rez-api-gateway-staging.onrender.com/api}
      REZ_MERCHANT_SERVICE_URL: ${REZ_MERCHANT_SERVICE_URL:-https://rez-merchant-service-staging.onrender.com}
      REZ_ORDER_SERVICE_URL: ${REZ_ORDER_SERVICE_URL:-https://rez-order-service-staging.onrender.com}
      JWT_SECRET: ${JWT_SECRET}
      MONGODB_URI: ${MONGODB_URI}
      REDIS_URL: redis://redis:6379
      SENTRY_DSN: ${SENTRY_DSN}
      PROMETHEUS_ENABLED: "true"
      LOG_LEVEL: debug
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rez-network
    volumes:
      - app-logs:/app/logs

  redis:
    image: redis:7-alpine
    container_name: rez-merchant-app-redis-staging
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${STAGING_REDIS_PORT:-6380}:6379"
    volumes:
      - redis-staging-data:/data
    networks:
      - rez-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  rez-network:
    driver: bridge

volumes:
  redis-staging-data:
    driver: local
  app-logs:
    driver: local
