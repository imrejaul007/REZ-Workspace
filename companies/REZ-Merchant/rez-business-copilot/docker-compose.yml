# ================================================
# REZ Business Copilot - Docker Compose
# Production: Next.js standalone
# ================================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rez-business-copilot
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
      REZ_API_BASE_URL: ${REZ_API_BASE_URL:-https://rez-api-gateway.onrender.com/api}
      REZ_MERCHANT_SERVICE_URL: ${REZ_MERCHANT_SERVICE_URL:-https://rez-merchant-service.onrender.com}
      REZ_ORDER_SERVICE_URL: ${REZ_ORDER_SERVICE_URL:-https://rez-order-service.onrender.com}
      JWT_SECRET: ${JWT_SECRET}
      MONGODB_URI: ${MONGODB_URI}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      - redis
    networks:
      - rez-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: rez-business-copilot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - rez-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  rez-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
