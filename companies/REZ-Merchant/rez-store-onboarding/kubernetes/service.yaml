# Kubernetes Service for rez-store-onboarding
apiVersion: v1
kind: Service
metadata:
  name: rez-store-onboarding
  namespace: rez-merchant
  labels:
    app: rez-store-onboarding
    managed-by: rez-merchant
  annotations:
    description: "rez-store-onboarding service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4032
      targetPort: http
      protocol: TCP
  selector:
    app: rez-store-onboarding
