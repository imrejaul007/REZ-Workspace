# Render Blueprint for rez-store-onboarding
# Deploy at: https://dashboard.render.com/blueprints

services:
  - type: web
    name: rez-store-onboarding
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4032
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
