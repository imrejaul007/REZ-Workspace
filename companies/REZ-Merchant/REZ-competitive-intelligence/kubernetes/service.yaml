# ================================================
# REZ-Merchant Kubernetes Service Template
# ================================================

apiVersion: v1
kind: Service
metadata:
  name: REZ-competitive-intelligence
  namespace: rez-merchant
  labels:
    app: REZ-competitive-intelligence
    managed-by: rez-merchant
  annotations:
    description: "REZ-competitive-intelligence service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4631
      targetPort: http
      protocol: TCP
  selector:
    app: REZ-competitive-intelligence

---

# Headless service for StatefulSets (if needed)
apiVersion: v1
kind: Service
metadata:
  name: REZ-competitive-intelligence-internal
  namespace: rez-merchant
  labels:
    app: REZ-competitive-intelligence
    managed-by: rez-merchant
  annotations:
    description: "REZ-competitive-intelligence internal headless service"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 4631
      targetPort: http
      protocol: TCP
  selector:
    app: REZ-competitive-intelligence