# ================================================
# REZ-Merchant Kubernetes Deployment Template
# ================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: REZ-competitive-intelligence
  namespace: rez-merchant
  labels:
    app: REZ-competitive-intelligence
    version: v1.0.0
    managed-by: rez-merchant
spec:
  replicas: ${REPLICAS:-2}
  selector:
    matchLabels:
      app: REZ-competitive-intelligence
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: REZ-competitive-intelligence
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4631"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: REZ-competitive-intelligence-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: REZ-competitive-intelligence
          image: ghcr.io/imrejaul007/REZ-competitive-intelligence:v1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4631
              protocol: TCP
          envFrom:
            - configMapRef:
                name: REZ-competitive-intelligence-config
            - secretRef:
                name: REZ-competitive-intelligence-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: tmp-dir
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: REZ-competitive-intelligence
                topologyKey: kubernetes.io/hostname