# ================================================
# REZ-Merchant Kubernetes Service Template
# ================================================

apiVersion: v1
kind: Service
metadata:
  name: REZ-merchant-corpperks-bridge
  namespace: rez-merchant
  labels:
    app: REZ-merchant-corpperks-bridge
    managed-by: rez-merchant
  annotations:
    description: "REZ-merchant-corpperks-bridge service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3005
      targetPort: http
      protocol: TCP
  selector:
    app: REZ-merchant-corpperks-bridge

---

# Headless service for StatefulSets (if needed)
apiVersion: v1
kind: Service
metadata:
  name: REZ-merchant-corpperks-bridge-internal
  namespace: rez-merchant
  labels:
    app: REZ-merchant-corpperks-bridge
    managed-by: rez-merchant
  annotations:
    description: "REZ-merchant-corpperks-bridge internal headless service"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 3005
      targetPort: http
      protocol: TCP
  selector:
    app: REZ-merchant-corpperks-bridge