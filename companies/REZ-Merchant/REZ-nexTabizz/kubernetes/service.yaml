# ================================================
# REZ-Merchant Kubernetes Service Template
# ================================================

apiVersion: v1
kind: Service
metadata:
  name: REZ-nexTabizz
  namespace: rez-merchant
  labels:
    app: REZ-nexTabizz
    managed-by: rez-merchant
  annotations:
    description: "REZ-nexTabizz service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4058
      targetPort: http
      protocol: TCP
  selector:
    app: REZ-nexTabizz

---

# Headless service for StatefulSets (if needed)
apiVersion: v1
kind: Service
metadata:
  name: REZ-nexTabizz-internal
  namespace: rez-merchant
  labels:
    app: REZ-nexTabizz
    managed-by: rez-merchant
  annotations:
    description: "REZ-nexTabizz internal headless service"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 4058
      targetPort: http
      protocol: TCP
  selector:
    app: REZ-nexTabizz