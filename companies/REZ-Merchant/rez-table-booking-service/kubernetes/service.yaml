# ================================================
# REZ-Merchant Kubernetes Service Template
# ================================================

apiVersion: v1
kind: Service
metadata:
  name: rez-table-booking-service
  namespace: rez-merchant
  labels:
    app: rez-table-booking-service
    managed-by: rez-merchant
  annotations:
    description: "rez-table-booking-service service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4070
      targetPort: http
      protocol: TCP
  selector:
    app: rez-table-booking-service

---

# Headless service for StatefulSets (if needed)
apiVersion: v1
kind: Service
metadata:
  name: rez-table-booking-service-internal
  namespace: rez-merchant
  labels:
    app: rez-table-booking-service
    managed-by: rez-merchant
  annotations:
    description: "rez-table-booking-service internal headless service"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 4070
      targetPort: http
      protocol: TCP
  selector:
    app: rez-table-booking-service