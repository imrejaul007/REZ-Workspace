# ================================================
# REZ-Merchant Kubernetes Service Template
# ================================================

apiVersion: v1
kind: Service
metadata:
  name: rez-white-label-service
  namespace: rez-merchant
  labels:
    app: rez-white-label-service
    managed-by: rez-merchant
  annotations:
    description: "rez-white-label-service service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3083
      targetPort: http
      protocol: TCP
  selector:
    app: rez-white-label-service

---

# Headless service for StatefulSets (if needed)
apiVersion: v1
kind: Service
metadata:
  name: rez-white-label-service-internal
  namespace: rez-merchant
  labels:
    app: rez-white-label-service
    managed-by: rez-merchant
  annotations:
    description: "rez-white-label-service internal headless service"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 3083
      targetPort: http
      protocol: TCP
  selector:
    app: rez-white-label-service