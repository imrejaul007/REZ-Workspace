# ================================================
# REZ-Merchant Kubernetes Service Template
# ================================================

apiVersion: v1
kind: Service
metadata:
  name: REZ-purchase-order-mobile
  namespace: rez-merchant
  labels:
    app: REZ-purchase-order-mobile
    managed-by: rez-merchant
  annotations:
    description: "REZ-purchase-order-mobile service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4059
      targetPort: http
      protocol: TCP
  selector:
    app: REZ-purchase-order-mobile

---

# Headless service for StatefulSets (if needed)
apiVersion: v1
kind: Service
metadata:
  name: REZ-purchase-order-mobile-internal
  namespace: rez-merchant
  labels:
    app: REZ-purchase-order-mobile
    managed-by: rez-merchant
  annotations:
    description: "REZ-purchase-order-mobile internal headless service"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 4059
      targetPort: http
      protocol: TCP
  selector:
    app: REZ-purchase-order-mobile