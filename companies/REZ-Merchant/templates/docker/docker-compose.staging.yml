# ================================================
# REZ-Merchant Docker Compose Staging Template
# Includes monitoring and logging
# ================================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${SERVICE_NAME:-app}-staging
    restart: unless-stopped
    ports:
      - "${STAGING_PORT:-3001}:${PORT:-3000}"
    environment:
      NODE_ENV: staging
      PORT: ${PORT:-3000}
      MONGODB_URI: mongodb://mongodb:27017/${DB_NAME:-app}_staging
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      SENTRY_DSN: ${SENTRY_DSN}
      PROMETHEUS_ENABLED: "true"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rez-network
    volumes:
      - app-logs:/app/logs

  mongodb:
    image: mongo:6-alpine
    container_name: ${SERVICE_NAME:-app}-mongodb-staging
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${DB_NAME:-app}_staging
    ports:
      - "${STAGING_MONGODB_PORT:-27018}:27017"
    volumes:
      - mongodb-staging-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rez-network

  redis:
    image: redis:7-alpine
    container_name: ${SERVICE_NAME:-app}-redis-staging
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${STAGING_REDIS_PORT:-6380}:6379"
    volumes:
      - redis-staging-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rez-network

networks:
  rez-network:
    driver: bridge

volumes:
  mongodb-staging-data:
    driver: local
  redis-staging-data:
    driver: local
  app-logs:
    driver: local