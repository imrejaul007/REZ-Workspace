# ================================================
# REZ-Merchant Kubernetes Service Template
# ================================================

apiVersion: v1
kind: Service
metadata:
  name: ${SERVICE_NAME}
  namespace: ${NAMESPACE:-rez-merchant}
  labels:
    app: ${SERVICE_NAME}
    managed-by: rez-merchant
  annotations:
    description: "${SERVICE_NAME} service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: ${PORT:-3000}
      targetPort: http
      protocol: TCP
  selector:
    app: ${SERVICE_NAME}

---

# Headless service for StatefulSets (if needed)
apiVersion: v1
kind: Service
metadata:
  name: ${SERVICE_NAME}-internal
  namespace: ${NAMESPACE:-rez-merchant}
  labels:
    app: ${SERVICE_NAME}
    managed-by: rez-merchant
  annotations:
    description: "${SERVICE_NAME} internal headless service"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: ${PORT:-3000}
      targetPort: http
      protocol: TCP
  selector:
    app: ${SERVICE_NAME}