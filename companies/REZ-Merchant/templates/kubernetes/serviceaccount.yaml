# ================================================
# REZ-Merchant Kubernetes ServiceAccount Template
# ================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${SERVICE_NAME}-sa
  namespace: ${NAMESPACE:-rez-merchant}
  labels:
    app: ${SERVICE_NAME}
    managed-by: rez-merchant
  annotations:
    description: Service account for ${SERVICE_NAME}

---

# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ${SERVICE_NAME}-pdb
  namespace: ${NAMESPACE:-rez-merchant}
  labels:
    app: ${SERVICE_NAME}
    managed-by: rez-merchant
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ${SERVICE_NAME}

---

# NetworkPolicy for service isolation
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ${SERVICE_NAME}-network-policy
  namespace: ${NAMESPACE:-rez-merchant}
spec:
  podSelector:
    matchLabels:
      app: ${SERVICE_NAME}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: ${PORT:-3000}
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}