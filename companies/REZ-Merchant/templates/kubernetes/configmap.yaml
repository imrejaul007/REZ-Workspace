# ================================================
# REZ-Merchant Kubernetes ConfigMap Template
# ================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: ${SERVICE_NAME}-config
  namespace: ${NAMESPACE:-rez-merchant}
  labels:
    app: ${SERVICE_NAME}
    managed-by: rez-merchant
data:
  # Application Settings
  NODE_ENV: "production"
  PORT: "${PORT:-3000}"
  LOG_LEVEL: "${LOG_LEVEL:-info}"

  # Service Discovery
  SERVICE_NAME: "${SERVICE_NAME}"
  SERVICE_VERSION: "${VERSION:-latest}"

  # Feature Flags
  FEATURE_METRICS_ENABLED: "true"
  FEATURE_TRACING_ENABLED: "true"

  # CORS Configuration
  CORS_ORIGINS: "${CORS_ORIGINS:-https://app.rezmerchant.com,https://admin.rezmerchant.com}"

  # Rate Limiting
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW_MS: "60000"

  # Database
  MONGODB_DATABASE: "${DB_NAME:-app}"

  # Redis
  REDIS_DATABASE: "0"

---

# Production ConfigMap with higher limits
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${SERVICE_NAME}-config-prod
  namespace: ${NAMESPACE:-rez-merchant}
  labels:
    app: ${SERVICE_NAME}
    managed-by: rez-merchant
data:
  NODE_ENV: "production"
  PORT: "${PORT:-3000}"
  LOG_LEVEL: "${LOG_LEVEL:-info}"
  RATE_LIMIT_MAX: "200"
  RATE_LIMIT_WINDOW_MS: "60000"