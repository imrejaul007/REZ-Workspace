# Kubernetes HPA for rez-pos-inventory-sync
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rez-pos-inventory-sync-hpa
  namespace: rez-merchant
  labels:
    app: rez-pos-inventory-sync
    managed-by: rez-merchant
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rez-pos-inventory-sync
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
