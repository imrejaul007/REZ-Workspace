# Kubernetes Service for rez-pos-inventory-sync
apiVersion: v1
kind: Service
metadata:
  name: rez-pos-inventory-sync
  namespace: rez-merchant
  labels:
    app: rez-pos-inventory-sync
    managed-by: rez-merchant
  annotations:
    description: "rez-pos-inventory-sync service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4031
      targetPort: http
      protocol: TCP
  selector:
    app: rez-pos-inventory-sync
