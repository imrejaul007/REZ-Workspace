# Kubernetes Service for rez-merchant-intelligence-service
apiVersion: v1
kind: Service
metadata:
  name: rez-merchant-intelligence-service
  namespace: rez-merchant
  labels:
    app: rez-merchant-intelligence-service
    managed-by: rez-merchant
  annotations:
    description: "rez-merchant-intelligence-service service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4011
      targetPort: http
      protocol: TCP
  selector:
    app: rez-merchant-intelligence-service
