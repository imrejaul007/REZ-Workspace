# ================================================
# REZ POS Service - Docker Compose
# Production-ready configuration with MongoDB + Redis
# ================================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rez-pos-service
    restart: unless-stopped
    ports:
      - "${PORT:-4081}:4081"
    environment:
      NODE_ENV: production
      PORT: 4081
      SERVICE_NAME: rez-pos-service
      SERVICE_VERSION: "1.0.0"
      MONGODB_URI: mongodb://mongodb:27017/rez-pos-service
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      RATE_LIMIT_MAX: "100"
      RATE_LIMIT_WINDOW_MS: "60000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rtnm
    volumes:
      - app-logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  mongodb:
    image: mongo:6-alpine
    container_name: rez-pos-service-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: rez-pos-service
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rtnm

  redis:
    image: redis:7-alpine
    container_name: rez-pos-service-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rtnm

networks:
  rtnm:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local
  app-logs:
    driver: local