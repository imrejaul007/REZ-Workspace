# ================================================
# REZ POS Service - Kubernetes Secret
# DO NOT commit actual values - use sealed-secrets or external secrets operator
# ================================================

apiVersion: v1
kind: Secret
metadata:
  name: rez-pos-service-secrets
  namespace: rez-merchant
  labels:
    app: rez-pos-service
    managed-by: rez-merchant
type: Opaque
stringData:
  # Authentication
  JWT_SECRET: "${JWT_SECRET}"
  JWT_EXPIRES_IN: "24h"

  # Database
  MONGODB_URI: "mongodb://mongodb-master:27017/rez-pos-service"
  MONGODB_USERNAME: "${MONGODB_USERNAME:-}"
  MONGODB_PASSWORD: "${MONGODB_PASSWORD:-}"

  # Redis
  REDIS_URL: "redis://redis-master:6379"
  REDIS_PASSWORD: "${REDIS_PASSWORD:-}"

  # External Services
  SENTRY_DSN: "${SENTRY_DSN:-}"
  SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"

  # API Keys
  INTERNAL_API_KEY: "${INTERNAL_API_KEY:-}"

  # RABTUL Services
  RABTUL_AUTH_URL: "${RABTUL_AUTH_URL:-}"
  RABTUL_PAYMENT_URL: "${RABTUL_PAYMENT_URL:-}"
  RABTUL_WALLET_URL: "${RABTUL_WALLET_URL:-}"
  RABTUL_NOTIFICATION_URL: "${RABTUL_NOTIFICATION_URL:-}"