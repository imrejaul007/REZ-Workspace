# ================================================
# REZ POS Service - Kubernetes ConfigMap
# ================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: rez-pos-service-config
  namespace: rez-merchant
  labels:
    app: rez-pos-service
    managed-by: rez-merchant
data:
  # Application Settings
  NODE_ENV: "production"
  PORT: "4081"
  LOG_LEVEL: "info"
  SERVICE_NAME: "rez-pos-service"
  SERVICE_VERSION: "1.0.0"

  # Feature Flags
  FEATURE_METRICS_ENABLED: "true"
  FEATURE_TRACING_ENABLED: "true"

  # CORS Configuration
  CORS_ORIGINS: "https://app.rezmerchant.com,https://admin.rezmerchant.com"

  # Rate Limiting
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW_MS: "60000"

  # Database
  MONGODB_DATABASE: "rez-pos-service"
  REDIS_DATABASE: "0"