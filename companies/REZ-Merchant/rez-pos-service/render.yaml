# ================================================
# REZ POS Service - Render Blueprint
# ================================================

services:
  - type: web
    name: rez-pos-service
    env: node
    region: oregon
    plan: standard
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4081"
      - key: SERVICE_NAME
        value: rez-pos-service
      - key: SERVICE_VERSION
        value: "1.0.0"
      - key: LOG_LEVEL
        value: info
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: "https://app.rezmerchant.com,https://admin.rezmerchant.com"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"

---

# Alternative: With auto-scaling
services:
  - type: web
    name: rez-pos-service
    env: node
    region: oregon
    plan: performance
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoScalar:
      min: 2
      max: 10
      targetMemoryPercent: 70
      targetCPUPercent: 60
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4081"
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false