# Kubernetes Service for rez-self-checkout
apiVersion: v1
kind: Service
metadata:
  name: rez-self-checkout
  namespace: rez-merchant
  labels:
    app: rez-self-checkout
    managed-by: rez-merchant
  annotations:
    description: "rez-self-checkout service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4092
      targetPort: http
      protocol: TCP
  selector:
    app: rez-self-checkout
