# Render Blueprint for rez-inventory-v2-ui
# Deploy at: https://dashboard.render.com/blueprints

services:
  - type: web
    name: rez-inventory-v2-ui
    env: node
    region: singapore
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run preview
    healthCheckPath: /
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: VITE_API_BASE_URL
        value: https://rez-api-gateway.onrender.com/api
      - key: VITE_WS_URL
        value: wss://rez-backend-8dfu.onrender.com
      - key: VITE_ENVIRONMENT
        value: production