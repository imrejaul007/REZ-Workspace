# ================================================
# REZ Inventory V2 UI - Docker Compose Staging
# Includes monitoring and logging
# ================================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rez-inventory-v2-ui-staging
    restart: unless-stopped
    ports:
      - "${STAGING_PORT:-4001}:80"
    environment:
      NODE_ENV: staging
      VITE_API_BASE_URL: ${REZ_API_BASE_URL:-https://rez-api-gateway-staging.onrender.com/api}
      VITE_WS_URL: ${REZ_WS_URL:-wss://rez-backend-staging.onrender.com}
      VITE_ENVIRONMENT: staging
      SENTRY_DSN: ${SENTRY_DSN}
      PROMETHEUS_ENABLED: "true"
    networks:
      - rez-network
    volumes:
      - app-logs:/var/log/nginx

networks:
  rez-network:
    driver: bridge

volumes:
  app-logs:
    driver: local
