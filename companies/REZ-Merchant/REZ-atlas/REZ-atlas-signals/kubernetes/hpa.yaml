# ================================================
# REZ Atlas Signals - Kubernetes HPA
# ================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rez-atlas-signals-hpa
  namespace: rez-merchant
  labels:
    app: rez-atlas-signals
    managed-by: rez-merchant
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rez-atlas-signals
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80