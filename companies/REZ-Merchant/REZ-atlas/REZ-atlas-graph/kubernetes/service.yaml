# Kubernetes Service for REZ-atlas-graph
apiVersion: v1
kind: Service
metadata:
  name: REZ-atlas-graph
  namespace: rez-merchant
  labels:
    app: REZ-atlas-graph
    managed-by: rez-merchant
  annotations:
    description: "REZ-atlas-graph service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 5173
      targetPort: http
      protocol: TCP
  selector:
    app: REZ-atlas-graph
