# Render Blueprint for REZ-atlas-dashboard
# Deploy at: https://dashboard.render.com/blueprints

services:
  - type: web
    name: rez-atlas-dashboard
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5190
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
