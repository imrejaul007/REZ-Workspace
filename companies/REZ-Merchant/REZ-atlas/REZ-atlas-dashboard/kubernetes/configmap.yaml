# Kubernetes ConfigMap for REZ-atlas-dashboard
apiVersion: v1
kind: ConfigMap
metadata:
  name: REZ-atlas-dashboard-config
  namespace: rez-merchant
  labels:
    app: REZ-atlas-dashboard
    managed-by: rez-merchant
data:
  NODE_ENV: "production"
  PORT: "5190"
  LOG_LEVEL: "info"
  SERVICE_NAME: "REZ-atlas-dashboard"
  SERVICE_VERSION: "latest"
  FEATURE_METRICS_ENABLED: "true"
  FEATURE_TRACING_ENABLED: "true"
  CORS_ORIGINS: "https://app.rezmerchant.com,https://admin.rezmerchant.com"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW_MS: "60000"
  MONGODB_DATABASE: "REZ-atlas-dashboard"
  REDIS_DATABASE: "0"
