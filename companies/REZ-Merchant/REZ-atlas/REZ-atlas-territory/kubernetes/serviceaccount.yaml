# Kubernetes ServiceAccount for REZ-atlas-territory
apiVersion: v1
kind: ServiceAccount
metadata:
  name: REZ-atlas-territory-sa
  namespace: rez-merchant
  labels:
    app: REZ-atlas-territory
    managed-by: rez-merchant
  annotations:
    description: Service account for REZ-atlas-territory

---
# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: REZ-atlas-territory-pdb
  namespace: rez-merchant
  labels:
    app: REZ-atlas-territory
    managed-by: rez-merchant
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: REZ-atlas-territory

---
# NetworkPolicy for service isolation
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: REZ-atlas-territory-network-policy
  namespace: rez-merchant
spec:
  podSelector:
    matchLabels:
      app: REZ-atlas-territory
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5170
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
