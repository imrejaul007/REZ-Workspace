# ================================================
# REZ Atlas Score - Render Blueprint
# ================================================

services:
  - type: web
    name: rez-atlas-score
    env: node
    region: oregon
    plan: standard
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5154
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: SERVICE_NAME
        value: REZ-atlas-score
      - key: SERVICE_VERSION
        value: "1.0.0"
