# ================================================
# REZ-Merchant Kubernetes Service Template
# ================================================

apiVersion: v1
kind: Service
metadata:
  name: rez-ai-waiter
  namespace: rez-merchant
  labels:
    app: rez-ai-waiter
    managed-by: rez-merchant
  annotations:
    description: "rez-ai-waiter service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3024
      targetPort: http
      protocol: TCP
  selector:
    app: rez-ai-waiter

---

# Headless service for StatefulSets (if needed)
apiVersion: v1
kind: Service
metadata:
  name: rez-ai-waiter-internal
  namespace: rez-merchant
  labels:
    app: rez-ai-waiter
    managed-by: rez-merchant
  annotations:
    description: "rez-ai-waiter internal headless service"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 3024
      targetPort: http
      protocol: TCP
  selector:
    app: rez-ai-waiter