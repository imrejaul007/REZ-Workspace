apiVersion: v1
kind: Service
metadata:
  name: atlas-call-service
  namespace: rez-merchant
  labels:
    app: atlas-call-service
    managed-by: rez-merchant
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 5164
      targetPort: http
      protocol: TCP
  selector:
    app: atlas-call-service