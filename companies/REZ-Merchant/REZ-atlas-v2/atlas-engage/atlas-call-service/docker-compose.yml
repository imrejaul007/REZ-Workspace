version: '3.8'

services:
  atlas-call-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas-call-service
    restart: unless-stopped
    ports:
      - "5164:5164"
    environment:
      NODE_ENV: production
      PORT: 5164
      SERVICE_NAME: atlas-call-service
      MONGODB_URI: mongodb://mongodb:27017/atlas-call-service
      LOG_LEVEL: info
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5164/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rez-network

  mongodb:
    image: mongo:6-alpine
    container_name: call-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: atlas-call-service
    ports:
      - "27021:27017"
    volumes:
      - call-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rez-network

networks:
  rez-network:
    driver: bridge

volumes:
  call-mongo-data:
    driver: local