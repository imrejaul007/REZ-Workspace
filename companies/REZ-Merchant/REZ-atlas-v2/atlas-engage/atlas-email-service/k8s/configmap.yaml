apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-email-service-config
  namespace: rez-merchant
  labels:
    app: atlas-email-service
    managed-by: rez-merchant
data:
  NODE_ENV: "production"
  PORT: "5161"
  LOG_LEVEL: "info"
  SERVICE_NAME: "atlas-email-service"
  CORS_ORIGINS: "https://app.rezmerchant.com,https://admin.rezmerchant.com"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW_MS: "60000"