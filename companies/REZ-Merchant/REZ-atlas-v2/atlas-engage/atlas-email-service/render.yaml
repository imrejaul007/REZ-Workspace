services:
  - type: web
    name: atlas-email-service
    env: node
    region: oregon
    plan: standard
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5161
      - key: SERVICE_NAME
        value: atlas-email-service
      - key: MONGODB_URI
        sync: false
      - key: LOG_LEVEL
        value: info