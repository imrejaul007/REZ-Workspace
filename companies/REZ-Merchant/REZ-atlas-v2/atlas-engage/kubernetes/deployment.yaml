# Atlas Engage - Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-engage
  namespace: rez-merchant
  labels:
    app: atlas-engage
    version: latest
    managed-by: rez-merchant
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atlas-engage
  template:
    metadata:
      labels:
        app: atlas-engage
        version: latest
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5165"
    spec:
      serviceAccountName: atlas-engage-sa
      containers:
        - name: atlas-engage
          image: rez-merchant/atlas-engage:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5165
          envFrom:
            - configMapRef:
                name: atlas-engage-config
            - secretRef:
                name: atlas-engage-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true