apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-qualification-agent-config
  namespace: rez-merchant
  labels:
    app: atlas-qualification-agent
    managed-by: rez-merchant
data:
  NODE_ENV: "production"
  PORT: "5175"
  LOG_LEVEL: "info"
  SERVICE_NAME: "atlas-qualification-agent"
  SERVICE_VERSION: "2.0.0"
  CORS_ORIGINS: "https://app.rezmerchant.com,https://admin.rezmerchant.com"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW_MS: "60000"