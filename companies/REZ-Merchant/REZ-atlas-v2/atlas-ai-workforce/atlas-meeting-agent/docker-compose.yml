version: '3.8'

services:
  atlas-meeting-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas-meeting-agent
    restart: unless-stopped
    ports:
      - "5176:5176"
    environment:
      NODE_ENV: production
      PORT: 5176
      SERVICE_NAME: atlas-meeting-agent
      MONGODB_URI: mongodb://mongodb:27017/atlas-meeting-agent
      LOG_LEVEL: info
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5176/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rez-network

  mongodb:
    image: mongo:6-alpine
    container_name: meeting-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: atlas-meeting-agent
    ports:
      - "27019:27017"
    volumes:
      - meeting-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rez-network

networks:
  rez-network:
    driver: bridge

volumes:
  meeting-mongo-data:
    driver: local