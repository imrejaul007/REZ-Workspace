apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-meeting-agent-config
  namespace: rez-merchant
  labels:
    app: atlas-meeting-agent
    managed-by: rez-merchant
data:
  NODE_ENV: "production"
  PORT: "5176"
  LOG_LEVEL: "info"
  SERVICE_NAME: "atlas-meeting-agent"
  CORS_ORIGINS: "https://app.rezmerchant.com,https://admin.rezmerchant.com"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW_MS: "60000"