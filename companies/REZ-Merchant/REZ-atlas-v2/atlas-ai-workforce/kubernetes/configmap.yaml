# Atlas AI Workforce - Kubernetes ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-ai-workforce-config
  namespace: rez-merchant
data:
  SERVICE_NAME: "atlas-ai-workforce"
  PORT: "5190"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  # Nested Service URLs
  SDR_AGENT_URL: "http://atlas-sdr-agent:5174"
  QUALIFICATION_AGENT_URL: "http://atlas-qualification-agent:5175"
  MEETING_AGENT_URL: "http://atlas-meeting-agent:5176"