# Atlas AI Workforce - Kubernetes Secret
apiVersion: v1
kind: Secret
metadata:
  name: atlas-ai-workforce-secrets
  namespace: rez-merchant
type: Opaque
stringData:
  MONGODB_URI: "mongodb+srv://user:password@cluster.mongodb.net/atlas-ai-workforce"
  REDIS_URL: "redis://:password@redis-cluster:6379"
  JWT_SECRET: "REPLACE_WITH_STRONG_SECRET"