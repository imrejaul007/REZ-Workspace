apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-enrichment
  namespace: rez-merchant
  labels:
    app: atlas-enrichment
    managed-by: rez-merchant
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - api.rezmerchant.com
      secretName: atlas-enrichment-tls
  rules:
    - host: api.rezmerchant.com
      http:
        paths:
          - path: /api/enrich
            pathType: Prefix
            backend:
              service:
                name: atlas-enrichment
                port:
                  number: 5160