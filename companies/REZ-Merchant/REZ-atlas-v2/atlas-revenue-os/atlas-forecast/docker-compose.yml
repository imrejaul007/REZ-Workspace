version: '3.8'

services:
  atlas-forecast:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas-forecast
    restart: unless-stopped
    ports:
      - "5182:5182"
    environment:
      NODE_ENV: production
      PORT: 5182
      SERVICE_NAME: atlas-forecast
      MONGODB_URI: mongodb://mongodb:27017/atlas-forecast
      LOG_LEVEL: info
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5182/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rez-network

  mongodb:
    image: mongo:6-alpine
    container_name: forecast-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: atlas-forecast
    ports:
      - "27025:27017"
    volumes:
      - forecast-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rez-network

networks:
  rez-network:
    driver: bridge

volumes:
  forecast-mongo-data:
    driver: local