version: '3.8'

services:
  atlas-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas-pipeline
    restart: unless-stopped
    ports:
      - "5181:5181"
    environment:
      NODE_ENV: production
      PORT: 5181
      SERVICE_NAME: atlas-pipeline
      MONGODB_URI: mongodb://mongodb:27017/atlas-pipeline
      LOG_LEVEL: info
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5181/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rez-network

  mongodb:
    image: mongo:6-alpine
    container_name: pipeline-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: atlas-pipeline
    ports:
      - "27024:27017"
    volumes:
      - pipeline-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rez-network

networks:
  rez-network:
    driver: bridge

volumes:
  pipeline-mongo-data:
    driver: local