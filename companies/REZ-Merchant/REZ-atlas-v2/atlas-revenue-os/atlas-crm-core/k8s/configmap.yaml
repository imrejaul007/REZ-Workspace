apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-crm-core-config
  namespace: rez-merchant
  labels:
    app: atlas-crm-core
    managed-by: rez-merchant
data:
  NODE_ENV: "production"
  PORT: "5183"
  LOG_LEVEL: "info"
  SERVICE_NAME: "atlas-crm-core"
  CORS_ORIGINS: "https://app.rezmerchant.com,https://admin.rezmerchant.com"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW_MS: "60000"