# Render Blueprint for rez-kitchen-ai
# Deploy at: https://dashboard.render.com/blueprints

services:
  - type: web
    name: rez-kitchen-ai
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4015
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
