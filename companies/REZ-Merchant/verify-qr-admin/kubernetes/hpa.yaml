# ================================================
# REZ-Merchant Kubernetes HPA Template
# ================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: verify-qr-admin-hpa
  namespace: rez-merchant
  labels:
    app: verify-qr-admin
    managed-by: rez-merchant
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: verify-qr-admin
  minReplicas: ${MIN_REPLICAS:-2}
  maxReplicas: ${MAX_REPLICAS:-10}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

---

# Alternative: Custom metrics HPA (requires Prometheus adapter)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: verify-qr-admin-hpa-custom
  namespace: rez-merchant
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: verify-qr-admin
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: External
      external:
        metric:
          name: nginx_http_requests_total
          selector:
            matchLabels:
              service: verify-qr-admin
        target:
          type: AverageValue
          averageValue: "50"