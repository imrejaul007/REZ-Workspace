# Render Blueprint for rez-app-merchant (Web)
# Deploy at: https://dashboard.render.com/blueprints

services:
  - type: web
    name: rez-app-merchant-web
    env: static
    region: singapore
    plan: starter
    buildCommand: npm ci --ignore-scripts && npx expo export:web --platform web --output-dir dist
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: EXPO_PUBLIC_ENVIRONMENT
        value: production
      - key: EXPO_PUBLIC_API_BASE_URL
        value: https://rez-api-gateway.onrender.com/api
      - key: EXPO_PUBLIC_SOCKET_URL
        value: https://rez-backend-8dfu.onrender.com
      - key: EXPO_PUBLIC_DEBUG_MODE
        value: false
      - key: EXPO_PUBLIC_LOG_LEVEL
        value: error
