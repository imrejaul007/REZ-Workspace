# ================================================
# REZ App Merchant - Docker Compose
# Production: Expo Web served via Nginx
# ================================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rez-app-merchant
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    networks:
      - rez-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  rez-network:
    driver: bridge
