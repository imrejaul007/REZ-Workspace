# ================================================
# REZ-Merchant Kubernetes Secret Template
# DO NOT commit actual values - use sealed-secrets or external secrets operator
# ================================================

apiVersion: v1
kind: Secret
metadata:
  name: REZ-franchise-management-secrets
  namespace: rez-merchant
  labels:
    app: REZ-franchise-management
    managed-by: rez-merchant
type: Opaque
stringData:
  # Authentication
  JWT_SECRET: "${JWT_SECRET}"
  JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-24h}"

  # Database
  MONGODB_URI: "mongodb://mongodb-master:27017/rez_franchise_management"
  MONGODB_USERNAME: "${MONGODB_USERNAME:-}"
  MONGODB_PASSWORD: "${MONGODB_PASSWORD:-}"

  # Redis
  REDIS_URL: "redis://redis-master:6379"
  REDIS_PASSWORD: "${REDIS_PASSWORD:-}"

  # External Services
  SENTRY_DSN: "${SENTRY_DSN:-}"
  SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"

  # API Keys
  INTERNAL_API_KEY: "${INTERNAL_API_KEY:-}"

---

# Alternative: External Secrets (for production)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: REZ-franchise-management-external-secrets
  namespace: rez-merchant
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: REZ-franchise-management-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: REZ-franchise-management/production
        property: jwt_secret
    - secretKey: MONGODB_URI
      remoteRef:
        key: REZ-franchise-management/production
        property: mongodb_uri