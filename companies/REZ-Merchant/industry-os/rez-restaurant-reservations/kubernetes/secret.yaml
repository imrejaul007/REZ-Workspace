# ================================================
# REZ-Merchant Kubernetes Secret
# rez-restaurant-reservations
# NOTE: Use sealed-secrets or external secrets operator for production
# ================================================

apiVersion: v1
kind: Secret
metadata:
  name: rez-restaurant-reservations-secrets
  namespace: rez-merchant
  labels:
    app: rez-restaurant-reservations
    managed-by: rez-merchant
type: Opaque
stringData:
  # Authentication
  JWT_SECRET: "CHANGE_ME"
  JWT_EXPIRES_IN: "24h"

  # Database
  MONGODB_URI: "mongodb://mongodb-master:27017/rez_restaurant_reservations"
  MONGODB_USERNAME: ""
  MONGODB_PASSWORD: ""

  # Redis
  REDIS_URL: "redis://redis-master:6379"
  REDIS_PASSWORD: ""

  # External Services
  SENTRY_DSN: ""
  SLACK_WEBHOOK_URL: ""

  # API Keys
  INTERNAL_API_KEY: ""