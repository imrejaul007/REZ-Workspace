# ================================================
# REZ-Merchant Kubernetes Ingress
# rez-restaurant-loyalty-service
# ================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rez-restaurant-loyalty-service
  namespace: rez-merchant
  labels:
    app: rez-restaurant-loyalty-service
    managed-by: rez-merchant
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - api.rezmerchant.com
      secretName: rez-restaurant-loyalty-service-tls
  rules:
    - host: api.rezmerchant.com
      http:
        paths:
          - path: /api/loyalty
            pathType: Prefix
            backend:
              service:
                name: rez-restaurant-loyalty-service
                port:
                  number: 4007