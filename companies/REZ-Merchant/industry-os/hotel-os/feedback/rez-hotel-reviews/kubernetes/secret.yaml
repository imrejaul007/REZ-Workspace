# ================================================
# REZ-Merchant Kubernetes Secret Template
# DO NOT commit actual values - use sealed-secrets or external secrets operator
# ================================================

apiVersion: v1
kind: Secret
metadata:
  name: rez-hotel-reviews-service-secrets
  namespace: rez-merchant
  labels:
    app: rez-hotel-reviews-service
    managed-by: rez-merchant
type: Opaque
stringData:
  # Authentication
  JWT_SECRET: "${JWT_SECRET}"
  JWT_EXPIRES_IN: "24h"

  # Database
  MONGODB_URI: "mongodb://mongodb-master:27017/rez_hotel_reviews_service"
  MONGODB_USERNAME: "${MONGODB_USERNAME:-}"
  MONGODB_PASSWORD: "${MONGODB_PASSWORD:-}"

  # Redis
  REDIS_URL: "redis://redis-master:6379"
  REDIS_PASSWORD: "${REDIS_PASSWORD:-}"

  # External Services
  SENTRY_DSN: "${SENTRY_DSN:-}"
  SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"

  # API Keys
  INTERNAL_API_KEY: "${INTERNAL_API_KEY:-}"