# ================================================
# REZ-Merchant Kubernetes ServiceAccount Template
# ================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: rez-hotel-pos-service-sa
  namespace: rez-merchant
  labels:
    app: rez-hotel-pos-service
    managed-by: rez-merchant
  annotations:
    description: Service account for rez-hotel-pos-service

---

# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rez-hotel-pos-service-pdb
  namespace: rez-merchant
  labels:
    app: rez-hotel-pos-service
    managed-by: rez-merchant
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: rez-hotel-pos-service

---

# NetworkPolicy for service isolation
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rez-hotel-pos-service-network-policy
  namespace: rez-merchant
spec:
  podSelector:
    matchLabels:
      app: rez-hotel-pos-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 4005
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}