# ================================================
# REZ-Merchant Kubernetes Service Template
# ================================================

apiVersion: v1
kind: Service
metadata:
  name: rez-pms-service
  namespace: rez-merchant
  labels:
    app: rez-pms-service
    managed-by: rez-merchant
  annotations:
    description: "Property Management System Service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4031
      targetPort: http
      protocol: TCP
  selector:
    app: rez-pms-service