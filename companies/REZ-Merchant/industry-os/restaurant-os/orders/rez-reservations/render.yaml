# ================================================
# REZ-Merchant Render Blueprint
# rez-restaurant-reservations
# ================================================

services:
  - type: web
    name: rez-restaurant-reservations
    env: node
    region: oregon
    plan: standard
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4020
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: https://admin.rez.money,https://rez.money,https://rez-app.vercel.app