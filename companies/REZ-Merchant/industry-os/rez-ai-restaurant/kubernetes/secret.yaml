# ================================================
# REZ-Merchant Kubernetes Secret
# rez-ai-restaurant
# NOTE: Use sealed-secrets or external secrets operator for production
# ================================================

apiVersion: v1
kind: Secret
metadata:
  name: rez-ai-restaurant-secrets
  namespace: rez-merchant
  labels:
    app: rez-ai-restaurant
    managed-by: rez-merchant
type: Opaque
stringData:
  # Database
  MONGODB_URI: "mongodb://mongodb-master:27017/rez_ai_restaurant"
  MONGODB_USERNAME: ""
  MONGODB_PASSWORD: ""

  # External Services
  SENTRY_DSN: ""
  SLACK_WEBHOOK_URL: ""

  # API Keys
  INTERNAL_API_KEY: ""