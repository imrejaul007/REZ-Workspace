# ================================================
# REZ-Merchant Kubernetes Service
# ================================================

apiVersion: v1
kind: Service
metadata:
  name: rez-spa-service
  namespace: rez-merchant
  labels:
    app: rez-spa-service
    managed-by: rez-merchant
  annotations:
    description: "rez-spa-service service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4049
      targetPort: http
      protocol: TCP
  selector:
    app: rez-spa-service

---

# Headless service for StatefulSets (if needed)
apiVersion: v1
kind: Service
metadata:
  name: rez-spa-service-internal
  namespace: rez-merchant
  labels:
    app: rez-spa-service
    managed-by: rez-merchant
  annotations:
    description: "rez-spa-service internal headless service"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 4049
      targetPort: http
      protocol: TCP
  selector:
    app: rez-spa-service
