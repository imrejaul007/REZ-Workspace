# ================================================
# REZ-Merchant Kubernetes Service
# ================================================

apiVersion: v1
kind: Service
metadata:
  name: rez-laundry-service
  namespace: rez-merchant
  labels:
    app: rez-laundry-service
    managed-by: rez-merchant
  annotations:
    description: "rez-laundry-service service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4048
      targetPort: http
      protocol: TCP
  selector:
    app: rez-laundry-service

---

# Headless service for StatefulSets (if needed)
apiVersion: v1
kind: Service
metadata:
  name: rez-laundry-service-internal
  namespace: rez-merchant
  labels:
    app: rez-laundry-service
    managed-by: rez-merchant
  annotations:
    description: "rez-laundry-service internal headless service"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 4048
      targetPort: http
      protocol: TCP
  selector:
    app: rez-laundry-service
