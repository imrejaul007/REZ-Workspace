apiVersion: v1
kind: Secret
metadata:
  name: rez-laundry-service-secrets
  namespace: rez-merchant
  labels:
    app: rez-laundry-service
    managed-by: rez-merchant
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_SECURE_SECRET"
  JWT_EXPIRES_IN: "24h"
  MONGODB_URI: "mongodb://mongodb-master:27017/rez_laundry"
  MONGODB_USERNAME: ""
  MONGODB_PASSWORD: ""
  REDIS_URL: "redis://redis-master:6379"
  REDIS_PASSWORD: ""
  SENTRY_DSN: ""
  SLACK_WEBHOOK_URL: ""
  INTERNAL_API_KEY: "REPLACE_WITH_SECURE_API_KEY"
