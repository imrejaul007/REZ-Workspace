# ================================================
# REZ-Merchant Kubernetes Service
# ================================================

apiVersion: v1
kind: Service
metadata:
  name: rez-guest-mobile-app
  namespace: rez-merchant
  labels:
    app: rez-guest-mobile-app
    managed-by: rez-merchant
  annotations:
    description: "rez-guest-mobile-app service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4041
      targetPort: http
      protocol: TCP
  selector:
    app: rez-guest-mobile-app

---

# Headless service for StatefulSets (if needed)
apiVersion: v1
kind: Service
metadata:
  name: rez-guest-mobile-app-internal
  namespace: rez-merchant
  labels:
    app: rez-guest-mobile-app
    managed-by: rez-merchant
  annotations:
    description: "rez-guest-mobile-app internal headless service"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 4041
      targetPort: http
      protocol: TCP
  selector:
    app: rez-guest-mobile-app
