# ================================================
# REZ-Merchant Docker Compose
# Standard: MongoDB + Redis + Application
# ================================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${SERVICE_NAME:-rez-channel-manager}
    restart: unless-stopped
    ports:
      - "${PORT:-4021}:${PORT:-4021}"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4021}
      MONGODB_URI: mongodb://mongodb:27017/${DB_NAME:-rez_channel_manager}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-4021}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rez-network
    volumes:
      - app-data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  mongodb:
    image: mongo:6-alpine
    container_name: ${SERVICE_NAME:-rez-channel-manager}-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${DB_NAME:-rez_channel_manager}
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rez-network

  redis:
    image: redis:7-alpine
    container_name: ${SERVICE_NAME:-rez-channel-manager}-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rez-network

networks:
  rez-network:
    driver: bridge

volumes:
  mongodb-data:
    driver: local
  redis-data:
    driver: local
  app-data:
    driver: local
