# ================================================
# REZ-Merchant Kubernetes Service
# ================================================

apiVersion: v1
kind: Service
metadata:
  name: rez-booking-engine
  namespace: rez-merchant
  labels:
    app: rez-booking-engine
    managed-by: rez-merchant
  annotations:
    description: "rez-booking-engine service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4042
      targetPort: http
      protocol: TCP
  selector:
    app: rez-booking-engine

---

# Headless service for StatefulSets (if needed)
apiVersion: v1
kind: Service
metadata:
  name: rez-booking-engine-internal
  namespace: rez-merchant
  labels:
    app: rez-booking-engine
    managed-by: rez-merchant
  annotations:
    description: "rez-booking-engine internal headless service"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 4042
      targetPort: http
      protocol: TCP
  selector:
    app: rez-booking-engine
