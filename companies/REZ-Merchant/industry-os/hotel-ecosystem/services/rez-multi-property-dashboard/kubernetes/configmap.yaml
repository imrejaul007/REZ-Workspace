# ================================================
# REZ-Merchant Kubernetes ConfigMap Template
# ================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: rez-multi-property-dashboard-config
  namespace: rez-merchant
  labels:
    app: rez-multi-property-dashboard
    managed-by: rez-merchant
data:
  # Application Settings
  NODE_ENV: "production"
  PORT: "4046"
  LOG_LEVEL: "info"

  # Service Discovery
  SERVICE_NAME: "rez-multi-property-dashboard"
  SERVICE_VERSION: "latest"

  # Feature Flags
  FEATURE_METRICS_ENABLED: "true"
  FEATURE_TRACING_ENABLED: "true"

  # CORS Configuration
  CORS_ORIGINS: "https://app.rezmerchant.com,https://admin.rezmerchant.com"

  # Rate Limiting
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW_MS: "60000"

  # Database
  MONGODB_DATABASE: "rez_multi_property_dashboard"

  # Redis
  REDIS_DATABASE: "0"