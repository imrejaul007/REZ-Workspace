# Kubernetes ServiceAccount for rez-multi-location
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rez-multi-location-sa
  namespace: rez-merchant
  labels:
    app: rez-multi-location
    managed-by: rez-merchant
  annotations:
    description: Service account for rez-multi-location

---
# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rez-multi-location-pdb
  namespace: rez-merchant
  labels:
    app: rez-multi-location
    managed-by: rez-merchant
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: rez-multi-location

---
# NetworkPolicy for service isolation
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rez-multi-location-network-policy
  namespace: rez-merchant
spec:
  podSelector:
    matchLabels:
      app: rez-multi-location
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 4632
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
