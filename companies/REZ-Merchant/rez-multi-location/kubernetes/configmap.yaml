# Kubernetes ConfigMap for rez-multi-location
apiVersion: v1
kind: ConfigMap
metadata:
  name: rez-multi-location-config
  namespace: rez-merchant
  labels:
    app: rez-multi-location
    managed-by: rez-merchant
data:
  NODE_ENV: "production"
  PORT: "4632"
  LOG_LEVEL: "info"
  SERVICE_NAME: "rez-multi-location"
  SERVICE_VERSION: "latest"
  FEATURE_METRICS_ENABLED: "true"
  FEATURE_TRACING_ENABLED: "true"
  CORS_ORIGINS: "https://app.rezmerchant.com,https://admin.rezmerchant.com"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_WINDOW_MS: "60000"
  MONGODB_DATABASE: "rez-multi-location"
  REDIS_DATABASE: "0"
