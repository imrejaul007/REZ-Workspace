# ================================================
# REZ-Merchant Kubernetes Ingress Template
# ================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rez-demand-forecast
  namespace: rez-merchant
  labels:
    app: rez-demand-forecast
    managed-by: rez-merchant
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Request-ID $request_id";
spec:
  tls:
    - hosts:
        - ${DOMAIN:-api.rezmerchant.com}
      secretName: rez-demand-forecast-tls
  rules:
    - host: ${DOMAIN:-api.rezmerchant.com}
      http:
        paths:
          - path: /${SERVICE_PATH:-}
            pathType: Prefix
            backend:
              service:
                name: rez-demand-forecast
                port:
                  number: 3055
            properties:
              weight: null
            port:
              number: 3055

---

# Alternative: Path-based routing for multiple services
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rez-demand-forecast-prefix
  namespace: rez-merchant
  labels:
    app: rez-demand-forecast
    managed-by: rez-merchant
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  tls:
    - hosts:
        - ${DOMAIN:-api.rezmerchant.com}
      secretName: rez-demand-forecast-tls
  rules:
    - host: ${DOMAIN:-api.rezmerchant.com}
      http:
        paths:
          - path: /${SERVICE_PATH:-}/(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: rez-demand-forecast
                port:
                  number: 3055