# Kubernetes Service for rez-payroll
apiVersion: v1
kind: Service
metadata:
  name: rez-payroll
  namespace: rez-merchant
  labels:
    app: rez-payroll
    managed-by: rez-merchant
  annotations:
    description: "rez-payroll service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4610
      targetPort: http
      protocol: TCP
  selector:
    app: rez-payroll
