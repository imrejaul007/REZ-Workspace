# ================================================
# REZ-Inventory-Engine Kubernetes Secret
# DO NOT commit actual values - use sealed-secrets or external secrets operator
# ================================================

apiVersion: v1
kind: Secret
metadata:
  name: rez-inventory-engine-secrets
  namespace: rez-merchant
  labels:
    app: rez-inventory-engine
    managed-by: rez-merchant
type: Opaque
stringData:
  # Authentication
  JWT_SECRET: "CHANGE_ME_TO_A_SECURE_SECRET"

  # Database
  MONGODB_URI: "mongodb://mongodb-master:27017/rez_inventory"
  MONGODB_USERNAME: ""
  MONGODB_PASSWORD: ""

  # Redis
  REDIS_URL: "redis://redis-master:6379"
  REDIS_PASSWORD: ""

  # External Services
  SENTRY_DSN: ""
  SLACK_WEBHOOK_URL: ""

  # API Keys
  INTERNAL_API_KEY: ""