# Kubernetes Secret for REZ-dashboard
# DO NOT commit actual values - use sealed-secrets or external secrets operator
apiVersion: v1
kind: Secret
metadata:
  name: rez-dashboard-secrets
  namespace: rez-merchant
  labels:
    app: rez-dashboard
    managed-by: rez-merchant
type: Opaque
stringData:
  JWT_SECRET: "${JWT_SECRET}"
  JWT_EXPIRES_IN: "24h"
  MONGODB_URI: "mongodb://mongodb-master:27017/rez_dashboard"
  MONGODB_USERNAME: "${MONGODB_USERNAME:-}"
  MONGODB_PASSWORD: "${MONGODB_PASSWORD:-}"
  REDIS_URL: "redis://redis-master:6379"
  REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
  SENTRY_DSN: "${SENTRY_DSN:-}"
  SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
  INTERNAL_API_KEY: "${INTERNAL_API_KEY:-}"
