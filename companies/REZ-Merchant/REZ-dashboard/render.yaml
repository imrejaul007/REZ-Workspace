# Render Blueprint for REZ-dashboard
# Deploy at: https://dashboard.render.com/blueprints

services:
  - type: web
    name: rez-dashboard
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_APP_URL
        value: https://rez-platform.onrender.com
      - key: REZ_API_BASE_URL
        value: https://rez-api-gateway.onrender.com/api
