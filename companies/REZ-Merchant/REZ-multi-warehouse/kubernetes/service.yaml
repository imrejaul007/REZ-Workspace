# Kubernetes Service for REZ-multi-warehouse
apiVersion: v1
kind: Service
metadata:
  name: REZ-multi-warehouse
  namespace: rez-merchant
  labels:
    app: REZ-multi-warehouse
    managed-by: rez-merchant
  annotations:
    description: "REZ-multi-warehouse service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4203
      targetPort: http
      protocol: TCP
  selector:
    app: REZ-multi-warehouse
