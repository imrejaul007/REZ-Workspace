# Kubernetes Secret for REZ-multi-warehouse
# DO NOT commit actual values - use sealed-secrets or external secrets operator
apiVersion: v1
kind: Secret
metadata:
  name: REZ-multi-warehouse-secrets
  namespace: rez-merchant
  labels:
    app: REZ-multi-warehouse
    managed-by: rez-merchant
type: Opaque
stringData:
  JWT_SECRET: "${JWT_SECRET}"
  JWT_EXPIRES_IN: "24h"
  MONGODB_URI: "mongodb://mongodb-master:27017/REZ-multi-warehouse"
  MONGODB_USERNAME: "${MONGODB_USERNAME:-}"
  MONGODB_PASSWORD: "${MONGODB_PASSWORD:-}"
  REDIS_URL: "redis://redis-master:6379"
  REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
  SENTRY_DSN: "${SENTRY_DSN:-}"
  SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
  INTERNAL_API_KEY: "${INTERNAL_API_KEY:-}"
