# Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: rez-merchant-intelligence-aggregator
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10011
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: INTERNAL_SERVICE_TOKENS_JSON
        sync: false
