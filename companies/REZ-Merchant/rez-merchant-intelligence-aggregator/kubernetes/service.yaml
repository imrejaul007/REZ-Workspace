# Kubernetes Service for rez-merchant-intelligence-aggregator
apiVersion: v1
kind: Service
metadata:
  name: rez-merchant-intelligence-aggregator
  namespace: rez-merchant
  labels:
    app: rez-merchant-intelligence-aggregator
    managed-by: rez-merchant
  annotations:
    description: "rez-merchant-intelligence-aggregator service"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4012
      targetPort: http
      protocol: TCP
  selector:
    app: rez-merchant-intelligence-aggregator
