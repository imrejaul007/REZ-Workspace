# REZ-Consumer Kubernetes Deployment
# Production deployment template

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rez-consumer-services
  namespace: rez
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rez-consumer
  template:
    metadata:
      labels:
        app: rez-consumer
    spec:
      containers:
      - name: go4food-api
        image: rez-consumer/go4food-api:latest
        ports:
        - containerPort: 3002
        env:
        - name: NODE_ENV
          value: production
        - name: REDIS_HOST
          value: redis
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

      - name: rez-inbox
        image: rez-consumer/rez-inbox:latest
        ports:
        - containerPort: 3003

      - name: rez-assistant
        image: rez-consumer/rez-assistant:latest
        ports:
        - containerPort: 3010

---
apiVersion: v1
kind: Service
metadata:
  name: rez-consumer-service
  namespace: rez
spec:
  selector:
    app: rez-consumer
  ports:
  - port: 80
    targetPort: 3002
  type: LoadBalancer
