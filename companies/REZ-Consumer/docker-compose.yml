# REZ-Consumer Docker Compose
# For local development

version: '3.8'

services:
  # Backend Services
  go4food-api:
    build: ./go4food-api
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
    depends_on:
      - redis

  rez-inbox:
    build: ./REZ-inbox
    ports:
      - "3003:3003"

  rez-assistant:
    build: ./REZ-assistant
    ports:
      - "3010:3010"

  rez-nearby:
    build: ./REZ-nearby
    ports:
      - "3015:3015"

  rez-scan:
    build: ./REZ-scan
    ports:
      - "3016:3016"

  safe-qr-service:
    build: ./safe-qr-service
    ports:
      - "4001:4001"

  verify-qr-service:
    build: ./verify-qr-service
    ports:
      - "4003:4003"

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
