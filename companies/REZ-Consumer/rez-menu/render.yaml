# Render Blueprint for ReZ Web Menu Service
# Monorepo workspace containing backend services
# Services: rez-auth-service, rez-wallet-service, rez-order-service,
#           rez-payment-service, rez-merchant-service, rez-catalog-service,
#           rez-search-service, rez-gamification-service, rez-ads-service,
#           rez-marketing-service

# Individual services can be deployed separately or as a monorepo
# This configuration deploys all services via npm workspaces

services:
  # Auth Service
  - type: web
    name: rez-auth-service
    env: node
    region: oregon
    plan: starter

    buildCommand: npm run build --workspace=rez-auth-service
    startCommand: node dist/index.js

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4002
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d

    autoDeploy: true

  # Wallet Service
  - type: web
    name: rez-wallet-service
    env: node
    region: oregon
    plan: starter

    buildCommand: npm run build --workspace=rez-wallet-service
