# Render Blueprint for ReZ Now (Web Ordering)
# Domain: menu.rez.money
# Next.js standalone output enabled

services:
  - type: web
    name: rez-now
    env: node
    region: oregon
    plan: starter

    buildCommand: npm run build
    startCommand: npm start

    # Health check endpoint
    healthCheckPath: /api/health

    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://api.rez.money
      - key: NEXT_PUBLIC_APP_URL
        value: https://rez.money
      - key: NEXT_PUBLIC_SOCKET_URL
        value: wss://socket.rez.money

      # REZ Service URLs
      - key: REZ_AUTH_SERVICE_URL
        value: https://auth.rez.money
      - key: REZ_WALLET_SERVICE_URL
        value: https://wallet.rez.money
      - key: REZ_ORDER_SERVICE_URL
        value: https://order.rez.money
      - key: REZ_PAYMENT_SERVICE_URL
        value: https://payment.rez.money
      - key: REZ_MERCHANT_SERVICE_URL
        value: https://merchant.rez.money
      - key: REZ_CATALOG_SERVICE_URL
        value: https://catalog.rez.money
      - key: REZ_SEARCH_SERVICE_URL
        value: https://search.rez.money

      # LLM Configuration
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-3-sonnet-20240229

      # Database
      - key: DATABASE_URL
        sync: false

      # Redis
      - key: REDIS_URL
        sync: false

      # Monitoring
      - key: SENTRY_DSN
        sync: false

      # QR Code Generation
      - key: QR_API_KEY
        sync: false

    # Auto-deploy from main branch
    autoDeploy: true

    # Headers for caching
    headers:
      - path: /_next/static/*
        headers:
          - name: Cache-Control
            value: public, max-age=31536000, immutable
      - path: /sw.js
        headers:
          - name: Cache-Control
            value: public, max-age=0, must-revalidate
          - name: Service-Worker-Allowed
            value: /
