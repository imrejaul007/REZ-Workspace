# render.yaml - Render Deployment Configuration
# https://render.com/docs/deploy-connections

services:
  - type: web
    name: rez-safe-qr-service
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: AUTH_SERVICE_URL
        value: https://rez-auth-service.onrender.com
      - key: NOTIFICATIONS_SERVICE_URL
        value: https://rez-notifications-service.onrender.com
      - key: REZ_AGENT_OS_URL
        value: https://rez-agent-os.onrender.com
      - key: REZ_MIND_URL
        value: https://rez-mind.rezapp.com
      - key: INTENT_GRAPH_URL
        value: https://rez-intent-graph.rezapp.com
      - key: QR_BASE_URL
        value: https://rez.app/s
