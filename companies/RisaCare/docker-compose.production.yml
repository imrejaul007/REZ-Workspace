# =============================================================================
# RisaCare - Production Docker Compose
# Complete Healthcare OS with all 56+ services
# =============================================================================

version: '3.9'

services:
  # ==========================================
  # DATABASE & MESSAGING INFRASTRUCTURE
  # ==========================================

  mongo-primary:
    image: mongo:7.0
    container_name: risacare-mongo-primary
    ports:
      - "27017:27017"
    volumes:
      - mongo-primary-data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all"]
    networks:
      - risacare-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: risacare-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-risacare-redis-pass}
    volumes:
      - redis-data:/data
    networks:
      - risacare-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # CORE PLATFORM (4700-4708)
  # ==========================================

  risa-care-api-gateway:
    build:
      context: ./risa-care-api-gateway
      args:
        PORT: 4700
    container_name: risacare-api-gateway
    ports:
      - "4700:4700"
    environment:
      - NODE_ENV=production
      - PORT=4700
      - MONGODB_URI=mongodb://mongo-primary:27017/risa_care
      - REDIS_URL=redis://:@redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongo-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - risacare-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  risa-care-profile-service:
