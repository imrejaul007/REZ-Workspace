  # ==========================================
  # MONITORING STACK
  # ==========================================

  prometheus:
    image: prom/prometheus:latest
    container_name: risacare-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - risacare-network
    depends_on:
      - risa-care-api-gateway

  grafana:
    image: grafana/grafana:latest
    container_name: risacare-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - risacare-network
    depends_on:
      - prometheus

# ==========================================
# VOLUMES & NETWORKS
# ==========================================

volumes:
  mongo-primary-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  risacare-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16