# RisaCare - Additional Services for docker-compose.yml
# Add this section to existing docker-compose.yml

  # ==========================================
  # PATIENT/DOCTOR APPS (4770-4781)
  # ==========================================

  risa-care-mobile-backend:
    build: ./risa-care-mobile-backend
    ports:
      - "4770:4770"
    environment:
      - NODE_ENV=production
      - PORT=4770
      - MONGODB_URI=mongodb://mongo:27017/risa_care_mobile
    depends_on:
      - mongo
    networks:
      - risa-care-network

