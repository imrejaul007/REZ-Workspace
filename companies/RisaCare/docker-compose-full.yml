# RisaCare - Complete Docker Compose
# All 56 services with MongoDB

version: '3.8'

services:
  # ==========================================
  # DATABASE & MESSAGING
  # ==========================================

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - risa-care-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - risa-care-network

