    build: ./risa-care-api-gateway
    ports:
      - "4700:4700"
    environment:
      - NODE_ENV=production
      - PORT=4700
      - MONGODB_URI=mongodb://mongo:27017/risa_care
    depends_on: [mongo]
    networks: [risa-care-network]

  risa-care-profile-service:
