name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # =====================
  # Backend API Tests
  # =====================
  api-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rider-circle-api

    services:
      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: rider-circle-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check || true

      - name: Run tests
        run: npm test || echo "Tests not configured"

 # =====================
  # Mobile App Build
  # =====================
  mobile-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rider-circle-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: rider-circle-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check || true

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          username: ${{ secrets.EXPO_USERNAME }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (Preview)
        run: eas build --platform android --profile preview --non-interactive
        env:
          EAS_BUILD_CONTEXT: '{"tracking": false}'
 continue-on-error: true

  # =====================
  # Lint Check
  # =====================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd rider-circle-api && npm ci
          cd ../rider-circle-app && npm ci

      - name: Lint API
        run: cd rider-circle-api && npm run lint || true

      - name: Lint App
        run: cd rider-circle-app && npm run lint || true

  # =====================
  # Deploy to Railway (Production)
  # =====================
  deploy-api:
    needs: [api-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://rider-circle-api.up.railway.app

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: railway-deploy-action@v1
        with:
          service: rider-circle-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
