apiVersion: apps/v1
kind: Deployment
metadata:
  name: rez-ride-api
  labels:
    app: rez-ride
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rez-ride
  template:
    metadata:
      labels:
        app: rez-ride
        tier: backend
    spec:
      containers:
        - name: api
          image: rezride/api:latest
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4000"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: rez-ride-secrets
                  key: mongodb-uri
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: rez-ride-config
                  key: redis-host
            - name: REDIS_PORT
              value: "6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rez-ride-secrets
                  key: jwt-secret
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rez-ride-secrets
                  key: internal-token
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - rez-ride
                topologyKey: "kubernetes.io/hostname"

---
apiVersion: v1
kind: Service
metadata:
  name: rez-ride-api
  labels:
    app: rez-ride
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 4000
      name: http
  selector:
    app: rez-ride

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rez-ride-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rez-ride-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rez-ride-config
data:
  redis-host: "redis.default.svc.cluster.local"
  surge-enabled: "true"
  timezone: "Asia/Kolkata"

---
apiVersion: v1
kind: Secret
metadata:
  name: rez-ride-secrets
type: Opaque
stringData:
  mongodb-uri: "mongodb://mongo.default.svc.cluster.local:27017/rezride"
  jwt-secret: "your-super-secret-jwt-key-minimum-32-characters"
  internal-token: "your-internal-service-token"
  twilio-account-sid: ""
  twilio-auth-token: ""
  razorpay-key-id: ""
  razorpay-key-secret: ""
  google-maps-api-key: ""
