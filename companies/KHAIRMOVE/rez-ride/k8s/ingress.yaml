apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rez-ride-api
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  tls:
    - hosts:
        - api.rezride.com
      secretName: rez-ride-tls
  rules:
    - host: api.rezride.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rez-ride-api
                port:
                  number: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rez-ride-websocket
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  tls:
    - hosts:
        - ws.rezride.com
      secretName: rez-ride-ws-tls
  rules:
    - host: ws.rezride.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rez-ride-api
                port:
                  number: 80
