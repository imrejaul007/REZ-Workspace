name: BrandPulse CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: products/brandpulse/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: products/brandpulse

      - name: Run linter
        run: npm run lint
        working-directory: products/brandpulse

      - name: Type check
        run: npm run typecheck
        working-directory: products/brandpulse

      - name: Run tests
        run: npm test
        working-directory: products/brandpulse
        env:
          MONGODB_URI: mongodb://localhost:27017/brandpulse-test
          NODE_ENV: test

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t brandpulse:${{ github.sha }} products/brandpulse
          docker build -t brandpulse:latest products/brandpulse

      - name: Run container health check
        run: |
          docker run -d --name brandpulse-test -p 4770:4770 brandpulse:${{ github.sha }}
          sleep 5
          docker exec brandpulse-test curl -f http://localhost:4770/health || exit 1
          docker stop brandpulse-test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: echo "Deploy to staging environment"
        # Add your deployment logic here
