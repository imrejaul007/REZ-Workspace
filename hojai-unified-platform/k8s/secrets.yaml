apiVersion: v1
kind: Secret
metadata:
  name: hojai-secrets
type: Opaque
stringData:
  mongodb-uri: "mongodb://mongo:27017/hojai_unified"
  redis-url: "redis://redis:6379"
  whatsapp-token: "YOUR_WHATSAPP_ACCESS_TOKEN"
  whatsapp-phone-id: "YOUR_WHATSAPP_PHONE_NUMBER_ID"
  whatsapp-verify-token: "YOUR_VERIFY_TOKEN"
  whatsapp-app-secret: "YOUR_APP_SECRET"
  internal-service-token: "YOUR_INTERNAL_SERVICE_TOKEN"
