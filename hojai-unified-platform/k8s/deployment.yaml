apiVersion: apps/v1
kind: Deployment
metadata:
  name: hojai-unified-platform
  labels:
    app: hojai-unified-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hojai-unified-platform
  template:
    metadata:
      labels:
        app: hojai-unified-platform
    spec:
      containers:
        - name: api
          image: hojai/unified-platform:latest
          ports:
            - containerPort: 4850
          env:
            - name: PORT
              value: "4850"
            - name: NODE_ENV
              value: "production"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: hojai-secrets
                  key: mongodb-uri
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hojai-secrets
                  key: redis-url
            - name: WHATSAPP_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hojai-secrets
                  key: whatsapp-token
            - name: WHATSAPP_PHONE_NUMBER_ID
              valueFrom:
                secretKeyRef:
                  name: hojai-secrets
                  key: whatsapp-phone-id
            - name: WHATSAPP_WEBHOOK_VERIFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hojai-secrets
                  key: whatsapp-verify-token
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 4850
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 4850
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hojai-unified-platform
spec:
  selector:
    app: hojai-unified-platform
  ports:
    - port: 80
      targetPort: 4850
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hojai-unified-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.hojai.com
      secretName: hojai-tls
  rules:
    - host: api.hojai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hojai-unified-platform
                port:
                  number: 80
