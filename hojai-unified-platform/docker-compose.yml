version: '3.8'

services:
  # Main API
  api:
    build: .
    ports:
      - "4850:4850"
    environment:
      - NODE_ENV=production
      - PORT=4850
      - MONGODB_URI=mongodb://mongo:27017/hojai_unified
      - REDIS_URL=redis://redis:6379
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_WEBHOOK_VERIFY_TOKEN=${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET}
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4850/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MongoDB
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Dashboard (optional)
  dashboard:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run start"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:4850
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
