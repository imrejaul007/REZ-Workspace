version: '3.8'

services:
  predictive-housekeeping:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: predictive-housekeeping
    restart: unless-stopped
    ports:
      - "8446:8446"
    environment:
      - NODE_ENV=production
      - PORT=8446
      - MONGODB_URI=mongodb://mongodb:27017/predictive_housekeeping
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - SERVICE_NAME=predictive-housekeeping
      - SERVICE_VERSION=1.0.0
      - LOG_LEVEL=info
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8446/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mongodb:
    image: mongo:7.0
    container_name: predictive-housekeeping-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - predictive-housekeeping-mongodb-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=predictive_housekeeping
    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: predictive-housekeeping-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - predictive-housekeeping-redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: predictive-housekeeping-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - predictive-housekeeping-rabbitmq-data:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hotel-os-network:
    name: hotel-os-network
    driver: bridge

volumes:
  predictive-housekeeping-mongodb-data:
    name: predictive-housekeeping-mongodb-data
  predictive-housekeeping-redis-data:
    name: predictive-housekeeping-redis-data
  predictive-housekeeping-rabbitmq-data:
    name: predictive-housekeeping-rabbitmq-data