version: '3.8'

services:
  ai-concierge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai-concierge
    restart: unless-stopped
    ports:
      - "8452:8452"
    environment:
      - NODE_ENV=production
      - PORT=8452
      - SERVICE_NAME=ai-concierge
      - SERVICE_VERSION=1.0.0
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      # Guest Memory Integration (8447)
      - GUEST_MEMORY_URL=http://guest-memory:8447
      - GUEST_MEMORY_TIMEOUT=5000
      # REZ POS Integration (8449)
      - REZ_POS_URL=http://rez-pos:8449
      - REZ_POS_TIMEOUT=5000
      # REZ Loyalty Integration (8450)
      - REZ_LOYALTY_URL=http://rez-loyalty:8450
      - REZ_LOYALTY_TIMEOUT=5000
      # BrandPulse Integration (8451)
      - BRAND_PULSE_URL=http://brand-pulse:8451
      - BRAND_PULSE_TIMEOUT=5000
      # TwinOS Integration
      - TWINOS_URL=http://twinos:3001
      - TWINOS_TIMEOUT=5000
      # Rate Limiting
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=1000
      # CORS
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080
    depends_on:
      redis:
        condition: service_healthy
      guest-memory:
        condition: service_healthy
    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8452/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: ai-concierge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  hotel-os-network:
    driver: bridge
    name: hotel-os-network

volumes:
  redis-data:
    name: ai-concierge-redis-data
