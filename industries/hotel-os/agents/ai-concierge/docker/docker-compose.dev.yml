version: '3.8'

services:
  ai-concierge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai-concierge-dev
    restart: unless-stopped
    ports:
      - "8452:8452"
    environment:
      - NODE_ENV=development
      - PORT=8452
      - SERVICE_NAME=ai-concierge
      - SERVICE_VERSION=1.0.0-dev
      - LOG_LEVEL=debug
      - LOG_FORMAT=pretty
      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      # Guest Memory Integration (8447)
      - GUEST_MEMORY_URL=http://host.docker.internal:8447
      - GUEST_MEMORY_TIMEOUT=5000
      # REZ POS Integration (8449)
      - REZ_POS_URL=http://host.docker.internal:8449
      - REZ_POS_TIMEOUT=5000
      # REZ Loyalty Integration (8450)
      - REZ_LOYALTY_URL=http://host.docker.internal:8450
      - REZ_LOYALTY_TIMEOUT=5000
      # BrandPulse Integration (8451)
      - BRAND_PULSE_URL=http://host.docker.internal:8451
      - BRAND_PULSE_TIMEOUT=5000
      # TwinOS Integration
      - TWINOS_URL=http://host.docker.internal:3001
      - TWINOS_TIMEOUT=5000
      # Rate Limiting
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=1000
      # CORS
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080,http://localhost:5173
    volumes:
      - ../src:/app/src:ro
    networks:
      - hotel-os-network-dev

  redis:
    image: redis:7-alpine
    container_name: ai-concierge-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    command: redis-server --appendonly yes
    networks:
      - hotel-os-network-dev

networks:
  hotel-os-network-dev:
    driver: bridge
    name: hotel-os-network-dev

volumes:
  redis-dev-data:
    name: ai-concierge-redis-dev-data
