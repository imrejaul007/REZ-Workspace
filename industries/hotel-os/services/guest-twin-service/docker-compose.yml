# Guest Twin Service Docker Compose
# Part of Hotel OS Digital Twin Services

version: '3.8'

services:
  guest-twin-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guest-twin-service
    ports:
      - "8447:8447"
    environment:
      - PORT=8447
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/guest_twin
      - REDIS_URL=redis://redis:6379
      - API_KEY=${GUEST_TWIN_API_KEY:-guest-twin-api-key}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-internal-token}
      - GUEST_MEMORY_URL=http://guest-memory:8447
      - GUEST_MEMORY_API_KEY=${GUEST_MEMORY_API_KEY}
      - REZ_LOYALTY_URL=http://rez-loyalty:8450
      - REZ_POS_URL=http://rez-pos:8449
      - BRANDPULSE_URL=http://brandpulse:8451
      - RTNM_GATEWAY_URL=${RTNM_GATEWAY_URL:-http://rez-unified-hub:4600}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hotel-os-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8447/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - guest-twin-data:/app/data

  # Local dependencies (for standalone development)
  mongodb:
    image: mongo:6
    container_name: guest-twin-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=guest_twin
    volumes:
      - guest-twin-mongo-data:/data/db
    networks:
      - hotel-os-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: guest-twin-redis
    command: redis-server --appendonly yes --requirepass password
    volumes:
      - guest-twin-redis-data:/data
    networks:
      - hotel-os-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  hotel-os-network:
    driver: bridge

volumes:
  guest-twin-data:
  guest-twin-mongo-data:
  guest-twin-redis-data: