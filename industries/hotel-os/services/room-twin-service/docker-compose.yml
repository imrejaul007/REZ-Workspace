version: '3.8'

services:
  room-twin-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: room-twin-service
    restart: unless-stopped
    ports:
      - "8444:8444"
    environment:
      - PORT=8444
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/room-twin?authSource=admin
      - REDIS_URL=redis://redis:6379
      - MQTT_BROKER_URL=mqtt://mqtt:1883
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - GUEST_MEMORY_URL=http://guest-memory:8447
      - REZ_POS_URL=http://rez-pos:8449
      - REZ_LOYALTY_URL=http://rez-loyalty:8450
      - BRANDPULSE_URL=http://brandpulse:8451
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-room-twin-internal-token}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - rez-ecosystem
    depends_on:
      - mongodb
      - redis
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8444/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  rez-ecosystem:
    external: true
