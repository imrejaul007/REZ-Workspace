version: '3.8'

services:
  property-twin-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: property-twin-service
    ports:
      - "8448:8448"
    environment:
      - NODE_ENV=production
      - PORT=8448
      - MONGODB_URI=mongodb://mongodb:27017/property-twin-service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - SERVICE_NAME=property-twin-service
      - LOG_LEVEL=info
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - GUEST_MEMORY_SERVICE_URL=http://guest-memory-service:8447
      - REZ_POS_SERVICE_URL=http://rez-pos-service:8449
      - REZ_LOYALTY_SERVICE_URL=http://rez-loyalty-service:8450
      - BRANDPULSE_SERVICE_URL=http://brandpulse-service:8451
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8448/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - hotel-os-network

  mongodb:
    image: mongo:7
    container_name: property-twin-mongodb
    ports:
      - "27027:27017"
    volumes:
      - property-twin-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - hotel-os-network

  redis:
    image: redis:7-alpine
    container_name: property-twin-redis
    ports:
      - "6379"
    volumes:
      - property-twin-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hotel-os-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: property-twin-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - property-twin-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - hotel-os-network

volumes:
  property-twin-mongo-data:
  property-twin-redis-data:
  property-twin-rabbitmq-data:

networks:
  hotel-os-network:
    driver: bridge
