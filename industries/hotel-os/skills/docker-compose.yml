      retries: 3

# ===========================================
# Networks & Volumes
# ===========================================

networks:
  hotel-os-network:
    driver: bridge
    name: hotel-os-network

volumes:
  mongodb_data:
    name: hotel-os-mongodb-data
  redis_data:
    name: hotel-os-redis-data
  rabbitmq_data:
    name: hotel-os-rabbitmq-data
