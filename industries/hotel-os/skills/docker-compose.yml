    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  smart-minibar:
    image: nginx:alpine
    container_name: smart-minibar
    restart: unless-stopped
    ports:
      - "8445:80"
    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  predictive-hk:
    image: nginx:alpine
    container_name: predictive-hk
    restart: unless-stopped
    ports:
      - "8446:80"
    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  upsell-engine:
    image: nginx:alpine
    container_name: upsell-engine
    restart: unless-stopped
    ports:
      - "8448:80"
    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  rez-pos:
    image: nginx:alpine
    container_name: rez-pos
    restart: unless-stopped
    ports:
      - "8449:80"
    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
