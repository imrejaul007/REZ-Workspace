version: '3.8'

services:
  # MongoDB for Twin Data
  mongodb:
    image: mongo:6.0
    container_name: hotel-twins-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: hotel_twins
    networks:
      - hotel-twins-network

  # Redis for Caching
  redis:
    image: redis:7-alpine
    container_name: hotel-twins-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hotel-twins-network

  # TwinOS Gateway
  twinos-gateway:
    build:
      context: ./services/twinos-gateway
      dockerfile: Dockerfile
    container_name: hotel-twinos-gateway
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      NODE_ENV: staging
      PORT: 4200
      MONGO_URI: mongodb://mongodb:27017/hotel_twins
      REDIS_URI: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongodb
      - redis
    networks:
      - hotel-twins-network

  # Guest Twin Service
  guest-twin:
    build:
      context: ./services/guest-twin-service
      dockerfile: Dockerfile
    container_name: hotel-guest-twin
    restart: unless-stopped
    ports:
      - "4201:4201"
    environment:
      NODE_ENV: staging
      PORT: 4201
      MONGO_URI: mongodb://mongodb:27017/hotel_twins
      REDIS_URI: redis://redis:6379
      TWINOS_GATEWAY_URL: http://twinos-gateway:4200
    depends_on:
      - mongodb
      - redis
      - twinos-gateway
    networks:
      - hotel-twins-network

  # Room Twin Service
  room-twin:
    build:
      context: ./services/room-twin-service
      dockerfile: Dockerfile
    container_name: hotel-room-twin
    restart: unless-stopped
    ports:
      - "4202:4202"
    environment:
      NODE_ENV: staging
      PORT: 4202
      MONGO_URI: mongodb://mongodb:27017/hotel_twins
      REDIS_URI: redis://redis:6379
      TWINOS_GATEWAY_URL: http://twinos-gateway:4200
    depends_on:
      - mongodb
      - redis
      - twinos-gateway
    networks:
      - hotel-twins-network

  # Property Twin Service
  property-twin:
    build:
      context: ./services/property-twin-service
      dockerfile: Dockerfile
    container_name: hotel-property-twin
    restart: unless-stopped
    ports:
      - "4203:4203"
    environment:
      NODE_ENV: staging
      PORT: 4203
      MONGO_URI: mongodb://mongodb:27017/hotel_twins
      REDIS_URI: redis://redis:6379
      TWINOS_GATEWAY_URL: http://twinos-gateway:4200
    depends_on:
      - mongodb
      - redis
      - twinos-gateway
    networks:
      - hotel-twins-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: hotel-twins-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - twinos-gateway
      - guest-twin
      - room-twin
      - property-twin
    networks:
      - hotel-twins-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: hotel-twins-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - hotel-twins-network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: hotel-twins-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - hotel-twins-network

volumes:
  mongo_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  hotel-twins-network:
    driver: bridge
