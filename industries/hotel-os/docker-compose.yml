version: '3.8'

# Hotel OS - Predictive Housekeeping Agent Docker Compose
# This is the main entry point for running the Predictive Housekeeping Agent

services:
  predictive-housekeeping:
    build:
      context: ./agents/predictive-housekeeping
      dockerfile: docker/Dockerfile
    container_name: predictive-housekeeping
    restart: unless-stopped
    ports:
      - "8446:8446"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8446
      - MONGODB_URI=mongodb://${MONGODB_HOST:-mongodb}:27017/${MONGODB_DB:-predictive_housekeeping}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - RABBITMQ_URI=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@${RABBITMQ_HOST:-rabbitmq}:5672
      - SERVICE_NAME=predictive-housekeeping
      - SERVICE_VERSION=1.0.0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - GUEST_MEMORY_URL=${GUEST_MEMORY_URL:-http://guest-memory:8447}
      - TWIN_OS_URL=${TWIN_OS_URL:-http://twinos-hub:8080}
      - REZ_POS_URL=${REZ_POS_URL:-http://rez-pos:8449}
      - REZ_LOYALTY_URL=${REZ_LOYALTY_URL:-http://rez-loyalty:8450}
      - BRAND_PULSE_URL=${BRAND_PULSE_URL:-http://brandpulse:8451}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8446/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - predictive-housekeeping-logs:/app/logs

  mongodb:
    image: mongo:7.0
    container_name: predictive-housekeeping-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - predictive-housekeeping-mongodb-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=predictive_housekeeping
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER:-}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD:-}
    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: predictive-housekeeping-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - predictive-housekeeping-redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: predictive-housekeeping-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - predictive-housekeeping-rabbitmq-data:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    networks:
      - hotel-os-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hotel-os-network:
    name: hotel-os-network
    driver: bridge

volumes:
  predictive-housekeeping-logs:
    name: predictive-housekeeping-logs
  predictive-housekeeping-mongodb-data:
    name: predictive-housekeeping-mongodb-data
  predictive-housekeeping-redis-data:
    name: predictive-housekeeping-redis-data
  predictive-housekeeping-rabbitmq-data:
    name: predictive-housekeeping-rabbitmq-data