apiVersion: v1
kind: ConfigMap
metadata:
  name: hotel-twinos-config
  namespace: hotel-os
data:
  redis-uri: "redis://hotel-redis:6379"
  node-env: "staging"
  log-level: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: hotel-twinos-secrets
  namespace: hotel-os
type: Opaque
stringData:
  mongo-uri: "mongodb://hotel-mongo:27017/hotel_twins"
  jwt-secret: "YOUR_JWT_SECRET_HERE"
  grafana-password: "admin123"
