version: '3.8'

services:
  # Infrastructure
  mongodb:
    image: mongo:7.0
    container_name: restaurant-os-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - restaurant-os-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: restaurant-os-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - restaurant-os-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: restaurant-os-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - restaurant-os-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Restaurant Twin Services
  restaurant-twin-service:
    build:
      context: ./restaurant-twin-service
      dockerfile: docker/Dockerfile
    container_name: restaurant-twin-service
    restart: unless-stopped
    ports:
      - "4011:4011"
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=restaurant-twin-service
      - SERVICE_PORT=4011
      - MONGODB_URI=mongodb://mongodb:27017/restaurant_twin
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - REZ_POS_SERVICE_URL=http://rez-pos:4013
      - REZ_DASHBOARD_SERVICE_URL=http://rez-dashboard:4060
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - restaurant-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  table-twin-service:
    build:
      context: ./table-twin-service
      dockerfile: docker/Dockerfile
    container_name: table-twin-service
    restart: unless-stopped
    ports:
      - "4012:4012"
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=table-twin-service
      - SERVICE_PORT=4012
      - MONGODB_URI=mongodb://mongodb:27017/table_twin
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - REZ_POS_SERVICE_URL=http://rez-pos:4013
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - restaurant-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4012/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  order-twin-service:
    build:
      context: ./order-twin-service
      dockerfile: docker/Dockerfile
    container_name: order-twin-service
    restart: unless-stopped
    ports:
      - "4020:4020"
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=order-twin-service
      - SERVICE_PORT=4020
      - MONGODB_URI=mongodb://mongodb:27017/order_twin
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - REZ_POS_SERVICE_URL=http://rez-pos:4013
      - REZ_KDS_SERVICE_URL=http://rez-kds:4014
      - REZ_INVENTORY_SERVICE_URL=http://inventory-twin-service:4016
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - restaurant-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4020/health"]
      interval: 30s
