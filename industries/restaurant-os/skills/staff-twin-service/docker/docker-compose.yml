version: '3.8'

services:
  staff-twin-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: staff-twin-service
    restart: unless-stopped
    ports:
      - "4018:4018"
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=staff-twin-service
      - SERVICE_PORT=4018
      - MONGODB_URI=mongodb://mongodb:27017/staff_twin_service
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - LOG_LEVEL=info
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - restaurant-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4018/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  restaurant-os-network:
    external: true
