version: '3.8'

services:
  inventory-twin-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: inventory-twin-service
    restart: unless-stopped
    ports:
      - "4016:4016"
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=inventory-twin-service
      - SERVICE_PORT=4016
      - MONGODB_URI=mongodb://mongodb:27017/inventory_twin_service
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - LOG_LEVEL=info
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - restaurant-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4016/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  restaurant-os-network:
    external: true
