version: '3.8'

services:
  table-twin-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: table-twin-service
    restart: unless-stopped
    ports:
      - "4012:4012"
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=table-twin-service
      - SERVICE_PORT=4012
      - MONGODB_URI=mongodb://mongodb:27017/table_twin
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - REZ_POS_SERVICE_URL=http://rez-pos:4013
      - LOG_LEVEL=info
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - restaurant-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4012/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  restaurant-os-network:
    external: true
