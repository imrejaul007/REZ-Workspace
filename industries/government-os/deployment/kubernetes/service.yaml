# Government OS - Kubernetes Services
# Service definitions for all microservices

---
apiVersion: v1
kind: Service
metadata:
  name: citizen-twin-service
  namespace: government-os
  labels:
    app: citizen-twin-service
    tier: service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
  selector:
    app: citizen-twin-service

