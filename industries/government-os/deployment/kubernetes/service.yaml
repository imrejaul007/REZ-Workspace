  name: government-os-api
  namespace: government-os
  labels:
    app: government-os-api
    tier: gateway
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
      nodePort: 30080
  selector:
    app: nginx-ingress

