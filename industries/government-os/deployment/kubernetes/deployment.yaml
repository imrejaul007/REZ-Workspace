# Government OS - Kubernetes Deployment
# Production-ready Kubernetes manifests for staging/production

apiVersion: apps/v1
kind: Deployment
metadata:
  name: citizen-twin-service
  namespace: government-os
  labels:
    app: citizen-twin-service
    tier: service
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: citizen-twin-service
  template:
    metadata:
      labels:
        app: citizen-twin-service
        tier: service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: government-os-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: citizen-twin-service
          image: government-os/citizen-twin-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: LOG_LEVEL
              value: "info"
            - name: COSMOS_DB_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: government-os-secrets
                  key: cosmos-db-endpoint
            - name: COSMOS_DB_KEY
              valueFrom:
                secretKeyRef:
                  name: government-os-secrets
                  key: cosmos-db-key
            - name: SERVICE_BUS_CONNECTION
              valueFrom:
                secretKeyRef:
                  name: government-os-secrets
                  key: service-bus-connection
            - name: SF_INSTANCE_URL
              valueFrom:
                secretKeyRef:
                  name: government-os-secrets
                  key: sf-instance-url
            - name: SF_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: government-os-secrets
                  key: sf-client-id
            - name: SF_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: government-os-secrets
                  key: sf-client-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - citizen-twin-service
                topologyKey: kubernetes.io/hostname

