    app: dispatcher-agent
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dispatcher-agent
  template:
    metadata:
      labels:
        app: dispatcher-agent
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: dispatcher-agent
          image: homeservices/dispatcher-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: homeservices-config
                  key: NODE_ENV
            - name: JOB_SERVICE_URL
              value: "http://job-twin-service:3002"
            - name: TECHNICIAN_SERVICE_URL
              value: "http://technician-twin-service:3003"
            - name: CUSTOMER_SERVICE_URL
              value: "http://customer-twin-service:3001"
            - name: AUTO_ASSIGN_ENABLED
              value: "true"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

