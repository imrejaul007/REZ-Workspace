# Home Services OS - Kubernetes Deployment
# Production Kubernetes manifests for staging/production deployment

apiVersion: v1
kind: Namespace
metadata:
  name: homeservices
  labels:
    name: homeservices
    environment: staging

---
# ConfigMap for shared configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: homeservices-config
  namespace: homeservices
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  CRM_PROVIDER: "housecallpro"
  DEFAULT_SLOT_DURATION: "120"
  BUFFER_TIME_BETWEEN_JOBS: "30"
  FOLLOW_UP_DELAY_HOURS: "24"
  TAX_RATE: "0.08"
  MINIMUM_CHARGE: "75"
  LABOR_RATE_PER_HOUR: "85"

---
# Secret for sensitive data (should be managed via external secrets in production)
apiVersion: v1
kind: Secret
metadata:
  name: homeservices-secrets
  namespace: homeservices
type: Opaque
stringData:
  # These should be populated from external secrets (e.g., Vault, AWS Secrets Manager)
  HOUSECALLPRO_API_KEY: "your-api-key-here"
  JOBBER_API_KEY: "your-api-key-here"
  REDIS_PASSWORD: "redis-secure-password"
  MONGO_PASSWORD: "mongo-secure-password"
  RABBITMQ_PASSWORD: "rabbitmq-secure-password"
  JWT_SECRET: "your-jwt-secret-here"

---
# ===========================================
# Customer Twin Service
# ===========================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-twin-service
  namespace: homeservices
  labels:
    app: customer-twin-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-twin-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: customer-twin-service
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: customer-twin-service
          image: homeservices/customer-twin-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: homeservices-config
                  key: NODE_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: homeservices-config
                  key: LOG_LEVEL
            - name: HOUSECALLPRO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: homeservices-secrets
                  key: HOUSECALLPRO_API_KEY
            - name: JOBBER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: homeservices-secrets
                  key: JOBBER_API_KEY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - customer-twin-service
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: customer-twin-service
  namespace: homeservices
  labels:
    app: customer-twin-service
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    app: customer-twin-service

