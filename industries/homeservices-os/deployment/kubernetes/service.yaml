---
# API Gateway Service (nginx)
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: homeservices
  labels:
    app: api-gateway
    tier: frontend
  annotations:
    description: "API Gateway - Nginx reverse proxy"
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
  selector:
    app: api-gateway

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: homeservices
  labels:
    app: redis
    tier: cache
  annotations:
    description: "Redis Cache"
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app: redis

---
# MongoDB Service
apiVersion: v1
kind: Service
