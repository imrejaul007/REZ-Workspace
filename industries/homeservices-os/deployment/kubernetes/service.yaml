# Kubernetes Services for Home Services OS
# Service definitions for internal and external access

---
# Customer Twin Service
apiVersion: v1
kind: Service
metadata:
  name: customer-twin-service
  namespace: homeservices
  labels:
    app: customer-twin-service
    tier: backend
  annotations:
    description: "Customer Twin Service - Homeowner profiles and properties"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
  selector:
    app: customer-twin-service

---
