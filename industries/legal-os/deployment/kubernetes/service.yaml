apiVersion: v1
kind: Service
metadata:
  name: legal-os-service
  namespace: legal-os
  labels:
    app: legal-os
spec:
  type: ClusterIP
  ports:
    - name: client-twin
      port: 3000
      targetPort: 3000
      protocol: TCP
    - name: case-twin
      port: 3001
      targetPort: 3001
      protocol: TCP
    - name: document-twin
      port: 3002
      targetPort: 3002
      protocol: TCP
    - name: calendar-twin
      port: 3003
      targetPort: 3003
      protocol: TCP
  selector:
    app: legal-os

---
apiVersion: v1
kind: Service
metadata:
  name: legal-os-agents-service
  namespace: legal-os
  labels:
    app: legal-os-agents
spec:
  type: ClusterIP
  ports:
    - name: case-research
      port: 3015
      targetPort: 3015
      protocol: TCP
    - name: document-draft
      port: 3016
      targetPort: 3016
      protocol: TCP
    - name: billing
      port: 3017
      targetPort: 3017
      protocol: TCP
    - name: compliance
      port: 3018
      targetPort: 3018
      protocol: TCP
  selector:
    app: legal-os-agents

---
apiVersion: v1
kind: Service
metadata:
  name: legal-os-mongodb
  namespace: legal-os
  labels:
    app: mongodb
spec:
  type: ClusterIP
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
  selector:
    app: mongodb

---
apiVersion: v1
kind: Service
metadata:
  name: legal-os-redis
  namespace: legal-os
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app: redis
