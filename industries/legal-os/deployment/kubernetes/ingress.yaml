apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: legal-os-ingress
  namespace: legal-os
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - legal-api.rtmn.io
        - legal.rtmn.io
      secretName: legal-os-tls
  rules:
    - host: legal-api.rtmn.io
      http:
        paths:
          - path: /api/clients
            pathType: Prefix
            backend:
              service:
                name: legal-os-service
                port:
                  number: 3000
          - path: /api/cases
            pathType: Prefix
            backend:
              service:
                name: legal-os-service
                port:
                  number: 3001
          - path: /api/documents
            pathType: Prefix
            backend:
              service:
                name: legal-os-service
                port:
                  number: 3002
          - path: /api/calendar
            pathType: Prefix
            backend:
              service:
                name: legal-os-service
                port:
                  number: 3003
          - path: /agents
            pathType: Prefix
            backend:
              service:
                name: legal-os-agents-service
                port:
                  number: 3015
          - path: /health
            pathType: Exact
            backend:
              service:
                name: legal-os-service
                port:
                  number: 3000
