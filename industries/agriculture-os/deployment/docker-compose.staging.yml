version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: agriculture-os-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-agriadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-agripass123}
      MONGO_INITDB_DATABASE: agriculture_os
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27028:27017"
    networks:
      - agriculture-os-network

  redis:
    image: redis:7-alpine
    container_name: agriculture-os-redis
    restart: unless-stopped
    ports:
      - "6384:6379"
    networks:
      - agriculture-os-network

  farm-twin-service:
    build:
      context: ./services/farm-twin-service
      dockerfile: Dockerfile
    container_name: agri-farm-twin
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 3200
      MONGODB_URI: mongodb://agriadmin:agripass123@mongodb:27017/agriculture_os?authSource=admin
      REDIS_URL: redis://redis:6379
    ports:
      - "3200:3200"
    depends_on:
      - mongodb
      - redis
    networks:
      - agriculture-os-network

  yield-predictor-agent:
    build:
      context: ./agents/yield-predictor
      dockerfile: Dockerfile
    container_name: agri-yield-predictor
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      AGENT_PORT: 3210
      REDIS_URL: redis://redis:6379
    ports:
      - "3210:3210"
    depends_on:
      - redis
    networks:
      - agriculture-os-network

  nginx:
    image: nginx:alpine
    container_name: agriculture-os-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3201:80"
    depends_on:
      - farm-twin-service
    networks:
      - agriculture-os-network

  rez-crm-connector:
    build:
      context: ../core/rez-crm-connector
      dockerfile: Dockerfile
    container_name: agriculture-rez-crm
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 3091
      MONGODB_URI: mongodb://agriadmin:agripass123@mongodb:27017/agriculture_os?authSource=admin
      CRM_PROVIDER: ${CRM_PROVIDER:-sap}
    ports:
      - "3091:3091"
    depends_on:
      - mongodb
    networks:
      - agriculture-os-network

volumes:
  mongodb_data:

networks:
  agriculture-os-network:
    driver: bridge
