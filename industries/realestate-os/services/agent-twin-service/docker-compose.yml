# Agent Twin Service Docker Compose
version: '3.8'

services:
  agent-twin-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-twin-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8848
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/agent_twin?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-password}@redis:6379
      - API_KEY=${API_KEY:-agent-twin-api-key}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "8848:8848"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - realestate-os-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8848/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  realestate-os-network:
    external: true