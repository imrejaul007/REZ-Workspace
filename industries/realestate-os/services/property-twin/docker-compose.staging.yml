version: '3.8'

services:
  property-twin-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: property-twin-service-staging
    ports:
      - "8843:8843"
    environment:
      - NODE_ENV=staging
      - PORT=8843
      - MONGODB_URI=mongodb://mongodb:27017/property-twin-service-staging
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - SERVICE_NAME=property-twin-service
      - LOG_LEVEL=debug
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8843/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - realestate-os-staging-network

  mongodb:
    image: mongo:7
    container_name: property-twin-mongodb-staging
    ports:
      - "27018:27017"
    volumes:
      - property-twin-mongo-data-staging:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - realestate-os-staging-network

  redis:
    image: redis:7-alpine
    container_name: property-twin-redis-staging
    ports:
      - "6380:6379"
    volumes:
      - property-twin-redis-data-staging:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - realestate-os-staging-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: property-twin-rabbitmq-staging
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - property-twin-rabbitmq-data-staging:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - realestate-os-staging-network

volumes:
  property-twin-mongo-data-staging:
  property-twin-redis-data-staging:
  property-twin-rabbitmq-data-staging:

networks:
  realestate-os-staging-network:
    driver: bridge
