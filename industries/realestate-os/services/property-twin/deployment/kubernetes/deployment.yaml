apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-twin-service
  namespace: realestate-os
  labels:
    app: property-twin-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: property-twin-service
  template:
    metadata:
      labels:
        app: property-twin-service
        version: v1
    spec:
      containers:
        - name: property-twin-service
          image: property-twin-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8843
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8843"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: property-twin-secrets
                  key: mongodb-uri
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"
            - name: RABBITMQ_URI
              valueFrom:
                secretKeyRef:
                  name: property-twin-secrets
                  key: rabbitmq-uri
            - name: SERVICE_NAME
              value: "property-twin-service"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: property-twin-service
  namespace: realestate-os
  labels:
    app: property-twin-service
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8843
      targetPort: http
      protocol: TCP
  selector:
    app: property-twin-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: property-twin-service-hpa
  namespace: realestate-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: property-twin-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: v1
kind: Secret
metadata:
  name: property-twin-secrets
  namespace: realestate-os
type: Opaque
stringData:
  mongodb-uri: "mongodb://mongodb-service:27017/property-twin-service"
  rabbitmq-uri: "amqp://rabbitmq-service:5672"