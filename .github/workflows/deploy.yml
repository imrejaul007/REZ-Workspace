# RTNM Ecosystem - Deployment Pipeline
# Deploys to staging on push, production with manual approval

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# Cancel in-progress deployments
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # BUILD IMAGES
  # ============================================
  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      - name: Build core service images
        run: |
          for service in hojai-core/*/; do
            if [ -f "$service/Dockerfile" ]; then
              svc_name=$(basename "$service")
              echo "Building $svc_name..."
              docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-$svc_name:${{ github.sha }} \
                -f $service/Dockerfile $service
              docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-$svc_name:${{ github.sha }}
            fi
          done
        continue-on-error: true

  # ============================================
  # DEPLOY TO STAGING
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    needs: [build-images]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Staging Server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
        run: |
          echo "$SSH_PRIVATE_KEY" > deploy_key
          chmod 600 deploy_key

          ssh -o StrictHostKeyChecking=no \
              -i deploy_key \
              "$STAGING_USER@$STAGING_HOST" \
              << 'EOF'
            echo "Pulling latest images..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

            echo "Stopping existing containers..."
            docker compose -f docker-compose.staging.yml down || true

            echo "Starting new deployment..."
            docker compose -f docker-compose.staging.yml up -d

            echo "Deployment complete!"
            docker ps --filter "name=hojai" --format "table {{.Names}}\t{{.Status}}"
          EOF

      - name: Wait for health check
        run: |
          echo "Waiting for services to be ready..."
          sleep 10
          for i in {1..30}; do
            if curl -sf http://staging.hojai.ai:4500/health > /dev/null 2>&1; then
              echo "Service is healthy!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Staging health check
        run: |
          curl -sf http://staging.hojai.ai:4500/health || echo "Health endpoint not available"
          curl -sf http://staging.hojai.ai:4520/health || echo "Memory service not available"

  # ============================================
  # SMOKE TESTS
  # ============================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy-staging]
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."

          # Test health endpoints
          services=(
            "http://staging.hojai.ai:4500/health"
            "http://staging.hojai.ai:4520/health"
            "http://staging.hojai.ai:4530/health"
            "http://staging.hojai.ai:4550/health"
          )

          failed=0
          for service in "${services[@]}"; do
            echo "Testing $service..."
            if curl -sf "$service" > /dev/null 2>&1; then
              echo "✓ $service is healthy"
            else
              echo "✗ $service is not responding"
              failed=$((failed + 1))
            fi
          done

          if [ $failed -gt 0 ]; then
            echo "Smoke tests failed: $failed services not responding"
            exit 1
          fi

          echo "All smoke tests passed!"

      - name: API smoke test
        run: |
          echo "Testing API endpoint..."
          response=$(curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "X-Tenant-Id: test-smoke" \
            -d '{"test": true}' \
            http://staging.hojai.ai:4500/api/services 2>&1 || echo '{}')

          echo "Response: $response"

  # ============================================
  # DEPLOY TO PRODUCTION (with approval)
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [smoke-tests]
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull staging images
        run: |
          echo "Pulling images from registry..."
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Tag for production
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production-latest

      - name: Deploy to Production Server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          echo "$SSH_PRIVATE_KEY" > deploy_key
          chmod 600 deploy_key

          ssh -o StrictHostKeyChecking=no \
              -i deploy_key \
              "$PRODUCTION_USER@$PRODUCTION_HOST" \
              << 'EOF'
            echo "Pulling production images..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production-latest

            echo "Backing up current state..."
            docker compose -f docker-compose.production.yml exec -T mongodb mongodump --archive=/backup/pre-$(date +%Y%m%d%H%M%S).archive || true

            echo "Rolling out new deployment..."
            docker compose -f docker-compose.production.yml up -d --no-deps

            echo "Waiting for services to stabilize..."
            sleep 30

            echo "Checking service status..."
            docker ps --filter "name=hojai" --format "table {{.Names}}\t{{.Status}}"
          EOF

  # ============================================
  # PRODUCTION VERIFICATION
  # ============================================
  verify-production:
    name: Verify Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy-production]
    environment: production

    steps:
      - name: Production health check
        run: |
          echo "Verifying production deployment..."

          services=(
            "http://api.hojai.ai:4500/health"
            "http://api.hojai.ai:4520/health"
            "http://api.hojai.ai:4530/health"
          )

          for service in "${services[@]}"; do
            echo "Checking $service..."
            curl -sf "$service" || echo "Warning: $service not responding"
          done

  # ============================================
  # NOTIFICATIONS
  # ============================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Slack Notification
        if: vars.SLACK_BOT_TOKEN != ''
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ vars.SLACK_DEPLOY_CHANNEL || 'C0XXXXXXX' }}
          payload: |
            {
              "text": "RTNM Ecosystem Deployment: ${{ needs.deploy-production.result == 'success' && 'SUCCESS' || 'FAILED' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*RTNM Ecosystem Deployment*\n*Commit:* `${{ github.sha }}`\n*Environment:* Production\n*Status:* ${{ needs.deploy-production.result }}"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Deployed by: ${{ github.actor }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        continue-on-error: true

      - name: Build Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Images | ${{ needs.build-images.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Staging | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Production | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Verify Production | ${{ needs.verify-production.result }} |" >> $GITHUB_STEP_SUMMARY
