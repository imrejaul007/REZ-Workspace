name: Deploy Hojai WhatsApp AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
          npm run build

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./products/hojai-whatsapp-ai
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            hojai/whatsapp-ai:latest
            hojai/whatsapp-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha

  deploy:
    needs: docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Railway
        run: |
          curl -fLsS https://railway.app/nixwd/railway || true
          railway up --service whatsapp-ai
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  notify:
    needs: [test, docker, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Notify success
        if: success()
        run: echo "Deployment successful"

      - name: Notify failure
        if: failure()
        run: echo "Deployment failed"
