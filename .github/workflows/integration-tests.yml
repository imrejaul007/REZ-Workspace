# RTNM Ecosystem - Integration Test Pipeline
# Runs integration tests against staging environment

name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      test_suite:
        description: 'Test suite to run'
        required: false
        type: string
      debug:
        description: 'Enable debug mode'
        required: false
        type: boolean
        default: false

  schedule:
    # Run daily at 2 AM
    - cron: '0 2 * * *'

# Cancel in-progress runs
concurrency:
  group: ${{ github.workflow }}-${{ inputs.environment || 'staging' }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  STAGING_BASE_URL: 'http://staging.hojai.ai'
  PROD_BASE_URL: 'http://api.hojai.ai'
  TEST_TIMEOUT: 120

jobs:
  # ============================================
  # SETUP
  # ============================================
  setup:
    name: Setup Test Environment
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      base_url: ${{ steps.vars.outputs.base_url }}
      environment: ${{ steps.vars.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "base_url=${{ env.PROD_BASE_URL }}" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "base_url=${{ env.STAGING_BASE_URL }}" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

          echo "Test environment: ${{ steps.vars.outputs.environment }}"
          echo "Base URL: ${{ steps.vars.outputs.base_url }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install test dependencies
        run: |
          npm ci || true
          npm install -D jest @types/jest ts-jest || true
        continue-on-error: true

  # ============================================
  # API INTEGRATION TESTS
  # ============================================
  api-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Run API integration tests
        env:
          BASE_URL: ${{ needs.setup.outputs.base_url }}
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          DEBUG: ${{ inputs.debug }}
        run: |
          echo "Running API integration tests against $ENVIRONMENT"
          echo "Base URL: $BASE_URL"

          # Test API Gateway
          echo "Testing API Gateway..."
          response=$(curl -sf -w "\n%{http_code}" "$BASE_URL:4500/health" 2>&1 || echo -e "\n000")
          http_code=$(echo "$response" | tail -n1)
          if [ "$http_code" = "200" ]; then
            echo "✓ API Gateway healthy"
          else
            echo "✗ API Gateway failed (HTTP $http_code)"
          fi

          # Test Event Bus
          echo "Testing Event Bus..."
          response=$(curl -sf -w "\n%{http_code}" "$BASE_URL:4510/health" 2>&1 || echo -e "\n000")
          http_code=$(echo "$response" | tail -n1)
          if [ "$http_code" = "200" ]; then
            echo "✓ Event Bus healthy"
          else
            echo "✗ Event Bus failed (HTTP $http_code)"
          fi

          # Test Memory Service
          echo "Testing Memory Service..."
          response=$(curl -sf -w "\n%{http_code}" "$BASE_URL:4520/health" 2>&1 || echo -e "\n000")
          http_code=$(echo "$response" | tail -n1)
          if [ "$http_code" = "200" ]; then
            echo "✓ Memory Service healthy"
          else
            echo "✗ Memory Service failed (HTTP $http_code)"
          fi

          # Test Intelligence Service
          echo "Testing Intelligence Service..."
          response=$(curl -sf -w "\n%{http_code}" "$BASE_URL:4750/health" 2>&1 || echo -e "\n000")
          http_code=$(echo "$response" | tail -n1)
          if [ "$http_code" = "200" ]; then
            echo "✓ Intelligence Service healthy"
          else
            echo "✗ Intelligence Service failed (HTTP $http_code)"
          fi

      - name: Run Jest API tests
        if: fileExists('tests/api.test.ts') || fileExists('tests/integration/api.test.ts')
        run: |
          npx jest --config jest.config.integration.js --testPathPattern="api|integration" --forceExit || true
        continue-on-error: true

  # ============================================
  # DATABASE INTEGRATION TESTS
  # ============================================
  database-tests:
    name: Database Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [setup]

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Test MongoDB connection
        run: |
          echo "Testing MongoDB connection..."
          sleep 2

          # Try to connect to MongoDB
          if command -v mongosh &> /dev/null; then
            mongosh --host localhost --port 27017 --eval "db.adminCommand('ping')" || echo "MongoDB not ready"
          elif command -v mongo &> /dev/null; then
            mongo --host localhost --port 27017 --eval "db.adminCommand('ping')" || echo "MongoDB not ready"
          else
            echo "MongoDB client not available, skipping connection test"
          fi

      - name: Run database tests
        if: fileExists('tests/database.test.ts') || fileExists('tests/integration/db.test.ts')
        run: |
          MONGODB_URI=mongodb://localhost:27017/test npx jest --config jest.config.integration.js --testPathPattern="database|db" --forceExit || true
        continue-on-error: true

  # ============================================
  # SERVICE INTEGRATION TESTS
  # ============================================
  service-tests:
    name: Service Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Run end-to-end service tests
        env:
          BASE_URL: ${{ needs.setup.outputs.base_url }}
        run: |
          echo "Running service integration tests..."

          # Test service-to-service communication
          echo "Testing Memory -> Intelligence flow..."
          # This would test the actual integration between services

          # Test Genie services
          echo "Testing Genie Memory..."
          curl -sf "$BASE_URL:4703/health" > /dev/null && echo "✓ Genie Memory OK" || echo "✗ Genie Memory failed"

          echo "Testing Genie Relationship..."
          curl -sf "$BASE_URL:4704/health" > /dev/null && echo "✓ Genie Relationship OK" || echo "✗ Genie Relationship failed"

          echo "Testing Genie Briefing..."
          curl -sf "$BASE_URL:4706/health" > /dev/null && echo "✓ Genie Briefing OK" || echo "✗ Genie Briefing failed"

          # Test REZ services
          echo "Testing REZ Predictor..."
          curl -sf "$BASE_URL:4018/health" > /dev/null && echo "✓ REZ Predictor OK" || echo "✗ REZ Predictor failed"

          echo "Testing REZ Predictive Engine..."
          curl -sf "$BASE_URL:4123/health" > /dev/null && echo "✓ REZ Predictive OK" || echo "✗ REZ Predictive failed"

          echo "Testing REZ Memory Layer..."
          curl -sf "$BASE_URL:4201/health" > /dev/null && echo "✓ REZ Memory OK" || echo "✗ REZ Memory failed"

      - name: Run Jest service tests
        if: fileExists('tests/services.test.ts') || fileExists('tests/integration/services.test.ts')
        run: |
          npx jest --config jest.config.integration.js --testPathPattern="services" --forceExit || true
        continue-on-error: true

  # ============================================
  # PERFORMANCE TESTS
  # ============================================
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run performance tests
        env:
          BASE_URL: ${{ needs.setup.outputs.base_url }}
        run: |
          echo "Running performance tests..."

          # Simple performance check
          echo "Testing response times..."

          services=(
            "4500:API Gateway"
            "4520:Memory"
            "4750:Intelligence"
            "4703:Genie Memory"
          )

          for item in "${services[@]}"; do
            port="${item%%:*}"
            name="${item##*:}"
            echo -n "Testing $name... "
            time_taken=$(curl -sf -w "%{time_total}" -o /dev/null "$BASE_URL:$port/health" 2>&1 || echo "0")
            echo "Response time: ${time_taken}s"
          done

      - name: Run k6 performance tests
        if: fileExists('tests/performance.js') || fileExists('k6-tests/')
        run: |
          if command -v k6 &> /dev/null; then
            k6 run tests/performance.js || true
          else
            echo "k6 not installed, skipping performance tests"
          fi
        continue-on-error: true

  # ============================================
  # GENERATE REPORT
  # ============================================
  report:
    name: Generate Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [api-tests, database-tests, service-tests, performance-tests]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate test report
        run: |
          echo "## Integration Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | ${{ needs.api-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database Tests | ${{ needs.database-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Service Tests | ${{ needs.service-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Tests | ${{ needs.performance-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            test-results/
            coverage/
            *.xml
          retention-days: 7
        continue-on-error: true

      - name: Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ secrets.SLACK_TEST_CHANNEL || 'C0XXXXXXX' }}
          payload: |
            {
              "text": "Integration Tests: ${{ needs.api-tests.result == 'success' && 'PASSED' || 'FAILED' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Integration Test Results*\nEnvironment: ${{ needs.setup.outputs.environment }}\n\n| Test | Status |\n|------|--------|\n| API | ${{ needs.api-tests.result }} |\n| Database | ${{ needs.database-tests.result }} |\n| Services | ${{ needs.service-tests.result }} |\n| Performance | ${{ needs.performance-tests.result }} |"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        continue-on-error: true