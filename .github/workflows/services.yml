        run: docker build -t rtmn-buyer-twin services/buyer-twin/

  deal-twin:
    name: Deal Twin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Docker
        run: docker build -t rtmn-deal-twin services/deal-twin/

  property-twin:
    name: Property Twin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
