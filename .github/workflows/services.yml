        run: docker build -t rtmn-hospitality-os services/hospitality-os/

  twinos-hub:
    name: TwinOS Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Docker
        run: docker build -t rtmn-twinos-hub services/twinos-hub/

  # ============================================
  # DIGITAL TWIN SERVICES
  # ============================================
  agent-twin:
    name: Agent Twin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
