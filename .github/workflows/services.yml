name: Service Docker Builds

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/**'
  workflow_dispatch:

jobs:
  # ============================================
  # INDUSTRY OS SERVICES
  # ============================================
  restaurant-os:
    name: Restaurant OS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Docker
        run: docker build -t rtmn-restaurant-os services/restaurant-os/

  hotel-os:
    name: Hotel OS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Docker
        run: docker build -t rtmn-hotel-os services/hotel-os/

  hospitality-os:
