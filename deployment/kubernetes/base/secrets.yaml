apiVersion: v1
kind: Secret
metadata:
  name: rtmn-secrets
  namespace: rtmn
type: Opaque
stringData:
  # LLM API Keys (optional - demo mode works without)
  LLM_API_KEY: "sk-your-key-here"
  ANTHROPIC_API_KEY: "sk-ant-your-key-here"

  # Database credentials
  MONGODB_USERNAME: "rtmn"
  MONGODB_PASSWORD: "change-me-in-production"

  # Redis auth
  REDIS_PASSWORD: "change-me-in-production"

  # JWT secret
  JWT_SECRET: "change-me-in-production-use-strong-random"