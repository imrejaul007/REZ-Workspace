    environment:
      - NODE_ENV=production
      - PORT=4513
      - SERVICE_NAME=airzy-document
    volumes:
      - airzy-document-data:/app/data

  airzy-social:
    build: ./airzy-social
    container_name: airzy-social
    ports:
      - "4514:4514"
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4514/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - NODE_ENV=production
      - PORT=4514
      - SERVICE_NAME=airzy-social
    volumes:
      - airzy-social-data:/app/data

  airzy-finance:
