  rtnm-network:
    driver: bridge

volumes:
  airzy-api-data:
  airzy-booking-data:
  airzy-inventory-data:
  airzy-payment-data:
  airzy-navigation-data:
  airzy-dining-data:
  airzy-visa-data:
  airzy-document-data:
  airzy-social-data:
  airzy-finance-data:
